<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NextGen · Professional Task Platform</title>
    <!-- Firebase 10.8.0 -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        :root {
            --primary: #6366f1;
            --secondary: #10b981;
            --accent: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --light: #f8fafc;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        #app {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            min-height: 100vh;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        /* Top Bar */
        .top-bar {
            background: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(99, 102, 241, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-btn {
            width: 50px;
            height: 50px;
            background: var(--light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
        }

        .menu-btn:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }

        /* Offcanvas Menu */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 999;
            display: none;
        }

        .menu-overlay.active {
            display: block;
        }

        .offcanvas-menu {
            position: fixed;
            top: 0;
            left: -350px;
            width: 350px;
            height: 100vh;
            background: white;
            z-index: 1000;
            transition: left 0.3s ease;
            overflow-y: auto;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.1);
        }

        .offcanvas-menu.open {
            left: 0;
        }

        .menu-header {
            padding: 2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .menu-header h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .menu-header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .menu-section {
            padding: 1.5rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .menu-section h4 {
            color: var(--primary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            margin: 0.3rem 0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--dark);
        }

        .menu-item:hover {
            background: var(--primary);
            color: white;
        }

        .menu-item i {
            width: 24px;
            color: var(--primary);
        }

        .menu-item:hover i {
            color: white;
        }

        .close-menu {
            position: absolute;
            top: 1rem;
            right: 1rem;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Views */
        .view {
            display: none;
            padding: 2rem;
        }

        .view.active {
            display: block;
        }

        /* Cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            margin-bottom: 1.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border-radius: 1.2rem;
            padding: 1.5rem;
            box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.1);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            margin: 0.5rem 0;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge.primary { background: var(--primary); color: white; }
        .badge.success { background: var(--secondary); color: white; }
        .badge.warning { background: var(--accent); color: white; }
        .badge.danger { background: var(--danger); color: white; }
        .badge.easy { background: #10b981; color: white; }
        .badge.medium { background: #f59e0b; color: white; }
        .badge.hard { background: #ef4444; color: white; }

        /* Buttons */
        .btn {
            padding: 0.8rem 1.8rem;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            color: var(--dark);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #4f52e0;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px var(--primary);
        }

        .btn-success {
            background: var(--secondary);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--dark);
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        /* Tables */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--light);
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--dark);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        tr:hover {
            background: rgba(99, 102, 241, 0.02);
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-close {
            font-size: 1.5rem;
            cursor: pointer;
            color: #94a3b8;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: var(--danger);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--dark);
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.3);
            transform: translateY(150%);
            transition: transform 0.3s;
            z-index: 3000;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .toast.show {
            transform: translateY(0);
        }

        .toast.success { background: var(--secondary); }
        .toast.error { background: var(--danger); }
        .toast.warning { background: var(--accent); }

        /* Loading */
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty states */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .view { padding: 1rem; }
            .stats-grid { grid-template-columns: 1fr; }
            .offcanvas-menu { width: 100%; left: -100%; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="logo">NextGen</div>
            <div class="menu-btn" id="menuToggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>

        <!-- Offcanvas Menu -->
        <div class="menu-overlay" id="menuOverlay"></div>
        <div class="offcanvas-menu" id="offcanvasMenu">
            <div class="menu-header">
                <i class="fas fa-times close-menu" id="closeMenu"></i>
                <h3 id="menuUserName">Welcome</h3>
                <p id="menuUserEmail"></p>
                <p id="menuUserBalance" style="margin-top: 0.5rem; font-size: 1.2rem;"></p>
            </div>
            <div id="menuContent"></div>
        </div>

        <!-- Auth View -->
        <div id="authView" class="view active">
            <div class="glass-card" style="max-width: 450px; margin: 2rem auto;">
                <h2 style="margin-bottom: 2rem; text-align: center;">Welcome to NextGen</h2>
                
                <!-- Login Form -->
                <div id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" class="form-control" id="loginEmail" placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password">
                    </div>
                    <button class="btn btn-primary" style="width: 100%;" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </div>

                <hr style="margin: 2rem 0;">

                <!-- Register Form -->
                <div id="registerForm">
                    <div class="form-group">
                        <label>Display Name</label>
                        <input type="text" class="form-control" id="regName" placeholder="Your name">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" class="form-control" id="regEmail" placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" class="form-control" id="regPassword" placeholder="Minimum 6 characters">
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" class="form-control" id="regPhone" placeholder="Phone number">
                    </div>
                    <button class="btn btn-success" style="width: 100%; margin-bottom: 1rem;" id="registerBtn">
                        <i class="fas fa-user-plus"></i> Register
                    </button>
                    <button class="btn" style="width: 100%;" id="googleBtn">
                        <i class="fab fa-google"></i> Continue with Google
                    </button>
                </div>
            </div>
        </div>

        <!-- Email Verification View -->
        <div id="verifyView" class="view">
            <div class="glass-card text-center" style="max-width: 450px; margin: 2rem auto; text-align: center;">
                <i class="fas fa-envelope-open-text" style="font-size: 4rem; color: var(--primary); margin-bottom: 1rem;"></i>
                <h2>Verify Your Email</h2>
                <p style="margin: 1rem 0; color: #64748b;">We've sent a verification link to your email. Please click it to continue.</p>
                <button class="btn btn-primary" id="checkVerificationBtn">
                    <i class="fas fa-sync-alt"></i> I've Verified
                </button>
                <button class="btn" id="resendVerificationBtn" style="margin-top: 1rem;">
                    Resend Verification
                </button>
            </div>
        </div>

        <!-- User Dashboard View -->
        <div id="userView" class="view"></div>

        <!-- Admin Dashboard View -->
        <div id="adminView" class="view"></div>

        <!-- Toast Notification -->
        <div id="toast" class="toast">
            <i class="fas fa-info-circle"></i>
            <span id="toastMessage">Notification</span>
        </div>

        <!-- Loading Modal -->
        <div class="modal" id="loadingModal">
            <div class="modal-content" style="text-align: center; background: transparent; box-shadow: none;">
                <div class="loading-spinner"></div>
                <p style="color: white; margin-top: 1rem;">Loading...</p>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyChk2JA68-I5s1D0S10r9WK71LgTNi4hRQ",
            authDomain: "nextgen-5fb6f.firebaseapp.com",
            projectId: "nextgen-5fb6f",
            storageBucket: "nextgen-5fb6f.firebasestorage.app",
            messagingSenderId: "100132076455",
            appId: "1:100132076455:web:c5aea1f6e1a5ebbea99482"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Global State
        let currentUser = null;
        let userData = null;
        let unsubscribeUser = null;

        // Utility Functions
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toast.className = 'toast';
            if (type === 'success') toast.classList.add('success');
            if (type === 'error') toast.classList.add('error');
            if (type === 'warning') toast.classList.add('warning');
            
            toastMessage.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function showLoading() {
            document.getElementById('loadingModal').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loadingModal').classList.remove('active');
        }

        function formatKES(usd) {
            return (usd * 129).toFixed(0);
        }

        async function logActivity(action, details) {
            try {
                await db.collection('logs').add({
                    userId: currentUser?.uid || 'system',
                    action,
                    details,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch (error) {
                console.error('Log error:', error);
            }
        }

        // Menu Functions
        function buildMenu() {
            const menuContent = document.getElementById('menuContent');
            const isAdmin = userData?.role === 'admin';
            
            let html = '';

            if (isAdmin) {
                // Admin Menu
                html = `
                    <div class="menu-section">
                        <h4>⚙️ MANAGEMENT</h4>
                        <div class="menu-item" data-view="adminTasks"><i class="fas fa-tasks"></i> Tasks</div>
                        <div class="menu-item" data-view="adminUsers"><i class="fas fa-users"></i> Users</div>
                        <div class="menu-item" data-view="adminSubmissions"><i class="fas fa-check-double"></i> Submissions</div>
                    </div>
                    <div class="menu-section">
                        <h4>💰 FINANCIAL</h4>
                        <div class="menu-item" data-view="adminWithdrawals"><i class="fas fa-hand-holding-usd"></i> Withdrawals</div>
                        <div class="menu-item" data-view="adminMemberships"><i class="fas fa-crown"></i> Memberships</div>
                        <div class="menu-item" data-view="adminTransactions"><i class="fas fa-exchange-alt"></i> Transactions</div>
                    </div>
                    <div class="menu-section">
                        <h4>🌐 COMMUNITY</h4>
                        <div class="menu-item" data-view="adminLinks"><i class="fas fa-link"></i> Community Links</div>
                        <div class="menu-item" data-view="adminMessages"><i class="fas fa-comment"></i> Messages</div>
                        <div class="menu-item" data-view="adminAnnouncements"><i class="fas fa-bullhorn"></i> Announcements</div>
                    </div>
                    <div class="menu-section">
                        <h4>🔧 SYSTEM</h4>
                        <div class="menu-item" data-view="adminLogs"><i class="fas fa-history"></i> Activity Logs</div>
                        <div class="menu-item" data-view="adminSettings"><i class="fas fa-sliders-h"></i> Settings</div>
                        <div class="menu-item" data-view="adminReports"><i class="fas fa-chart-bar"></i> Reports</div>
                    </div>
                `;
            } else {
                // User Menu
                html = `
                    <div class="menu-section">
                        <h4>📱 MAIN</h4>
                        <div class="menu-item" data-view="userDashboard"><i class="fas fa-chart-pie"></i> Dashboard</div>
                        <div class="menu-item" data-view="userTasks"><i class="fas fa-list"></i> Available Tasks</div>
                        <div class="menu-item" data-view="userSubmit"><i class="fas fa-upload"></i> Submit Work</div>
                    </div>
                    <div class="menu-section">
                        <h4>💰 EARNINGS</h4>
                        <div class="menu-item" data-view="userEarnings"><i class="fas fa-wallet"></i> My Earnings</div>
                        <div class="menu-item" data-view="userTransactions"><i class="fas fa-history"></i> Transactions</div>
                        <div class="menu-item" data-view="userWithdrawals"><i class="fas fa-money-bill-wave"></i> Withdrawals</div>
                    </div>
                    <div class="menu-section">
                        <h4>📋 MY TASKS</h4>
                        <div class="menu-item" data-view="userPending"><i class="fas fa-clock"></i> Pending Reviews</div>
                        <div class="menu-item" data-view="userApproved"><i class="fas fa-check-circle"></i> Approved Tasks</div>
                        <div class="menu-item" data-view="userRejected"><i class="fas fa-times-circle"></i> Rejected Tasks</div>
                        <div class="menu-item" data-view="userStats"><i class="fas fa-chart-line"></i> Task Statistics</div>
                    </div>
                    <div class="menu-section">
                        <h4>👤 ACCOUNT</h4>
                        <div class="menu-item" data-view="userSubscription"><i class="fas fa-crown"></i> Subscription</div>
                        <div class="menu-item" data-view="userMessages"><i class="fas fa-envelope"></i> Messages</div>
                        <div class="menu-item" data-view="userProfile"><i class="fas fa-id-card"></i> Profile Settings</div>
                    </div>
                `;
            }

            // Add logout to all menus
            html += `
                <div class="menu-section">
                    <div class="menu-item" id="logoutMenuItem"><i class="fas fa-sign-out-alt"></i> Logout</div>
                </div>
            `;

            menuContent.innerHTML = html;

            // Add menu item listeners
            document.querySelectorAll('.menu-item[data-view]').forEach(item => {
                item.addEventListener('click', () => {
                    const view = item.dataset.view;
                    if (isAdmin) {
                        loadAdminView(view);
                    } else {
                        loadUserView(view);
                    }
                    closeMenu();
                });
            });

            document.getElementById('logoutMenuItem')?.addEventListener('click', logout);
        }

        function openMenu() {
            document.getElementById('offcanvasMenu').classList.add('open');
            document.getElementById('menuOverlay').classList.add('active');
        }

        function closeMenu() {
            document.getElementById('offcanvasMenu').classList.remove('open');
            document.getElementById('menuOverlay').classList.remove('active');
        }

        // Auth Functions
        async function logout() {
            try {
                await auth.signOut();
                showToast('Logged out successfully', 'success');
                closeMenu();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // User View Loaders
        async function loadUserView(viewName) {
            showLoading();
            const userView = document.getElementById('userView');
            
            switch(viewName) {
                case 'userDashboard':
                    await renderUserDashboard();
                    break;
                case 'userTasks':
                    await renderAvailableTasks();
                    break;
                case 'userSubmit':
                    await renderSubmitWork();
                    break;
                case 'userEarnings':
                    await renderEarnings();
                    break;
                case 'userTransactions':
                    await renderTransactions();
                    break;
                case 'userWithdrawals':
                    await renderWithdrawals();
                    break;
                case 'userPending':
                    await renderPendingSubmissions();
                    break;
                case 'userApproved':
                    await renderApprovedTasks();
                    break;
                case 'userRejected':
                    await renderRejectedTasks();
                    break;
                case 'userStats':
                    await renderTaskStats();
                    break;
                case 'userSubscription':
                    await renderSubscription();
                    break;
                case 'userMessages':
                    await renderUserMessages();
                    break;
                case 'userProfile':
                    await renderProfile();
                    break;
            }
            
            showView('userView');
            hideLoading();
        }

        async function renderUserDashboard() {
            const userView = document.getElementById('userView');
            
            // Get stats
            const submissionsSnap = await db.collection('submissions')
                .where('userId', '==', currentUser.uid)
                .get();
            
            const submissions = submissionsSnap.docs.map(d => d.data());
            const approved = submissions.filter(s => s.status === 'approved');
            const totalEarned = approved.reduce((sum, s) => sum + (s.earned || 0), 0);
            const approvalRate = submissions.length ? (approved.length / submissions.length * 100).toFixed(1) : 0;
            const avgScore = approved.length ? (approved.reduce((sum, s) => sum + (s.score || 0), 0) / approved.length).toFixed(1) : 0;

            userView.innerHTML = `
                <div class="glass-card">
                    <h2>Welcome Back, ${userData.displayName || 'User'}!</h2>

        // Submit Task Work Function
        window.submitTaskWork = async function(taskId, reward) {
            const workText = document.getElementById('workText')?.value;
            
            if (!workText || workText.trim() === '') {
                showToast('Please enter your work details', 'warning');
                return;
            }
            
            if (workText.length < 20) {
                showToast('Please provide more detailed work (at least 20 characters)', 'warning');
                return;
            }
            
            showLoading();
            try {
                // Get task details
                const taskSnap = await db.collection('tasks').doc(taskId).get();
                const task = taskSnap.data();
                
                // Create submission
                await db.collection('submissions').add({
                    userId: currentUser.uid,
                    userEmail: userData.email,
                    userDisplayName: userData.displayName || 'User',
                    taskId: taskId,
                    taskTitle: task.title,
                    workText: workText.trim(),
                    status: 'pending',
                    score: 0,
                    earned: 0,
                    earnedKES: 0,
                    submittedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Increment submission count
                await db.collection('tasks').doc(taskId).update({
                    submissionsCount: firebase.firestore.FieldValue.increment(1)
                });
                
                showToast('Work submitted successfully!', 'success');
                await logActivity('task_submission', `Task: ${task.title}`);
                
                // Close modal
                closeTaskModal();
                
                // Refresh the current view if it's the tasks view
                if (document.getElementById('userView').innerHTML.includes('Available Tasks')) {
                    await renderAvailableTasks();
                }
                
            } catch (error) {
                showToast('Error submitting work: ' + error.message, 'error');
                console.error('Submit work error:', error);
            } finally {
                hideLoading();
            }
        };

        window.submitReview = async function(subId, reward) {
            const score = parseInt(document.getElementById('reviewScore')?.value);
            const feedback = document.getElementById('reviewFeedback')?.value;
            
            if (isNaN(score) || score < 0 || score > 100) {
                showToast('Please enter a valid score (0-100)', 'warning');
                return;
            }
            
            showLoading();
            try {
                const subSnap = await db.collection('submissions').doc(subId).get();
                const sub = subSnap.data();
                
                let earned = 0;
                let status = 'rejected';
                
                if (score >= 50) {
                    earned = (reward * score) / 100;
                    status = 'approved';
                    
                    // Credit user wallet
                    await db.collection('users').doc(sub.userId).update({
                        wallet: firebase.firestore.FieldValue.increment(earned)
                    });
                    
                    // Record transaction
                    await db.collection('transactions').add({
                        userId: sub.userId,
                        type: 'task_earning',
                        amount: earned,
                        description: `Task: ${sub.taskTitle}`,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                
                await db.collection('submissions').doc(subId).update({
                    status: status,
                    score: score,
                    review: feedback,
                    earned: earned,
                    earnedKES: earned * 129,
                    reviewedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                showToast(`Submission ${status}! Earned: $${earned.toFixed(2)}`, 'success');
                document.getElementById('reviewModal')?.remove();
                await logActivity('submission_review', `Sub: ${subId}, Score: ${score}`);
                
                // Refresh admin view
                loadAdminView('adminSubmissions');
            } catch (error) {
                showToast(error.message, 'error');
            }
            hideLoading();
        };

        window.requestWithdrawal = async function() {
            if (!userData.membershipPaid) {
                showToast('Premium membership required for withdrawals', 'warning');
                return;
            }
            
            const amount = parseFloat(prompt('Enter withdrawal amount in USD (minimum $2):'));
            if (isNaN(amount) || amount < 2) {
                showToast('Minimum withdrawal is $2', 'warning');
                return;
            }
            
            if (amount > userData.wallet) {
                showToast('Insufficient balance', 'error');
                return;
            }
            
            const phone = prompt('Enter M-Pesa/Airtel phone number:');
            if (!phone) return;
            
            showLoading();
            try {
                // Deduct from wallet immediately
                await db.collection('users').doc(currentUser.uid).update({
                    wallet: firebase.firestore.FieldValue.increment(-amount)
                });
                
                // Create withdrawal request
                await db.collection('withdrawals').add({
                    userId: currentUser.uid,
                    userEmail: userData.email,
                    amount: amount,
                    amountKES: amount * 129,
                    method: phone.startsWith('07') ? 'mpesa' : 'airtel',
                    phone: phone,
                    status: 'pending',
                    requestedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Record transaction with fee
                const fee = amount * 0.07;
                await db.collection('transactions').add({
                    userId: currentUser.uid,
                    type: 'withdrawal_request',
                    amount: amount,
                    fee: fee,
                    netAmount: amount - fee,
                    status: 'pending',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                showToast(`Withdrawal request submitted! Fee: $${fee.toFixed(2)}`, 'success');
                await logActivity('withdrawal_request', `Amount: $${amount}`);
            } catch (error) {
                showToast(error.message, 'error');
            }
            hideLoading();
        };

        // Initialize Auth State
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                
                // Get user data
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    // Create user document for Google sign-in
                    const newUser = {
                        email: user.email,
                        role: 'user',
                        wallet: 0,
                        active: true,
                        verified: user.emailVerified,
                        membershipPaid: false,
                        membershipStatus: 'pending',
                        displayName: user.displayName || '',
                        phone: '',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    await db.collection('users').doc(user.uid).set(newUser);
                    userData = newUser;
                } else {
                    userData = userDoc.data();
                }

                // Check if user is active
                if (!userData.active) {
                    await auth.signOut();
                    showToast('Your account has been deactivated', 'error');
                    return;
                }

                // Update menu user info
                document.getElementById('menuUserName').textContent = userData.displayName || 'User';
                document.getElementById('menuUserEmail').textContent = user.email;
                document.getElementById('menuUserBalance').innerHTML = `Balance: $${userData.wallet?.toFixed(2) || 0} | KES ${formatKES(userData.wallet || 0)}`;

                // Check email verification for email/password users
                if (!user.emailVerified && user.providerData[0]?.providerId !== 'google.com') {
                    showView('verifyView');
                    return;
                }

                // Build menu based on role
                buildMenu();

                // Load appropriate dashboard
                if (userData.role === 'admin') {
                    await loadAdminView('adminTasks');
                } else {
                    await loadUserView('userDashboard');
                }
            } else {
                showView('authView');
            }
        });

                await auth.signInWithPopup(provider);
                showToast('Google sign-in successful!', 'success');
            } catch (error) {
                showToast(error.message, 'error');
            }
            hideLoading();
        });

        document.getElementById('checkVerificationBtn').addEventListener('click', async () => {
            showLoading();
            try {
                await auth.currentUser.reload();
                
                if (auth.currentUser.emailVerified) {
                    await db.collection('users').doc(auth.currentUser.uid).update({
                        verified: true
                    });
                    showToast('Email verified!', 'success');
                } else {
                    showToast('Email not verified yet', 'warning');
                }
            } catch (error) {
                showToast(error.message, 'error');
            }
            hideLoading();
        });

        document.getElementById('resendVerificationBtn').addEventListener('click', async () => {
            try {
                await auth.currentUser.sendEmailVerification();
                showToast('Verification email sent!', 'success');
            } catch (error) {
                showToast(error.message, 'error');
            }
        });

        // Make functions available globally
        window.viewTaskDetails = viewTaskDetails;
        window.closeTaskModal = closeTaskModal;
        window.submitTaskWork = submitTaskWork;
    </script>
</body>
</html>
