<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen HUB</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Your existing styles remain exactly the same */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: linear-gradient(145deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .auth-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 2rem; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 { font-size: 2rem; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .tab { flex: 1; padding: 1rem; border: none; border-radius: 40px; font-weight: 600; background: #f1f5f9; color: #475569; cursor: pointer; transition: all 0.3s; }
        .tab.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .form { display: block; }
        .form.hidden { display: none; }
        .input-group { margin-bottom: 1rem; }
        .input-group input, .input-group select { width: 100%; padding: 1rem 1.2rem; border-radius: 40px; border: 2px solid #e2e8f0; font-size: 1rem; transition: all 0.3s; }
        .input-group input:focus { border-color: #667eea; outline: none; }
        .btn { width: 100%; padding: 1rem; border: none; border-radius: 40px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-google { background: white; color: #333; border: 2px solid #e2e8f0; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .btn-google:hover { background: #f8fafc; }
        .divider { text-align: center; margin: 1.5rem 0; position: relative; }
        .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #e2e8f0; }
        .divider span { background: white; padding: 0 1rem; position: relative; color: #64748b; }
        .link { text-align: center; margin-top: 1rem; }
        .link a { color: #667eea; text-decoration: none; font-weight: 600; cursor: pointer; }
        .info-text { text-align: center; color: #64748b; margin: 1rem 0; font-size: 0.9rem; }
        
        /* Referrer Message Style */
        .referrer-message {
            background: linear-gradient(135deg, #667eea20, #764ba220);
            border-left: 4px solid #667eea;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 40px;
            font-size: 0.95rem;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: slideDown 0.5s ease;
        }
        
        .referrer-message i {
            color: #667eea;
            font-size: 1.2rem;
        }
        
        .referrer-message strong {
            color: #667eea;
        }
        
        .bonus-badge {
            background: #10b981;
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Alert Dialog Styles */
        .alert-dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            z-index: 2000;
            max-width: 400px;
            width: 90%;
            text-align: center;
            display: none;
        }

        .alert-dialog.show {
            display: block;
        }

        .alert-dialog.error {
            border-top: 4px solid #dc2626;
        }

        .alert-dialog.success {
            border-top: 4px solid #10b981;
        }

        .alert-dialog i {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .alert-dialog.error i {
            color: #dc2626;
        }

        .alert-dialog.success i {
            color: #10b981;
        }

        .alert-dialog h3 {
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }

        .alert-dialog p {
            color: #64748b;
            margin-bottom: 1.5rem;
        }

        .alert-dialog button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .alert-dialog button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.5);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1999;
            display: none;
        }

        .overlay.show {
            display: block;
        }
        
        /* New URL info style */
        .url-info {
            text-align: center;
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 1rem;
            padding: 0.5rem;
            border-top: 1px dashed #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo">
            <h1>🔷 NextGen HUB</h1>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Login</button>
            <button class="tab" onclick="switchTab('register')">Register</button>
        </div>
        
        <!-- Referrer Message Container -->
        <div id="referrerMessageContainer"></div>
        
        <!-- Login Form -->
        <div id="loginForm" class="form">
            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="Email address">
            </div>
            <div class="input-group">
                <input type="password" id="loginPassword" placeholder="Password">
            </div>
            <button class="btn btn-primary" onclick="handleLogin()">Sign In</button>
            
            <div class="divider">
                <span>OR</span>
            </div>
            
            <button class="btn btn-google" onclick="handleGoogleLogin()">
                <i class="fab fa-google"></i> Continue with Google
            </button>
        </div>
        
        <!-- Register Form -->
        <div id="registerForm" class="form hidden">
            <div class="input-group">
                <input type="text" id="regName" placeholder="Full name">
            </div>
            <div class="input-group">
                <input type="email" id="regEmail" placeholder="Email address">
            </div>
            <div class="input-group">
                <input type="password" id="regPassword" placeholder="Password (min 6 characters)">
            </div>
            <div class="input-group">
                <input type="tel" id="regPhone" placeholder="Phone number (optional)">
            </div>
            <button class="btn btn-primary" onclick="handleRegister()">Create Account</button>
            <div class="info-text">
                <i class="fas fa-info-circle"></i> A verification email will be sent
            </div>
        </div>
        
        <!-- Verify Email Message -->
        <div id="verifyMessage" class="form hidden">
            <div style="text-align: center;">
                <i class="fas fa-envelope-circle-check" style="font-size: 3rem; color: #667eea; margin-bottom: 1rem;"></i>
                <h3 style="margin-bottom: 1rem;">Verify Your Email</h3>
                <p style="color: #64748b; margin-bottom: 1.5rem;">We've sent a verification link to <span id="verifyEmail"></span></p>
                <button class="btn btn-primary" onclick="checkVerification()">I've Verified, Continue</button>
                <div class="link" style="margin-top: 1rem;">
                    <a onclick="resendVerification()">Resend verification email</a>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Alert Dialog -->
    <div class="overlay" id="overlay" onclick="hideAlert()"></div>
    <div class="alert-dialog" id="alertDialog">
        <i class="fas" id="alertIcon"></i>
        <h3 id="alertTitle"></h3>
        <p id="alertMessage"></p>
        <button onclick="hideAlert()">OK</button>
    </div>
    
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyChk2JA68-I5s1D0S10r9WK71LgTNi4hRQ",
            authDomain: "nextgen-5fb6f.firebaseapp.com",
            projectId: "nextgen-5fb6f",
            storageBucket: "nextgen-5fb6f.firebasestorage.app",
            messagingSenderId: "100132076455",
            appId: "1:100132076455:web:c5aea1f6e1a5ebbea99482"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let currentUser = null;
        
        // Generate referral code from user ID
        function generateReferralCode(userId) {
            return userId.substring(0, 8).toUpperCase();
        }
        
        // NEW: Get referral code from clean URL or query parameter
        function getReferralCodeFromUrl() {
            // First check query parameters (backward compatibility)
            const urlParams = new URLSearchParams(window.location.search);
            const queryRef = urlParams.get('ref');
            
            if (queryRef) {
                return queryRef;
            }
            
            // Then check for clean URL patterns like /register/CODE or /join/CODE
            const path = window.location.pathname;
            
            // Match patterns: /register/CODE, /join/CODE, /signup/CODE, /ref/CODE, /r/CODE
            const cleanUrlMatch = path.match(/\/(?:register|join|signup|ref|r)\/([a-zA-Z0-9_-]+)/i);
            
            if (cleanUrlMatch && cleanUrlMatch[1]) {
                return cleanUrlMatch[1];
            }
            
            // Also check for just /CODE at the end (if page is at root)
            // This would match yoursite.com/CODE
            if (path.split('/').length === 2 && path !== '/') {
                const possibleCode = path.substring(1); // Remove leading slash
                // Only treat as code if it looks like a referral code (alphanumeric, reasonable length)
                if (possibleCode.length >= 4 && possibleCode.length <= 20 && /^[a-zA-Z0-9_-]+$/.test(possibleCode)) {
                    return possibleCode;
                }
            }
            
            return null;
        }
        
        // Check for referrer on page load
        async function checkForReferrer() {
            const referralCode = getReferralCodeFromUrl();
            
            if (referralCode) {
                console.log('Referral code detected:', referralCode); // For debugging
                
                // Store referral code in session storage for later use
                sessionStorage.setItem('pendingReferral', referralCode);
                
                // Try to get referrer name
                try {
                    const usersSnapshot = await db.collection('users').get();
                    let found = false;
                    
                    for (const userDoc of usersSnapshot.docs) {
                        const userCode = generateReferralCode(userDoc.id);
                        if (userCode === referralCode) {
                            const referrerName = userDoc.data().displayName || 'A NextGen user';
                            showReferrerMessage(referrerName);
                            found = true;
                            break;
                        }
                    }
                    
                    if (!found) {
                        // Still show generic message if code is present but user not found
                        showReferrerMessage('a NextGen user');
                    }
                } catch (error) {
                    console.log('Could not fetch referrer name, but referral code saved');
                    // Still show a generic message
                    showReferrerMessage('a NextGen user');
                }
            }
        }
        
        // Show referrer message
        function showReferrerMessage(name) {
            const container = document.getElementById('referrerMessageContainer');
            container.innerHTML = `
                <div class="referrer-message">
                    <i class="fas fa-user-plus"></i>
                    <div>
                        Referred by <strong>${name}</strong>
                        <span class="bonus-badge">+$0.5 bonus</span>
                    </div>
                </div>
            `;
        }
        
        // Call referrer check when page loads
        document.addEventListener('DOMContentLoaded', checkForReferrer);
        
        // Alert functions
        function showAlert(message, type = 'error') {
            const alertDialog = document.getElementById('alertDialog');
            const overlay = document.getElementById('overlay');
            const alertIcon = document.getElementById('alertIcon');
            const alertTitle = document.getElementById('alertTitle');
            const alertMessage = document.getElementById('alertMessage');
            
            alertDialog.className = 'alert-dialog ' + type;
            alertIcon.className = 'fas ' + (type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle');
            alertTitle.textContent = type === 'error' ? 'Error!' : 'Success!';
            alertMessage.textContent = message;
            
            alertDialog.classList.add('show');
            overlay.classList.add('show');
        }
        
        function hideAlert() {
            document.getElementById('alertDialog').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
        }
        
        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('verifyMessage').classList.add('hidden');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
                document.getElementById('verifyMessage').classList.add('hidden');
            }
        }
        
        // Show verify view
        function showVerifyView(email) {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('verifyMessage').classList.remove('hidden');
            document.getElementById('verifyEmail').textContent = email;
        }
        
        // Handle Registration
        async function handleRegister() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const phone = document.getElementById('regPhone').value;
            
            if (!name || !email || !password) {
                showAlert('Please fill all required fields', 'error');
                return;
            }
            
            if (password.length < 6) {
                showAlert('Password must be at least 6 characters', 'error');
                return;
            }
            
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, password);
                await cred.user.sendEmailVerification();
                
                // Check for referrer in session storage
                const referralCode = sessionStorage.getItem('pendingReferral');
                let referredBy = null;
                
                if (referralCode) {
                    try {
                        // Try to find the referrer
                        const usersSnapshot = await db.collection('users').get();
                        for (const userDoc of usersSnapshot.docs) {
                            const userCode = generateReferralCode(userDoc.id);
                            if (userCode === referralCode) {
                                referredBy = userDoc.id;
                                break;
                            }
                        }
                    } catch (error) {
                        console.log('Could not verify referrer, but will try to save referral code');
                    }
                    
                    // Clear the pending referral
                    sessionStorage.removeItem('pendingReferral');
                }
                
                // Create user document
                const userData = {
                    email,
                    displayName: name,
                    phone: phone || '',
                    role: 'user',
                    wallet: 0,
                    active: true,
                    verified: false,
                    membershipType: 'basic',
                    membershipPaid: false,
                    membershipStatus: 'pending',
                    totalFeesPaid: 0,
                    unreadMessages: 0,
                    totalReferrals: 0,
                    referralEarnings: 0,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                
                // Add referredBy if exists
                if (referredBy) {
                    userData.referredBy = referredBy;
                }
                
                await db.collection('users').doc(cred.user.uid).set(userData);
                
                // Create referral record if they were referred
                if (referredBy) {
                    try {
                        await db.collection('referrals').add({
                            referrerId: referredBy,
                            referredId: cred.user.uid,
                            referredEmail: email,
                            referredName: name,
                            status: 'pending',
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    } catch (error) {
                        console.log('Referral record creation failed, but user was created');
                    }
                }
                
                showVerifyView(email);
                showAlert('Verification email sent!', 'success');
            } catch (error) {
                console.error('Registration error:', error);
                showAlert(error.message, 'error');
            }
        }
        
        // Handle Login
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showAlert('Please enter email and password', 'error');
                return;
            }
            
            try {
                await auth.signInWithEmailAndPassword(email, password);
            } catch (error) {
                showAlert(error.message, 'error');
            }
        }
        
        // Handle Google Login
        async function handleGoogleLogin() {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                
                const userRef = db.collection('users').doc(user.uid);
                const userDoc = await userRef.get();
                
                if (!userDoc.exists) {
                    // Check for referrer in session storage
                    const referralCode = sessionStorage.getItem('pendingReferral');
                    let referredBy = null;
                    
                    if (referralCode) {
                        try {
                            const usersSnapshot = await db.collection('users').get();
                            for (const userDoc of usersSnapshot.docs) {
                                const userCode = generateReferralCode(userDoc.id);
                                if (userCode === referralCode) {
                                    referredBy = userDoc.id;
                                    break;
                                }
                            }
                        } catch (error) {
                            console.log('Could not verify referrer for Google sign-up');
                        }
                        
                        sessionStorage.removeItem('pendingReferral');
                    }
                    
                    const userData = {
                        email: user.email,
                        displayName: user.displayName,
                        phone: '',
                        role: 'user',
                        wallet: 0,
                        active: true,
                        verified: true,
                        membershipType: 'basic',
                        membershipPaid: false,
                        membershipStatus: 'pending',
                        totalFeesPaid: 0,
                        unreadMessages: 0,
                        totalReferrals: 0,
                        referralEarnings: 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    
                    if (referredBy) {
                        userData.referredBy = referredBy;
                    }
                    
                    await userRef.set(userData);
                    
                    if (referredBy) {
                        try {
                            await db.collection('referrals').add({
                                referrerId: referredBy,
                                referredId: user.uid,
                                referredEmail: user.email,
                                referredName: user.displayName,
                                status: 'pending',
                                createdAt: firebase.firestore.FieldValue.serverTimestamp()
                            });
                        } catch (error) {
                            console.log('Referral record creation failed for Google user');
                        }
                    }
                }
            } catch (error) {
                showAlert(error.message, 'error');
            }
        }
        
        // Check Verification
        async function checkVerification() {
            if (auth.currentUser) {
                await auth.currentUser.reload();
                if (auth.currentUser.emailVerified) {
                    await db.collection('users').doc(auth.currentUser.uid).update({ verified: true });
                    window.location.href = 'user-dashboard.html';
                } else {
                    showAlert('Email not verified yet', 'error');
                }
            }
        }
        
        // Resend Verification
        async function resendVerification() {
            if (auth.currentUser) {
                await auth.currentUser.sendEmailVerification();
                showAlert('Verification email resent!', 'success');
            }
        }
        
        // Auth State Observer
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const isGoogle = user.providerData.some(p => p.providerId === 'google.com');
                
                if (!user.emailVerified && !isGoogle) {
                    showVerifyView(user.email);
                    return;
                }
                
                try {
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    if (userDoc.exists) {
                        const userData = userDoc.data();
                        
                        if (userData.active === false) {
                            await auth.signOut();
                            showAlert('Account deactivated', 'error');
                            return;
                        }
                        
                        if (userData.role === 'admin') {
                            window.location.href = 'admin-dashboard.html';
                        } else {
                            window.location.href = 'user-dashboard.html';
                        }
                    }
                } catch (error) {
                    console.error('Error checking user data:', error);
                }
            }
        });
    </script>
</body>
</html>
