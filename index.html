<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen HUB | Academic Hub</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        /* Intro Overlay - refined metallic */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 40% 40%, #c5b8a4, #9b8f7a, #6a6256, #3e3a34);
            background-size: 250% 250%;
            animation: subtleShift 5s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            transition: opacity 1.2s cubic-bezier(0.65, 0, 0.35, 1);
            opacity: 1;
            pointer-events: none;
        }
        
        @keyframes subtleShift {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }
        
        .intro-content {
            text-align: center;
            color: #fff;
            text-shadow: 0 4px 30px rgba(0,0,0,0.6);
            transform: translateY(0);
            animation: professionalFloat 3s ease-in-out infinite;
            padding: 1rem;
        }
        
        @keyframes professionalFloat {
            0% { transform: translateY(0px); filter: drop-shadow(0 0 5px #e9d19b); }
            50% { transform: translateY(-8px); filter: drop-shadow(0 0 20px #dbb45c); }
            100% { transform: translateY(0px); filter: drop-shadow(0 0 5px #ccb16b); }
        }
        
        /* Intro logo styling */
        .intro-logo {
            max-width: 80%;
            max-height: 300px;
            object-fit: contain;
            animation: fadeReveal 1.8s ease;
            filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));
            border-radius: 20px; /* optional, in case logo has sharp corners */
        }
        
        @keyframes fadeReveal {
            0% { opacity: 0; letter-spacing: 6px; filter: blur(8px); }
            100% { opacity: 1; letter-spacing: normal; filter: blur(0); }
        }
        
        .intro-overlay.fade-out {
            opacity: 0;
        }
        
        /* Main background - elegant metallic neutral */
        body {
            background: linear-gradient(145deg, #dbd0bd 0%, #b8aa92 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }
        
        /* Professional card - clean, elevated, subtle metallic */
        .auth-card {
            background: rgba(255, 251, 242, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 2.75rem 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 
                0 30px 60px -20px rgba(40, 30, 10, 0.5),
                0 0 0 1px rgba(210, 180, 140, 0.25) inset,
                0 0 0 1px rgba(255, 245, 220, 0.7);
            border: 1px solid rgba(230, 210, 170, 0.4);
            transition: transform 0.3s ease;
        }
        
        .auth-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 40px 70px -20px #3d3429, 0 0 0 1px #dac292 inset;
        }
        
        /* Logo inside the auth card */
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .card-logo {
            max-width: 100%;
            height: auto;
            max-height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 2px 8px rgba(120, 90, 40, 0.2));
        }
        
        /* Tabs - clean, professional */
        .tabs {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
            background: #efeadb;
            padding: 0.4rem;
            border-radius: 48px;
        }
        
        .tab {
            flex: 1;
            padding: 0.85rem 0.5rem;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            background: transparent;
            color: #655a4a;
            cursor: pointer;
            transition: all 0.25s;
            border: 1px solid transparent;
        }
        
        .tab.active {
            background: #ffffff;
            color: #413a2c;
            box-shadow: 0 6px 14px rgba(160, 130, 70, 0.2);
            border: 1px solid #eedbba;
            font-weight: 600;
        }
        
        /* Forms */
        .form { display: block; }
        .form.hidden { display: none; }
        
        .input-group {
            margin-bottom: 1.25rem;
        }
        
        .input-group input, 
        .input-group select {
            width: 100%;
            padding: 1rem 1.2rem;
            border-radius: 60px;
            border: 1.5px solid #e0d3be;
            background: #fffdf8;
            font-size: 0.95rem;
            transition: all 0.2s;
            color: #2f2a21;
        }
        
        .input-group input:focus {
            border-color: #c8aa6b;
            outline: none;
            box-shadow: 0 0 0 4px rgba(200, 170, 107, 0.15);
            background: #ffffff;
        }
        
        .input-group input::placeholder {
            color: #aaa08b;
            font-weight: 300;
        }
        
        /* Buttons */
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: 0.2px;
        }
        
        .btn-primary {
            background: linear-gradient(115deg, #ad8f56, #c7aa70);
            color: #232018;
            border: 1px solid #e7cf99;
            box-shadow: 0 10px 18px -10px #7a653d;
        }
        
        .btn-primary:hover {
            background: linear-gradient(115deg, #b5985c, #d2b67b);
            box-shadow: 0 14px 22px -8px #8d7443;
            transform: scale(1.01);
        }
        
        .btn-google {
            background: #ffffff;
            color: #413a2e;
            border: 1.5px solid #dad0bc;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .btn-google:hover {
            background: #fcf8f0;
            border-color: #c5ae82;
        }
        
        .divider {
            text-align: center;
            margin: 1.8rem 0;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #cbb48b, transparent);
        }
        
        .divider span {
            background: rgba(255, 251, 242, 0.95);
            padding: 0 1.2rem;
            position: relative;
            color: #7e6e51;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .link {
            text-align: center;
            margin-top: 1rem;
        }
        
        .link a {
            color: #9d853e;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            border-bottom: 1px dashed #d4b985;
        }
        
        /* Forgot password link */
        .forgot-password {
            text-align: right;
            margin-top: -0.5rem;
            margin-bottom: 1.25rem;
        }
        
        .forgot-password a {
            color: #9d853e;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border-bottom: 1px dashed #d4b985;
        }
        
        .info-text {
            text-align: center;
            color: #796b51;
            margin: 1.2rem 0 0;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }
        
        /* Referrer message refined */
        .referrer-message {
            background: #f6efe2;
            border-left: 4px solid #c5a159;
            padding: 1rem 1.2rem;
            margin-bottom: 1.8rem;
            border-radius: 60px;
            font-size: 0.95rem;
            color: #3a3326;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            box-shadow: 0 3px 10px rgba(170, 140, 70, 0.1);
        }
        
        .bonus-badge {
            background: #d8b87a;
            color: #2f2a1f;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-left: 0.6rem;
            letter-spacing: 0.3px;
        }
        
        /* alert dialog */
        .alert-dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fffcf2;
            padding: 2rem;
            border-radius: 32px;
            box-shadow: 0 40px 70px -20px #2f2a20;
            z-index: 2000;
            max-width: 380px;
            width: 90%;
            text-align: center;
            display: none;
            border: 1px solid #ecdbbd;
        }
        .alert-dialog.show { display: block; }
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(25, 20, 10, 0.5);
            z-index: 1999;
            display: none;
        }
        .overlay.show { display: block; }
        
        /* verify message */
        #verifyMessage h3 { color: #3d3425; }
        
        /* Reset password modal */
        .reset-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fffcf2;
            padding: 2.5rem;
            border-radius: 32px;
            box-shadow: 0 40px 70px -20px #2f2a20;
            z-index: 2500;
            max-width: 400px;
            width: 90%;
            display: none;
            border: 1px solid #ecdbbd;
        }
        .reset-modal.show { display: block; }
        .reset-modal h2 {
            color: #3d3425;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }
        .reset-modal p {
            color: #6b5e48;
            margin-bottom: 1.8rem;
        }
        .close-modal {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 1.8rem;
            cursor: pointer;
            color: #9d853e;
        }
    </style>
</head>
<body>
    <!-- Intro overlay with logo only -->
    <div class="intro-overlay" id="introOverlay">
        <div class="intro-content">
            <img src="logo.jpg" alt="NextGen Hub Logo" class="intro-logo">
        </div>
    </div>

    <div class="auth-card">
        <div class="logo">
            <!-- Replaced text with image logo -->
            <img src="logo.jpg" alt="NextGen Hub Logo" class="card-logo">
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Log in</button>
            <button class="tab" onclick="switchTab('register')">Register</button>
        </div>
        
        <div id="referrerMessageContainer"></div>
        
        <!-- Login Form -->
        <div id="loginForm" class="form">
            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="Email address">
            </div>
            <div class="input-group">
                <input type="password" id="loginPassword" placeholder="Password">
            </div>
            
            <!-- Forgot Password Link -->
            <div class="forgot-password">
                <a onclick="showResetPasswordModal()">Forgot password?</a>
            </div>
            
            <button class="btn btn-primary" onclick="handleLogin()">Sign in</button>
            
            <div class="divider">
                <span>or continue with</span>
            </div>
            
            <button class="btn btn-google" onclick="handleGoogleLogin()">
                <i class="fab fa-google"></i> Google
            </button>
        </div>
        
        <!-- Register Form -->
        <div id="registerForm" class="form hidden">
            <div class="input-group">
                <input type="text" id="regName" placeholder="Full name">
            </div>
            <div class="input-group">
                <input type="email" id="regEmail" placeholder="Email address">
            </div>
            <div class="input-group">
                <input type="password" id="regPassword" placeholder="Password (min. 6 characters)">
            </div>
            <div class="input-group">
                <input type="tel" id="regPhone" placeholder="Phone number (optional)">
            </div>
            <button class="btn btn-primary" onclick="handleRegister()">Create account</button>
            <div class="info-text">
                <i class="fas fa-envelope fa-sm"></i> Verification email will be sent
            </div>
        </div>
        
        <!-- Verify Email Message -->
        <div id="verifyMessage" class="form hidden">
            <div style="text-align: center;">
                <i class="fas fa-envelope-open-text" style="font-size: 3rem; color: #b4945a; margin-bottom: 1rem;"></i>
                <h3 style="margin-bottom: 0.75rem; font-weight: 600;">Verify your email</h3>
                <p style="color: #6b5e48; margin-bottom: 2rem;">We've sent a link to <strong id="verifyEmail"></strong></p>
                <button class="btn btn-primary" onclick="checkVerification()">I've verified — continue</button>
                <div class="link" style="margin-top: 1.5rem;">
                    <a onclick="resendVerification()">Resend email</a>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Reset Password Modal -->
    <div class="overlay" id="resetOverlay" onclick="hideResetPasswordModal()"></div>
    <div class="reset-modal" id="resetModal">
        <span class="close-modal" onclick="hideResetPasswordModal()">&times;</span>
        <h2>Reset Password</h2>
        <p>Enter your email address and we'll send you a link to reset your password.</p>
        <div class="input-group">
            <input type="email" id="resetEmail" placeholder="Your email address">
        </div>
        <button class="btn btn-primary" onclick="handlePasswordReset()">Send Reset Link</button>
        <div class="link" style="margin-top: 1.5rem;">
            <a onclick="hideResetPasswordModal()">Back to login</a>
        </div>
    </div>
    
    <!-- Alert Dialog -->
    <div class="overlay" id="overlay" onclick="hideAlert()"></div>
    <div class="alert-dialog" id="alertDialog">
        <i class="fas" id="alertIcon"></i>
        <h3 id="alertTitle"></h3>
        <p id="alertMessage"></p>
        <button class="btn btn-primary" style="width: auto; padding: 0.75rem 2rem;" onclick="hideAlert()">OK</button>
    </div>
    
    <script>
        // Fade out intro after animation (allowing time for logo to be seen)
        window.addEventListener('load', function() {
            const intro = document.getElementById('introOverlay');
            setTimeout(() => {
                intro.classList.add('fade-out');
                setTimeout(() => intro.style.display = 'none', 1200);
            }, 3000); // slightly shorter than before because no typewriter, but still pleasant
        });

        // Firebase Config (unchanged, functional)
        const firebaseConfig = {
            apiKey: "AIzaSyChk2JA68-I5s1D0S10r9WK71LgTNi4hRQ",
            authDomain: "nextgen-5fb6f.firebaseapp.com",
            projectId: "nextgen-5fb6f",
            storageBucket: "nextgen-5fb6f.firebasestorage.app",
            messagingSenderId: "100132076455",
            appId: "1:100132076455:web:c5aea1f6e1a5ebbea99482"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        function generateReferralCode(userId) {
            return userId.substring(0, 8).toUpperCase();
        }
        
        function getReferralCodeFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const queryRef = urlParams.get('ref');
            if (queryRef) return queryRef;
            const path = window.location.pathname;
            const match = path.match(/\/(?:register|join|signup|ref|r)\/([a-zA-Z0-9_-]+)/i);
            if (match && match[1]) return match[1];
            if (path.split('/').length === 2 && path !== '/') {
                const code = path.substring(1);
                if (code.length >= 4 && code.length <= 20 && /^[a-zA-Z0-9_-]+$/.test(code)) return code;
            }
            return null;
        }
        
        async function checkForReferrer() {
            const refCode = getReferralCodeFromUrl();
            if (!refCode) return;
            sessionStorage.setItem('pendingReferral', refCode);
            try {
                const snapshot = await db.collection('users').get();
                let found = false;
                for (const doc of snapshot.docs) {
                    if (generateReferralCode(doc.id) === refCode) {
                        const name = doc.data().displayName || 'a NextGen user';
                        showReferrerMessage(name);
                        found = true;
                        break;
                    }
                }
                if (!found) showReferrerMessage('a NextGen user');
            } catch {
                showReferrerMessage('a NextGen user');
            }
        }
        
        function showReferrerMessage(name) {
            document.getElementById('referrerMessageContainer').innerHTML = `
                <div class="referrer-message">
                    <i class="fas fa-user-check" style="color:#b4945a;"></i>
                    <div>Referred by <strong>${name}</strong> <span class="bonus-badge">+$0.5 bonus</span></div>
                </div>
            `;
        }
        document.addEventListener('DOMContentLoaded', checkForReferrer);
        
        // UI helpers
        function showAlert(msg, type='error') {
            const d = document.getElementById('alertDialog');
            document.getElementById('overlay').classList.add('show');
            d.classList.add('show');
            document.getElementById('alertIcon').className = 'fas ' + (type==='error' ? 'fa-exclamation-circle' : 'fa-check-circle');
            document.getElementById('alertTitle').innerText = type==='error' ? 'Error' : 'Success';
            document.getElementById('alertMessage').innerText = msg;
        }
        function hideAlert() {
            document.getElementById('alertDialog').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
            document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
            document.getElementById('verifyMessage').classList.add('hidden');
            hideResetPasswordModal(); // Hide reset modal when switching tabs
        }
        
        function showVerifyView(email) {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('verifyMessage').classList.remove('hidden');
            document.getElementById('verifyEmail').innerText = email;
        }
        
        // Reset Password Functions
        function showResetPasswordModal() {
            document.getElementById('resetModal').classList.add('show');
            document.getElementById('resetOverlay').classList.add('show');
            document.getElementById('resetEmail').value = ''; // Clear previous input
        }
        
        function hideResetPasswordModal() {
            document.getElementById('resetModal').classList.remove('show');
            document.getElementById('resetOverlay').classList.remove('show');
        }
        
        async function handlePasswordReset() {
            const email = document.getElementById('resetEmail').value;
            
            if (!email) {
                showAlert('Please enter your email address', 'error');
                return;
            }
            
            // Simple email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showAlert('Please enter a valid email address', 'error');
                return;
            }
            
            try {
                // Firebase password reset
                await auth.sendPasswordResetEmail(email);
                
                // Hide the reset modal
                hideResetPasswordModal();
                
                // Show success message
                showAlert(`Password reset email sent to ${email}. Please check your inbox.`, 'success');
                
            } catch (error) {
                console.error('Password reset error:', error);
                
                // Handle specific Firebase errors
                switch (error.code) {
                    case 'auth/user-not-found':
                        showAlert('No account found with this email address.', 'error');
                        break;
                    case 'auth/invalid-email':
                        showAlert('Invalid email address format.', 'error');
                        break;
                    case 'auth/too-many-requests':
                        showAlert('Too many requests. Please try again later.', 'error');
                        break;
                    default:
                        showAlert('Failed to send reset email. Please try again.', 'error');
                }
            }
        }
        
        async function handleRegister() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pwd = document.getElementById('regPassword').value;
            const phone = document.getElementById('regPhone').value;
            if (!name || !email || !pwd) return showAlert('All required fields', 'error');
            if (pwd.length < 6) return showAlert('Password min 6 chars', 'error');
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, pwd);
                await cred.user.sendEmailVerification();
                const referralCode = sessionStorage.getItem('pendingReferral');
                let referredBy = null;
                if (referralCode) {
                    const snap = await db.collection('users').get();
                    for (const doc of snap.docs) {
                        if (generateReferralCode(doc.id) === referralCode) { referredBy = doc.id; break; }
                    }
                    sessionStorage.removeItem('pendingReferral');
                }
                const userData = { email, displayName: name, phone, role:'user', wallet:0, active:true, verified:false,
                    membershipType:'basic', membershipPaid:false, membershipStatus:'pending', totalFeesPaid:0,
                    unreadMessages:0, totalReferrals:0, referralEarnings:0, createdAt: firebase.firestore.FieldValue.serverTimestamp() };
                if (referredBy) userData.referredBy = referredBy;
                await db.collection('users').doc(cred.user.uid).set(userData);
                if (referredBy) {
                    await db.collection('referrals').add({ referrerId: referredBy, referredId: cred.user.uid, referredEmail: email, referredName: name, status: 'pending', createdAt: firebase.firestore.FieldValue.serverTimestamp() }).catch(()=>{});
                }
                showVerifyView(email);
                showAlert('Verification email sent!', 'success');
            } catch (e) { showAlert(e.message, 'error'); }
        }
        
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const pwd = document.getElementById('loginPassword').value;
            if (!email || !pwd) return showAlert('Enter credentials', 'error');
            try { await auth.signInWithEmailAndPassword(email, pwd); } 
            catch (e) { showAlert(e.message, 'error'); }
        }
        
        async function handleGoogleLogin() {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const res = await auth.signInWithPopup(provider);
                const user = res.user;
                const userRef = db.collection('users').doc(user.uid);
                const doc = await userRef.get();
                if (!doc.exists) {
                    let referredBy = null;
                    const refCode = sessionStorage.getItem('pendingReferral');
                    if (refCode) {
                        const snap = await db.collection('users').get();
                        for (const d of snap.docs) {
                            if (generateReferralCode(d.id) === refCode) { referredBy = d.id; break; }
                        }
                        sessionStorage.removeItem('pendingReferral');
                    }
                    const data = { email: user.email, displayName: user.displayName, phone:'', role:'user', wallet:0, active:true, verified:true,
                        membershipType:'basic', membershipPaid:false, membershipStatus:'pending', totalFeesPaid:0,
                        unreadMessages:0, totalReferrals:0, referralEarnings:0, createdAt: firebase.firestore.FieldValue.serverTimestamp() };
                    if (referredBy) data.referredBy = referredBy;
                    await userRef.set(data);
                    if (referredBy) {
                        await db.collection('referrals').add({ referrerId: referredBy, referredId: user.uid, referredEmail: user.email, referredName: user.displayName, status:'pending', createdAt: firebase.firestore.FieldValue.serverTimestamp() }).catch(()=>{});
                    }
                }
            } catch (e) { showAlert(e.message, 'error'); }
        }
        
        async function checkVerification() {
            if (!auth.currentUser) return;
            await auth.currentUser.reload();
            if (auth.currentUser.emailVerified) {
                await db.collection('users').doc(auth.currentUser.uid).update({ verified: true });
                window.location.href = 'user-dashboard.html';
            } else showAlert('Email not verified yet', 'error');
        }
        
        async function resendVerification() {
            if (auth.currentUser) {
                await auth.currentUser.sendEmailVerification();
                showAlert('Verification resent!', 'success');
            }
        }
        
        auth.onAuthStateChanged(async (user) => {
            if (!user) return;
            const isGoogle = user.providerData.some(p => p.providerId === 'google.com');
            if (!user.emailVerified && !isGoogle) { showVerifyView(user.email); return; }
            try {
                const udoc = await db.collection('users').doc(user.uid).get();
                if (!udoc.exists) return;
                const data = udoc.data();
                if (data.active === false) { await auth.signOut(); showAlert('Account disabled', 'error'); return; }
                window.location.href = data.role === 'admin' ? 'admin-dashboard.html' : 'user-dashboard.html';
            } catch (e) { console.error(e); }
        });
    </script>
</body>
</html>
