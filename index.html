<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Pay - Financial Platform</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert for notifications -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Day.js for date handling -->
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
</head>
<body class="bg-gray-100">
    <!-- Navigation Bar -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold text-blue-600">Urban Pay</h1>
                </div>
                <div class="flex items-center space-x-4" id="navLinks">
                    <!-- Dynamic navigation based on login state -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <div class="container mx-auto px-4 py-8" id="app">
        <!-- Login/Register Forms will be injected here -->
        <!-- Dashboard content will be injected here -->
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword,
            signOut,
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import {
            getFirestore,
            collection,
            addDoc,
            query,
            where,
            getDocs,
            getDoc,
            doc,
            setDoc,
            updateDoc,
            deleteDoc,
            orderBy,
            Timestamp
        } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-analytics.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDm-PeCeRdlx6TKPEvKNdT93lMqb5D5O20",
            authDomain: "urbanpay-c5aee.firebaseapp.com",
            projectId: "urbanpay-c5aee",
            storageBucket: "urbanpay-c5aee.firebasestorage.app",
            messagingSenderId: "648155825006",
            appId: "1:648155825006:web:16d6ea4dfab808920b777f",
            measurementId: "G-CTKZN6VHPS"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Global state
        let currentUser = null;
        let userRole = null;

        // Make functions available globally
        window.showLoginForm = showLoginForm;
        window.showRegisterForm = showRegisterForm;
        window.showAdminTab = showAdminTab;
        window.showUserTab = showUserTab;
        window.adjustWallet = adjustWallet;
        window.toggleUserStatus = toggleUserStatus;
        window.viewUserDetails = viewUserDetails;
        window.assignTaskToUser = assignTaskToUser;
        window.showCreateTaskForm = showCreateTaskForm;
        window.completeTask = completeTask;
        window.reviewTask = reviewTask;
        window.editTask = editTask;
        window.deleteTask = deleteTask;
        window.markAsPaid = markAsPaid;
        window.rejectWithdrawal = rejectWithdrawal;
        window.showCreatePackageForm = showCreatePackageForm;
        window.editPackage = editPackage;
        window.togglePackageStatus = togglePackageStatus;
        window.subscribeToPackage = subscribeToPackage;
        window.processPayment = processPayment;
        window.replyToFeedback = replyToFeedback;
        window.cancelSubscription = cancelSubscription;
        window.viewWithdrawalDetails = viewWithdrawalDetails;
        window.viewSubscriptionDetails = viewSubscriptionDetails;
        window.exportUsersData = exportUsersData;

        // Initialize the app
        document.addEventListener('DOMContentLoaded', () => {
            checkAuthState();
        });

        // Check authentication state
        function checkAuthState() {
            onAuthStateChanged(auth, async (user) => {
                try {
                    if (user) {
                        currentUser = user;
                        const userDocRef = doc(db, 'users', user.uid);
                        const userDoc = await getDoc(userDocRef);
                        
                        if (userDoc.exists()) {
                            userRole = userDoc.data().role;
                            updateNavigation(true);
                            await showDashboard(userDoc.data());
                        } else {
                            // Create user document if it doesn't exist
                            const userData = {
                                uid: user.uid,
                                email: user.email,
                                firstName: user.email.split('@')[0],
                                lastName: '',
                                role: 'user',
                                walletBalance: 0,
                                totalEarned: 0,
                                totalWithdrawn: 0,
                                isActive: true,
                                createdAt: Timestamp.now()
                            };
                            await setDoc(userDocRef, userData);
                            userRole = 'user';
                            updateNavigation(true);
                            await showDashboard(userData);
                        }
                    } else {
                        currentUser = null;
                        userRole = null;
                        updateNavigation(false);
                        showLoginForm();
                    }
                } catch (error) {
                    console.error("Auth state error:", error);
                    updateNavigation(false);
                    showLoginForm();
                }
            });
        }

        // Update navigation based on auth state
        function updateNavigation(isLoggedIn) {
            const navLinks = document.getElementById('navLinks');
            if (isLoggedIn && currentUser) {
                navLinks.innerHTML = `
                    <span class="text-gray-700">Welcome, ${currentUser.email}</span>
                    <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
                        <i class="fas fa-sign-out-alt mr-2"></i>Logout
                    </button>
                `;
                document.getElementById('logoutBtn').addEventListener('click', handleLogout);
            } else {
                navLinks.innerHTML = `
                    <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600" onclick="window.showLoginForm()">
                        <i class="fas fa-sign-in-alt mr-2"></i>Login
                    </button>
                    <button class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600" onclick="window.showRegisterForm()">
                        <i class="fas fa-user-plus mr-2"></i>Register
                    </button>
                `;
            }
        }

        // Show login form
        function showLoginForm() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-2xl font-bold mb-6 text-center">Login to Urban Pay</h2>
                    <form id="loginForm" class="space-y-4">
                        <div>
                            <label class="block text-gray-700 mb-2" for="email">Email</label>
                            <input type="email" id="email" class="w-full px-3 py-2 border rounded focus:outline-none focus:border-blue-500" required>
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2" for="password">Password</label>
                            <input type="password" id="password" class="w-full px-3 py-2 border rounded focus:outline-none focus:border-blue-500" required>
                        </div>
                        <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600 transition">
                            Login
                        </button>
                    </form>
                    <p class="mt-4 text-center text-gray-600">
                        Don't have an account? 
                        <a href="#" id="showRegister" class="text-blue-500 hover:underline">Register here</a>
                    </p>
                </div>
            `;

            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('showRegister').addEventListener('click', (e) => {
                e.preventDefault();
                showRegisterForm();
            });
        }

        // Show register form
        function showRegisterForm() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-2xl font-bold mb-6 text-center">Register for Urban Pay</h2>
                    <form id="registerForm" class="space-y-4">
                        <div>
                            <label class="block text-gray-700 mb-2" for="firstName">First Name</label>
                            <input type="text" id="firstName" class="w-full px-3 py-2 border rounded focus:outline-none focus:border-blue-500" required>
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2" for="lastName">Last Name</label>
                            <input type="text" id="lastName" class="w-full px-3 py-2 border rounded focus:outline-none focus:border-blue-500" required>
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2" for="email">Email</label>
                            <input type="email" id="email" class="w-full px-3 py-2 border rounded focus:outline-none focus:border-blue-500" required>
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2" for="password">Password</label>
                            <input type="password" id="password" class="w-full px-3 py-2 border rounded focus:outline-none focus:border-blue-500" required>
                        </div>
                        <button type="submit" class="w-full bg-green-500 text-white py-2 rounded hover:bg-green-600 transition">
                            Register
                        </button>
                    </form>
                    <p class="mt-4 text-center text-gray-600">
                        Already have an account? 
                        <a href="#" id="showLogin" class="text-blue-500 hover:underline">Login here</a>
                    </p>
                </div>
            `;

            document.getElementById('registerForm').addEventListener('submit', handleRegister);
            document.getElementById('showLogin').addEventListener('click', (e) => {
                e.preventDefault();
                showLoginForm();
            });
        }

        // Handle login
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                Swal.fire('Success!', 'Logged in successfully', 'success');
            } catch (error) {
                Swal.fire('Error!', error.message, 'error');
            }
        }

        // Handle register
        async function handleRegister(e) {
            e.preventDefault();
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await setDoc(doc(db, 'users', user.uid), {
                    uid: user.uid,
                    email: email,
                    firstName: firstName,
                    lastName: lastName,
                    role: 'user',
                    walletBalance: 0,
                    totalEarned: 0,
                    totalWithdrawn: 0,
                    isActive: true,
                    createdAt: Timestamp.now()
                });

                Swal.fire('Success!', 'Registration successful!', 'success');
            } catch (error) {
                Swal.fire('Error!', error.message, 'error');
            }
        }

        // Handle logout
        async function handleLogout() {
            try {
                await signOut(auth);
                Swal.fire('Success!', 'Logged out successfully', 'success');
            } catch (error) {
                Swal.fire('Error!', error.message, 'error');
            }
        }

        // Show dashboard based on role
        async function showDashboard(userData) {
            const app = document.getElementById('app');
            
            try {
                if (userRole === 'admin') {
                    await showAdminDashboard(userData);
                } else {
                    await showUserDashboard(userData);
                }
            } catch (error) {
                console.error("Dashboard error:", error);
                app.innerHTML = `<p class="text-red-500 text-center">Error loading dashboard: ${error.message}</p>`;
            }
        }

        // Admin Dashboard
        async function showAdminDashboard(userData) {
            const app = document.getElementById('app');
            
            try {
                // Fetch statistics with error handling
                let totalUsers = 0;
                let totalTransactions = 0;
                let pendingWithdrawalsCount = 0;
                let activeSubscriptionsCount = 0;

                try {
                    const usersSnapshot = await getDocs(collection(db, 'users'));
                    totalUsers = usersSnapshot.size;
                } catch (e) { console.error("Error fetching users:", e); }

                try {
                    const transactionsSnapshot = await getDocs(collection(db, 'transactions'));
                    totalTransactions = transactionsSnapshot.size;
                } catch (e) { console.error("Error fetching transactions:", e); }

                try {
                    const pendingWithdrawals = await getDocs(
                        query(collection(db, 'withdrawals'), where('status', '==', 'pending'))
                    );
                    pendingWithdrawalsCount = pendingWithdrawals.size;
                } catch (e) { console.error("Error fetching withdrawals:", e); }

                try {
                    const activeSubscriptions = await getDocs(
                        query(collection(db, 'subscriptions'), where('status', '==', 'active'))
                    );
                    activeSubscriptionsCount = activeSubscriptions.size;
                } catch (e) { console.error("Error fetching subscriptions:", e); }

                app.innerHTML = `
                    <div class="space-y-6">
                        <h2 class="text-3xl font-bold">Admin Dashboard</h2>
                        
                        <!-- Stats Cards -->
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                            <div class="bg-white rounded-lg shadow p-6">
                                <div class="flex items-center">
                                    <div class="bg-blue-500 rounded-full p-3 mr-4">
                                        <i class="fas fa-users text-white text-xl"></i>
                                    </div>
                                    <div>
                                        <p class="text-gray-500">Total Users</p>
                                        <p class="text-2xl font-bold">${totalUsers}</p>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="bg-white rounded-lg shadow p-6">
                                <div class="flex items-center">
                                    <div class="bg-green-500 rounded-full p-3 mr-4">
                                        <i class="fas fa-exchange-alt text-white text-xl"></i>
                                    </div>
                                    <div>
                                        <p class="text-gray-500">Transactions</p>
                                        <p class="text-2xl font-bold">${totalTransactions}</p>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="bg-white rounded-lg shadow p-6">
                                <div class="flex items-center">
                                    <div class="bg-yellow-500 rounded-full p-3 mr-4">
                                        <i class="fas fa-clock text-white text-xl"></i>
                                    </div>
                                    <div>
                                        <p class="text-gray-500">Pending Withdrawals</p>
                                        <p class="text-2xl font-bold">${pendingWithdrawalsCount}</p>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="bg-white rounded-lg shadow p-6">
                                <div class="flex items-center">
                                    <div class="bg-purple-500 rounded-full p-3 mr-4">
                                        <i class="fas fa-crown text-white text-xl"></i>
                                    </div>
                                    <div>
                                        <p class="text-gray-500">Active Subscriptions</p>
                                        <p class="text-2xl font-bold">${activeSubscriptionsCount}</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Admin Tabs -->
                        <div class="bg-white rounded-lg shadow">
                            <div class="border-b overflow-x-auto">
                                <nav class="flex -mb-px">
                                    <button onclick="window.showAdminTab('users')" class="px-6 py-3 text-blue-600 border-b-2 border-blue-500 font-medium whitespace-nowrap" id="tabUsers">
                                        <i class="fas fa-users mr-2"></i>Users
                                    </button>
                                    <button onclick="window.showAdminTab('tasks')" class="px-6 py-3 text-gray-500 hover:text-gray-700 font-medium whitespace-nowrap" id="tabTasks">
                                        <i class="fas fa-tasks mr-2"></i>Tasks
                                    </button>
                                    <button onclick="window.showAdminTab('withdrawals')" class="px-6 py-3 text-gray-500 hover:text-gray-700 font-medium whitespace-nowrap" id="tabWithdrawals">
                                        <i class="fas fa-money-bill-wave mr-2"></i>Withdrawals
                                    </button>
                                    <button onclick="window.showAdminTab('subscriptions')" class="px-6 py-3 text-gray-500 hover:text-gray-700 font-medium whitespace-nowrap" id="tabSubscriptions">
                                        <i class="fas fa-crown mr-2"></i>Subscriptions
                                    </button>
                                    <button onclick="window.showAdminTab('packages')" class="px-6 py-3 text-gray-500 hover:text-gray-700 font-medium whitespace-nowrap" id="tabPackages">
                                        <i class="fas fa-box mr-2"></i>Packages
                                    </button>
                                    <button onclick="window.showAdminTab('feedback')" class="px-6 py-3 text-gray-500 hover:text-gray-700 font-medium whitespace-nowrap" id="tabFeedback">
                                        <i class="fas fa-comment mr-2"></i>Feedback
                                    </button>
                                </nav>
                            </div>
                            
                            <div id="adminTabContent" class="p-6">
                                <!-- Tab content will be loaded here -->
                            </div>
                        </div>
                    </div>
                `;

                // Load default tab
                await showAdminTab('users');
            } catch (error) {
                console.error("Error loading admin dashboard:", error);
                app.innerHTML = `<p class="text-red-500">Error loading dashboard: ${error.message}</p>`;
            }
        }

        // Show admin tab content
        async function showAdminTab(tab) {
            // Update tab styles
            ['users', 'tasks', 'withdrawals', 'subscriptions', 'packages', 'feedback'].forEach(t => {
                const element = document.getElementById(`tab${t.charAt(0).toUpperCase() + t.slice(1)}`);
                if (element) {
                    if (t === tab) {
                        element.classList.add('text-blue-600', 'border-b-2', 'border-blue-500');
                        element.classList.remove('text-gray-500');
                    } else {
                        element.classList.remove('text-blue-600', 'border-b-2', 'border-blue-500');
                        element.classList.add('text-gray-500');
                    }
                }
            });

            const content = document.getElementById('adminTabContent');
            if (!content) return;
            
            // Show loading state
            content.innerHTML = '<div class="text-center py-8"><i class="fas fa-spinner fa-spin text-4xl text-blue-500"></i><p class="mt-2">Loading...</p></div>';
            
            try {
                switch(tab) {
                    case 'users':
                        await loadUsersManagement(content);
                        break;
                    case 'tasks':
                        await loadTasksManagement(content);
                        break;
                    case 'withdrawals':
                        await loadWithdrawalsManagement(content);
                        break;
                    case 'subscriptions':
                        await loadSubscriptionsManagement(content);
                        break;
                    case 'packages':
                        await loadPackagesManagement(content);
                        break;
                    case 'feedback':
                        await loadFeedbackManagement(content);
                        break;
                }
            } catch (error) {
                console.error(`Error loading ${tab} tab:`, error);
                content.innerHTML = `<p class="text-red-500">Error loading ${tab}: ${error.message}</p>`;
            }
        }

        // Load users management
        async function loadUsersManagement(contentElement) {
            try {
                const usersSnapshot = await getDocs(collection(db, 'users'));
                
                let html = `
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xl font-bold">Users Management</h3>
                        <button onclick="window.exportUsersData()" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
                            <i class="fas fa-download mr-2"></i>Export Users
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full bg-white">
                            <thead>
                                <tr class="bg-gray-100">
                                    <th class="px-6 py-3 text-left">Name</th>
                                    <th class="px-6 py-3 text-left">Email</th>
                                    <th class="px-6 py-3 text-left">Role</th>
                                    <th class="px-6 py-3 text-left">Wallet</th>
                                    <th class="px-6 py-3 text-left">Earned</th>
                                    <th class="px-6 py-3 text-left">Withdrawn</th>
                                    <th class="px-6 py-3 text-left">Status</th>
                                    <th class="px-6 py-3 text-left">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                `;

                if (usersSnapshot.empty) {
                    html += `
                        <tr>
                            <td colspan="8" class="px-6 py-4 text-center text-gray-500">No users found</td>
                        </tr>
                    `;
                } else {
                    usersSnapshot.forEach(doc => {
                        const user = doc.data();
                        html += `
                            <tr class="border-b hover:bg-gray-50">
                                <td class="px-6 py-4">${user.firstName || ''} ${user.lastName || ''}</td>
                                <td class="px-6 py-4">${user.email || ''}</td>
                                <td class="px-6 py-4">
                                    <span class="px-2 py-1 ${user.role === 'admin' ? 'bg-purple-100 text-purple-800' : 'bg-green-100 text-green-800'} rounded-full text-xs">
                                        ${user.role || 'user'}
                                    </span>
                                </td>
                                <td class="px-6 py-4 font-bold">$${(user.walletBalance || 0).toFixed(2)}</td>
                                <td class="px-6 py-4">$${(user.totalEarned || 0).toFixed(2)}</td>
                                <td class="px-6 py-4">$${(user.totalWithdrawn || 0).toFixed(2)}</td>
                                <td class="px-6 py-4">
                                    <span class="px-2 py-1 ${user.isActive ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'} rounded-full text-xs">
                                        ${user.isActive ? 'Active' : 'Inactive'}
                                    </span>
                                </td>
                                <td class="px-6 py-4">
                                    <div class="flex space-x-2">
                                        <button onclick="window.adjustWallet('${doc.id}')" class="text-blue-600 hover:text-blue-800" title="Adjust Wallet">
                                            <i class="fas fa-wallet"></i>
                                        </button>
                                        <button onclick="window.toggleUserStatus('${doc.id}', ${user.isActive})" class="text-${user.isActive ? 'red' : 'green'}-600 hover:text-${user.isActive ? 'red' : 'green'}-800" title="${user.isActive ? 'Deactivate' : 'Activate'}">
                                            <i class="fas fa-${user.isActive ? 'ban' : 'check'}"></i>
                                        </button>
                                        <button onclick="window.viewUserDetails('${doc.id}')" class="text-gray-600 hover:text-gray-800" title="View Details">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                        <button onclick="window.assignTaskToUser('${doc.id}')" class="text-green-600 hover:text-green-800" title="Assign Task">
                                            <i class="fas fa-tasks"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    });
                }

                html += `
                            </tbody>
                        </table>
                    </div>
                `;

                contentElement.innerHTML = html;
            } catch (error) {
                console.error("Error loading users:", error);
                contentElement.innerHTML = `<p class="text-red-500">Error loading users: ${error.message}</p>`;
            }
        }

        // Load tasks management
        async function loadTasksManagement(contentElement) {
            try {
                // Check if tasks collection exists and has documents
                let tasksSnapshot;
                try {
                    tasksSnapshot = await getDocs(query(collection(db, 'tasks'), orderBy('createdAt', 'desc')));
                } catch (e) {
                    console.log("Tasks collection may not exist yet:", e);
                    tasksSnapshot = { empty: true, docs: [] };
                }
                
                let html = `
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xl font-bold">Tasks Management</h3>
                        <button onclick="window.showCreateTaskForm()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                            <i class="fas fa-plus mr-2"></i>Assign New Task
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full bg-white">
                            <thead>
                                <tr class="bg-gray-100">
                                    <th class="px-6 py-3 text-left">Task Title</th>
                                    <th class="px-6 py-3 text-left">Assigned To</th>
                                    <th class="px-6 py-3 text-left">Reward</th>
                                    <th class="px-6 py-3 text-left">Status</th>
                                    <th class="px-6 py-3 text-left">Created</th>
                                    <th class="px-6 py-3 text-left">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                `;

                if (!tasksSnapshot || tasksSnapshot.empty) {
                    html += `
                        <tr>
                            <td colspan="6" class="px-6 py-4 text-center text-gray-500">No tasks found. Click "Assign New Task" to create one.</td>
                        </tr>
                    `;
                } else {
                    for (const taskDoc of tasksSnapshot.docs) {
                        const task = taskDoc.data();

            ['tasks', 'transactions', 'withdraw', 'subscription', 'packages', 'feedback'].forEach(t => {
                const element = document.getElementById(`userTab${t.charAt(0).toUpperCase() + t.slice(1)}`);
                if (element) {
                    if (t === tab) {
                        element.classList.add('text-blue-600', 'border-b-2', 'border-blue-500');
                        element.classList.remove('text-gray-500');
                    } else {
                        element.classList.remove('text-blue-600', 'border-b-2', 'border-blue-500');
                        element.classList.add('text-gray-500');
                    }
                }
            });

            const content = document.getElementById('userTabContent');
            if (!content) return;
            
            // Show loading state
            content.innerHTML = '<div class="text-center py-8"><i class="fas fa-spinner fa-spin text-4xl text-blue-500"></i><p class="mt-2">Loading...</p></div>';
            
            try {
                switch(tab) {
                    case 'tasks':
                        await loadUserTasks(content);
                        break;
                    case 'transactions':
                        await loadUserTransactions(content);
                        break;
                    case 'withdraw':
                        await loadWithdrawForm(content);
                        break;
                    case 'subscription':
                        await loadUserSubscription(content);
                        break;
                    case 'packages':
                        await loadAvailablePackages(content);
                        break;
                    case 'feedback':
                        await loadFeedbackForm(content);
                        break;
                }
            } catch (error) {
                console.error(`Error loading ${tab} tab:`, error);
                content.innerHTML = `<p class="text-red-500">Error loading ${tab}: ${error.message}</p>`;
            }
        }

        // Handle withdraw request

            e.preventDefault();
            const amount = parseFloat(document.getElementById('amount').value);
            const method = document.getElementById('method').value;
            const accountDetails = document.getElementById('accountDetails').value;

            if (amount < 10) {
                Swal.fire('Error!', 'Minimum withdrawal amount is $10', 'error');
                return;
            }

            try {
                // Get current user data
                const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
                const userData = userDoc.data();

                if ((userData.walletBalance || 0) < amount) {
                    Swal.fire('Error!', 'Insufficient balance', 'error');
                    return;
                }

                // Create withdrawal request
                await addDoc(collection(db, 'withdrawals'), {
                    userId: currentUser.uid,
                    amount: amount,
                    method: method,
                    accountDetails: accountDetails,
                    status: 'pending',
                    processedBy: '',
                    processedAt: null,
                    adminNotes: '',

                });

                Swal.fire('Success!', 'Withdrawal request submitted successfully', 'success');
                await showUserTab('transactions');

        // Admin action functions
        async function adjustWallet(userId) {
            const { value: formValues } = await Swal.fire({
                title: 'Adjust Wallet Balance',
                html: `
                    <input id="amount" type="number" class="swal2-input" placeholder="Amount" step="0.01">
                    <select id="action" class="swal2-select" style="width: 100%; margin: 10px 0;">
                        <option value="add">Add Funds</option>
                        <option value="deduct">Deduct Funds</option>
                    </select>
                    <textarea id="reason" class="swal2-textarea" placeholder="Reason for adjustment"></textarea>
                `,
                focusConfirm: false,
                preConfirm: () => {
                    const amount = parseFloat(document.getElementById('amount').value);
                    const action = document.getElementById('action').value;
                    const reason = document.getElementById('reason').value;
                    
                    if (!amount || amount <= 0) {
                        Swal.showValidationMessage('Please enter a valid amount');
                        return false;
                    }
                    
                    return {
                        amount: action === 'deduct' ? -amount : amount,
                        reason: reason
                    };
                }
            });

            if (formValues) {
                try {
                    const userRef = doc(db, 'users', userId);
                    const userDoc = await getDoc(userRef);
                    const userData = userDoc.data();
                    
                    const newBalance = (userData.walletBalance || 0) + formValues.amount;
                    
                    if (newBalance < 0) {
                        Swal.fire('Error!', 'Insufficient balance for deduction', 'error');
                        return;
                    }
                    
                    await updateDoc(userRef, {
                        walletBalance: newBalance
                    });

                    await addDoc(collection(db, 'transactions'), {
                        userId: userId,
                        type: formValues.amount > 0 ? 'deposit' : 'withdrawal',
                        amount: Math.abs(formValues.amount),
                        status: 'completed',
                        description: `Admin adjustment: ${formValues.reason || 'No reason provided'}`,
                        adminId: currentUser.uid,
                        createdAt: Timestamp.now()
                    });

                    Swal.fire('Success!', `Wallet balance updated to $${newBalance.toFixed(2)}`, 'success');
                    await showAdminTab('users');
                } catch (error) {
                    Swal.fire('Error!', error.message, 'error');
                }
            }
        }

                                    <p class="text-sm text-gray-600">Verified At</p>
                                    <p class="font-bold">${dayjs(sub.verifiedAt.toDate()).format('MMM D, YYYY h:mm A')}</p>
                                </div>
                            ` : ''}
                        </div>
                    `,
                    width: '600px'
                });
            } catch (error) {
                Swal.fire('Error!', error.message, 'error');
            }
        }

        async function editTask(taskId) {
            try {
                const taskDoc = await getDoc(doc(db, 'tasks', taskId));
                const task = taskDoc.data();

                const { value: formValues } = await Swal.fire({
                    title: 'Edit Task',
                    html: `
                        <input id="taskTitle" class="swal2-input" placeholder="Task Title" value="${task.title || ''}">
                        <textarea id="taskDescription" class="swal2-textarea" placeholder="Task Description">${task.description || ''}</textarea>
                        <input id="taskReward" type="number" class="swal2-input" placeholder="Reward Amount" value="${task.reward || 0}" step="0.01">
                    `,
                    focusConfirm: false,
                    preConfirm: () => {
                        return {
                            title: document.getElementById('taskTitle').value,
                            description: document.getElementById('taskDescription').value,
                            reward: parseFloat(document.getElementById('taskReward').value)
                        };
                    }
                });

                if (formValues) {
                    await updateDoc(doc(db, 'tasks', taskId), formValues);
                    Swal.fire('Success!', 'Task updated', 'success');
                    await showAdminTab('tasks');
                }
            } catch (error) {
                Swal.fire('Error!', error.message, 'error');
            }
        }

        async function deleteTask(taskId) {
            const result = await Swal.fire({
                title: 'Delete Task',
                text: 'Are you sure you want to delete this task?',
                icon: 'warning',
                showCancelButton: true
            });

            if (result.isConfirmed) {
                try {
                    await deleteDoc(doc(db, 'tasks', taskId));
                    Swal.fire('Success!', 'Task deleted', 'success');
                    await showAdminTab('tasks');
                } catch (error) {
                    Swal.fire('Error!', error.message, 'error');
                }
            }
        }

        async function exportUsersData() {
            try {
                const usersSnapshot = await getDocs(collection(db, 'users'));
                let csv = 'Name,Email,Role,Wallet Balance,Total Earned,Total Withdrawn,Status,Joined\n';
                
                usersSnapshot.forEach(doc => {
                    const user = doc.data();
                    csv += `"${user.firstName || ''} ${user.lastName || ''}","${user.email || ''}","${user.role || 'user'}",${user.walletBalance || 0},${user.totalEarned || 0},${user.totalWithdrawn || 0},"${user.isActive ? 'Active' : 'Inactive'}","${user.createdAt ? dayjs(user.createdAt.toDate()).format('YYYY-MM-DD') : ''}"\n`;
                });
                
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `users_export_${dayjs().format('YYYYMMDD_HHmmss')}.csv`;
                a.click();
                
                Swal.fire('Success!', 'Users data exported', 'success');
            } catch (error) {
                Swal.fire('Error!', error.message, 'error');
            }
        }
    </script>
</body>
</html>
