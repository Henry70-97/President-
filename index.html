<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen · Task Platform</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: linear-gradient(145deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .auth-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 2rem; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 { font-size: 2rem; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .tab { flex: 1; padding: 1rem; border: none; border-radius: 40px; font-weight: 600; background: #f1f5f9; color: #475569; cursor: pointer; transition: all 0.3s; }
        .tab.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .form { display: block; }
        .form.hidden { display: none; }
        .input-group { margin-bottom: 1rem; }
        .input-group input, .input-group select { width: 100%; padding: 1rem 1.2rem; border-radius: 40px; border: 2px solid #e2e8f0; font-size: 1rem; transition: all 0.3s; }
        .input-group input:focus { border-color: #667eea; outline: none; }
        .btn { width: 100%; padding: 1rem; border: none; border-radius: 40px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-google { background: white; color: #333; border: 2px solid #e2e8f0; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .btn-google:hover { background: #f8fafc; }
        .divider { text-align: center; margin: 1.5rem 0; position: relative; }
        .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #e2e8f0; }
        .divider span { background: white; padding: 0 1rem; position: relative; color: #64748b; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 1rem 2rem; border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: none; z-index: 1000; }
        .link { text-align: center; margin-top: 1rem; }
        .link a { color: #667eea; text-decoration: none; font-weight: 600; cursor: pointer; }
        .info-text { text-align: center; color: #64748b; margin: 1rem 0; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo">
            <h1>🔷 NextGen Tasks</h1>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Login</button>
            <button class="tab" onclick="switchTab('register')">Register</button>
        </div>
        
        <!-- Login Form -->
        <div id="loginForm" class="form">
            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="Email address">
            </div>
            <div class="input-group">
                <input type="password" id="loginPassword" placeholder="Password">
            </div>
            <button class="btn btn-primary" onclick="handleLogin()">Sign In</button>
            
            <div class="divider">
                <span>OR</span>
            </div>
            
            <button class="btn btn-google" onclick="handleGoogleLogin()">
                <i class="fab fa-google"></i> Continue with Google
            </button>
        </div>
        
        <!-- Register Form -->
        <div id="registerForm" class="form hidden">
            <div class="input-group">
                <input type="text" id="regName" placeholder="Full name">
            </div>
            <div class="input-group">
                <input type="email" id="regEmail" placeholder="Email address">
            </div>
            <div class="input-group">
                <input type="password" id="regPassword" placeholder="Password (min 6 characters)">
            </div>
            <div class="input-group">
                <input type="tel" id="regPhone" placeholder="Phone number (optional)">
            </div>
            <button class="btn btn-primary" onclick="handleRegister()">Create Account</button>
            <div class="info-text">
                <i class="fas fa-info-circle"></i> A verification email will be sent
            </div>
        </div>
        
        <!-- Verify Email Message -->
        <div id="verifyMessage" class="form hidden">
            <div style="text-align: center;">
                <i class="fas fa-envelope-circle-check" style="font-size: 3rem; color: #667eea; margin-bottom: 1rem;"></i>
                <h3 style="margin-bottom: 1rem;">Verify Your Email</h3>
                <p style="color: #64748b; margin-bottom: 1.5rem;">We've sent a verification link to <span id="verifyEmail"></span></p>
                <button class="btn btn-primary" onclick="checkVerification()">I've Verified, Continue</button>
                <div class="link" style="margin-top: 1rem;">
                    <a onclick="resendVerification()">Resend verification email</a>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyChk2JA68-I5s1D0S10r9WK71LgTNi4hRQ",
            authDomain: "nextgen-5fb6f.firebaseapp.com",
            projectId: "nextgen-5fb6f",
            storageBucket: "nextgen-5fb6f.firebasestorage.app",
            messagingSenderId: "100132076455",
            appId: "1:100132076455:web:c5aea1f6e1a5ebbea99482"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let currentUser = null;
        
        // Toast function
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = isError ? '#dc2626' : '#1e293b';
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
        
        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('verifyMessage').classList.add('hidden');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
                document.getElementById('verifyMessage').classList.add('hidden');
            }
        }
        
        // Show verify view
        function showVerifyView(email) {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('verifyMessage').classList.remove('hidden');
            document.getElementById('verifyEmail').textContent = email;
        }
        
        // Handle Registration
        async function handleRegister() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const phone = document.getElementById('regPhone').value;
            
            if (!name || !email || !password) {
                showToast('Please fill all required fields', true);
                return;
            }
            
            if (password.length < 6) {
                showToast('Password must be at least 6 characters', true);
                return;
            }
            
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, password);
                await cred.user.sendEmailVerification();
                
                // Create user document
                await db.collection('users').doc(cred.user.uid).set({
                    email,
                    displayName: name,
                    phone: phone || '',
                    role: 'user',
                    wallet: 0,
                    active: true,
                    verified: false,
                    membershipPaid: false,
                    membershipStatus: 'pending',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                showVerifyView(email);
                showToast('Verification email sent!');
            } catch (error) {
                showToast(error.message, true);
            }
        }
        
        // Handle Login
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showToast('Please enter email and password', true);
                return;
            }
            
            try {
                await auth.signInWithEmailAndPassword(email, password);
            } catch (error) {
                showToast(error.message, true);
            }
        }
        
        // Handle Google Login
        async function handleGoogleLogin() {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                
                const userRef = db.collection('users').doc(user.uid);
                const userDoc = await userRef.get();
                
                if (!userDoc.exists) {
                    await userRef.set({
                        email: user.email,
                        displayName: user.displayName,
                        phone: '',
                        role: 'user',
                        wallet: 0,
                        active: true,
                        verified: true,
                        membershipPaid: false,
                        membershipStatus: 'pending',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
            } catch (error) {
                showToast(error.message, true);
            }
        }
        
        // Check Verification
        async function checkVerification() {
            if (auth.currentUser) {
                await auth.currentUser.reload();
                if (auth.currentUser.emailVerified) {
                    await db.collection('users').doc(auth.currentUser.uid).update({ verified: true });
                    window.location.href = 'user-dashboard.html';
                } else {
                    showToast('Email not verified yet', true);
                }
            }
        }
        
        // Resend Verification
        async function resendVerification() {
            if (auth.currentUser) {
                await auth.currentUser.sendEmailVerification();
                showToast('Verification email resent!');
            }
        }
        
        // Auth State Observer
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const isGoogle = user.providerData.some(p => p.providerId === 'google.com');
                
                if (!user.emailVerified && !isGoogle) {
                    showVerifyView(user.email);
                    return;
                }
                
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    
                    if (userData.active === false) {
                        await auth.signOut();
                        showToast('Account deactivated', true);
                        return;
                    }
                    
                    if (userData.role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'user-dashboard.html';
                    }
                }
            }
        });
    </script>
</body>
</html>
