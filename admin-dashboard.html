<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">  
    <title>NextGen · Admin Dashboard</title>  
    <!-- Firebase -->  
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>  
    <!-- Font Awesome -->  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">  
    <!-- Google Fonts -->  
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">  
    <style>  
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }  
        body { background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; }  
        .app-container { max-width: 1400px; margin: 0 auto; padding: 1rem; }  
        .header { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 2rem; padding: 1rem 2rem; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; color: white; }  
        .logo h2 { background: linear-gradient(135deg, #818cf8, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }  
        .admin-badge { background: #ef4444; padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.9rem; }  
        .logout-btn { background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; }  
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }  
        .stat-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 1.5rem; padding: 1.5rem; color: white; border: 1px solid rgba(255,255,255,0.2); }  
        .stat-card i { font-size: 2rem; color: #818cf8; margin-bottom: 0.5rem; }  
        .stat-value { font-size: 2rem; font-weight: 700; }  
        .tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }  
        .tab { padding: 0.8rem 1.5rem; border: none; border-radius: 40px; background: rgba(255,255,255,0.1); color: white; font-weight: 600; cursor: pointer; transition: all 0.3s; }  
        .tab.active { background: #6366f1; }  
        .content { background: white; border-radius: 2rem; padding: 2rem; min-height: 500px; }  
        .data-table { width: 100%; border-collapse: collapse; }  
        .data-table th { text-align: left; padding: 1rem; background: #f8fafc; }  
        .data-table td { padding: 1rem; border-bottom: 1px solid #e2e8f0; }  
        .badge { padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.8rem; font-weight: 600; display: inline-block; }  
        .badge.success { background: #10b98120; color: #10b981; border: 1px solid #10b981; }  
        .badge.warning { background: #f59e0b20; color: #f59e0b; border: 1px solid #f59e0b; }  
        .badge.danger { background: #ef444420; color: #ef4444; border: 1px solid #ef4444; }  
        .badge.primary { background: #6366f120; color: #6366f1; border: 1px solid #6366f1; }  
        .badge.info { background: #3b82f620; color: #3b82f6; border: 1px solid #3b82f6; }  
        .btn { padding: 0.5rem 1rem; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; margin: 0.2rem; pointer-events: auto; }  
        .btn-primary { background: #6366f1; color: white; }  
        .btn-success { background: #10b981; color: white; }  
        .btn-danger { background: #ef4444; color: white; }  
        .btn-warning { background: #f59e0b; color: white; }  
        .btn-info { background: #3b82f6; color: white; }  
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 2rem; padding: 2rem; max-width: 600px; width: 90%; z-index: 1000; max-height: 80vh; overflow-y: auto; }  
        .modal.active { display: block; }  
        .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 999; }  
        .modal-backdrop.active { display: block; }  
        
        /* New Alert Modal Styles */
        .alert-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            z-index: 2000;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: slideIn 0.3s ease-out;
        }
        
        .alert-modal.active {
            display: block;
        }
        
        .alert-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1999;
            animation: fadeIn 0.3s ease-out;
        }
        
        .alert-backdrop.active {
            display: block;
        }
        
        .alert-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .alert-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .alert-icon.success {
            background: #10b98120;
            color: #10b981;
        }
        
        .alert-icon.error {
            background: #ef444420;
            color: #ef4444;
        }
        
        .alert-icon.warning {
            background: #f59e0b20;
            color: #f59e0b;
        }
        
        .alert-icon.info {
            background: #3b82f620;
            color: #3b82f6;
        }
        
        .alert-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1f2937;
        }
        
        .alert-message {
            color: #4b5563;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        
        .alert-button {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .alert-button.success {
            background: #10b981;
            color: white;
        }
        
        .alert-button.success:hover {
            background: #059669;
        }
        
        .alert-button.error {
            background: #ef4444;
            color: white;
        }
        
        .alert-button.error:hover {
            background: #dc2626;
        }
        
        .alert-button.info {
            background: #3b82f6;
            color: white;
        }
        
        .alert-button.info:hover {
            background: #2563eb;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translate(-50%, -60%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .toast { display: none; } /* Hide old toast */
        
        input, textarea, select { width: 100%; padding: 0.8rem; border: 2px solid #e2e8f0; border-radius: 40px; margin-bottom: 1rem; font-size: 1rem; }  
        textarea { border-radius: 20px; min-height: 100px; }  
        .submission-card { background: #f8fafc; border-radius: 1rem; padding: 1.5rem; margin-bottom: 1rem; }  
        .flex-row { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }  
        .action-buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; }  
        .action-buttons button { position: relative; z-index: 1; }  
        .deadline-badge { background: #fef3c7; color: #92400e; padding: 0.2rem 0.5rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }  
        .client-badge { background: #e0e7ff; color: #3730a3; padding: 0.2rem 0.5rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }  
        .task-requirements { background: #f1f5f9; padding: 0.5rem; border-radius: 0.5rem; font-size: 0.9rem; margin: 0.5rem 0; }  
        .instructions-badge { background: #dbeafe; color: #1e40af; padding: 0.2rem 0.5rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }  
        @media (max-width: 768px) { .header { flex-direction: column; gap: 1rem; text-align: center; } }  
    </style>  
</head>  
<body>  
    <div class="app-container">  
        <div class="header">  
            <div class="logo">  
                <h2>🔷 NextGen Admin</h2>  
            </div>  
            <div style="display: flex; align-items: center; gap: 1rem;">  
                <span id="adminName">Loading...</span>  
                <span class="admin-badge">Admin</span>  
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>  
            </div>  
        </div>  
        
        <div class="stats-grid" id="statsGrid"></div>  
      
        <div class="tabs">  
            <button class="tab active" data-tab="users">👥 Users</button>  
            <button class="tab" data-tab="tasks">📋 Tasks</button>  
            <button class="tab" data-tab="submissions">📝 Submissions</button>  
            <button class="tab" data-tab="withdrawals">💰 Withdrawals</button>  
            <button class="tab" data-tab="memberships">👑 Memberships</button>  
            <button class="tab" data-tab="messages">💬 Messages</button>  
        </div>  
      
        <div class="content" id="content"></div>  
    </div>  
  
    <!-- Regular Modal -->  
    <div class="modal-backdrop" id="modalBackdrop"></div>  
    <div class="modal" id="modal">  
        <div id="modalContent"></div>  
        <div class="flex-row" style="justify-content: flex-end; margin-top: 1rem;">  
            <button class="btn btn-danger" id="closeModalBtn">Close</button>  
        </div>  
    </div>  
  
    <!-- Alert Modal (replaces toast) -->  
    <div class="alert-backdrop" id="alertBackdrop"></div>  
    <div class="alert-modal" id="alertModal">  
        <div class="alert-header">  
            <div class="alert-icon" id="alertIcon">  
                <i class="fas fa-check-circle"></i>  
            </div>  
            <div class="alert-title" id="alertTitle">Success</div>  
        </div>  
        <div class="alert-message" id="alertMessage">Operation completed successfully</div>  
        <button class="alert-button" id="alertButton">OK</button>  
    </div>  
  
    <!-- Old toast (hidden) -->  
    <div class="toast" id="toast"></div>  
  
    <script>  
        // Firebase Config  
        const firebaseConfig = {  
            apiKey: "AIzaSyChk2JA68-I5s1D0S10r9WK71LgTNi4hRQ",  
            authDomain: "nextgen-5fb6f.firebaseapp.com",  
            projectId: "nextgen-5fb6f",  
            storageBucket: "nextgen-5fb6f.firebasestorage.app",  
            messagingSenderId: "100132076455",  
            appId: "1:100132076455:web:c5aea1f6e1a5ebbea99482"  
        };  
          
        firebase.initializeApp(firebaseConfig);  
        const auth = firebase.auth();  
        const db = firebase.firestore();  
          
        let currentUser = null;  
        let currentTab = 'users';  
        let currentMessageType = 'individual'; // 'individual' or 'broadcast'  
          
        // Check auth state  
        auth.onAuthStateChanged(async (user) => {  
            if (!user) {  
                window.location.href = 'index.html';  
                return;  
            }  
              
            const doc = await db.collection('users').doc(user.uid).get();  
            if (!doc.exists || doc.data().role !== 'admin') {  
                auth.signOut();  
                window.location.href = 'index.html';  
                return;  
            }  
              
            if (doc.data().active === false) {  
                auth.signOut();  
                window.location.href = 'index.html';  
                return;  
            }  
              
            currentUser = user;  
            document.getElementById('adminName').textContent = doc.data().displayName;  
              
            loadDashboard();  
        });  
          
        // NEW Alert Modal Function  
        function showAlert(message, type = 'success', title = '') {  
            const alertModal = document.getElementById('alertModal');  
            const alertBackdrop = document.getElementById('alertBackdrop');  
            const alertIcon = document.getElementById('alertIcon');  
            const alertTitle = document.getElementById('alertTitle');  
            const alertMessage = document.getElementById('alertMessage');  
            const alertButton = document.getElementById('alertButton');  
            
            // Set icon based on type
            let iconHtml = '';
            let buttonClass = 'success';
            let defaultTitle = '';
            
            switch(type) {
                case 'success':
                    iconHtml = '<i class="fas fa-check-circle"></i>';
                    defaultTitle = 'Success';
                    buttonClass = 'success';
                    break;
                case 'error':
                    iconHtml = '<i class="fas fa-exclamation-circle"></i>';
                    defaultTitle = 'Error';
                    buttonClass = 'error';
                    break;
                case 'warning':
                    iconHtml = '<i class="fas fa-exclamation-triangle"></i>';
                    defaultTitle = 'Warning';
                    buttonClass = 'warning';
                    break;
                case 'info':
                    iconHtml = '<i class="fas fa-info-circle"></i>';
                    defaultTitle = 'Information';
                    buttonClass = 'info';
                    break;
                default:
                    iconHtml = '<i class="fas fa-check-circle"></i>';
                    defaultTitle = 'Success';
                    buttonClass = 'success';
            }
            
            // Update modal content
            alertIcon.className = `alert-icon ${type}`;
            alertIcon.innerHTML = iconHtml;
            alertTitle.textContent = title || defaultTitle;
            alertMessage.textContent = message;
            alertButton.className = `alert-button ${buttonClass}`;
            alertButton.textContent = 'OK';
            
            // Show modal
            alertModal.classList.add('active');
            alertBackdrop.classList.add('active');
            
            // Handle button click
            alertButton.onclick = () => {
                alertModal.classList.remove('active');
                alertBackdrop.classList.remove('active');
            };
            
            // Close on backdrop click
            alertBackdrop.onclick = () => {
                alertModal.classList.remove('active');
                alertBackdrop.classList.remove('active');
            };
        }
        
        // Modal functions  
        function showModal(html) {  
            document.getElementById('modalContent').innerHTML = html;  
            document.getElementById('modal').classList.add('active');  
            document.getElementById('modalBackdrop').classList.add('active');  
        }  
          
        function closeModal() {  
            document.getElementById('modal').classList.remove('active');  
            document.getElementById('modalBackdrop').classList.remove('active');  
        }  
          
        // Format date for display  
        function formatDate(date) {  
            if (!date) return 'No deadline';  
            if (date.toDate) date = date.toDate();  
            return new Date(date).toLocaleDateString('en-US', {  
                year: 'numeric',  
                month: 'short',  
                day: 'numeric'  
            });  
        }  
          
        // Check if deadline is approaching  
        function getDeadlineStatus(deadline) {  
            if (!deadline) return null;  
            const deadlineDate = deadline.toDate ? deadline.toDate() : new Date(deadline);  
            const now = new Date();  
            const daysLeft = Math.ceil((deadlineDate - now) / (1000 * 60 * 60 * 24));  
              
            if (daysLeft < 0) return { class: 'danger', text: 'Overdue' };  
            if (daysLeft <= 2) return { class: 'warning', text: `${daysLeft} day${daysLeft === 1 ? '' : 's'} left` };  
            return { class: 'success', text: `${daysLeft} days left` };  
        }  
          
        // Logout function  
        function logout() {  
            auth.signOut();  
            window.location.href = 'index.html';  
        }  
          
        // Tab switching function  
        function switchTab(tab) {  
            currentTab = tab;  
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));  
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');  
              
            switch(tab) {  
                case 'users': loadUsers(); break;  
                case 'tasks': loadTasks(); break;  
                case 'submissions': loadSubmissions(); break;  
                case 'withdrawals': loadWithdrawals(); break;  
                case 'memberships': loadMemberships(); break;  
                case 'messages': loadMessages(); break;  
            }  
        }  
          
        // Load Dashboard Stats  
        async function loadDashboard() {  
            const usersSnapshot = await db.collection('users').get();  
            const tasksSnapshot = await db.collection('tasks').get();  
              
            const pendingSubs = await db.collection('submissions')  
                .where('status', '==', 'pending')  
                .get();  
              
            const pendingWithdrawals = await db.collection('withdrawals')  
                .where('status', '==', 'pending')  
                .get();  
              
            document.getElementById('statsGrid').innerHTML = `  
                <div class="stat-card">  
                    <i class="fas fa-users"></i>  
                    <div class="stat-value">${usersSnapshot.size}</div>  
                    <div class="stat-label">Total Users</div>  
                </div>  
                <div class="stat-card">  
                    <i class="fas fa-tasks"></i>  
                    <div class="stat-value">${tasksSnapshot.size}</div>  
                    <div class="stat-label">Tasks</div>  
                </div>  
                <div class="stat-card">  
                    <i class="fas fa-clock"></i>  
                    <div class="stat-value">${pendingSubs.size}</div>  
                    <div class="stat-label">Pending Reviews</div>  
                </div>  
                <div class="stat-card">  
                    <i class="fas fa-money-bill"></i>  
                    <div class="stat-value">${pendingWithdrawals.size}</div>  
                    <div class="stat-label">Pending Withdrawals</div>  
                </div>  
            `;  
              
            loadUsers();  
        }  
          
        // Load Users  
        async function loadUsers() {  
            const snapshot = await db.collection('users').orderBy('createdAt', 'desc').get();  
              
            let html = '<h3 style="margin-bottom:1.5rem;">User Management</h3>';  
            html += '<table class="data-table">';  
            html += '<tr><th>Email</th><th>Name</th><th>Wallet</th><th>Role</th><th>Status</th><th>Actions</th></tr>';  
              
            snapshot.forEach(doc => {  
                const user = doc.data();  
                html += `  
                    <tr>  
                        <td>${user.email}</td>  
                        <td>${user.displayName}</td>  
                        <td>$${user.wallet || 0}</td>  
                        <td>${user.role}</td>  
                        <td><span class="badge ${user.active ? 'success' : 'danger'}">${user.active ? 'Active' : 'Inactive'}</span></td>  
                        <td class="action-buttons">  
                            <button class="btn btn-primary toggle-status-btn" data-user-id="${doc.id}" data-new-status="${!user.active}">${user.active ? 'Deactivate' : 'Activate'}</button>  
                            <button class="btn btn-success adjust-wallet-btn" data-user-id="${doc.id}" data-user-name="${user.displayName}" data-wallet="${user.wallet || 0}">Adjust Wallet</button>  
                            ${user.role !== 'admin' ? `<button class="btn btn-warning make-admin-btn" data-user-id="${doc.id}">Make Admin</button>` : ''}  
                        </td>  
                    </tr>  
                `;  
            });  
              
            html += '</table>';  
            document.getElementById('content').innerHTML = html;  
        }  
          
        // Toggle User Status  
        async function toggleUserStatus(userId, newStatus) {  
            await db.collection('users').doc(userId).update({ active: newStatus });  
            showAlert(`User status updated to ${newStatus ? 'Active' : 'Inactive'}`, 'success');  
            loadUsers();  
        }  
          
        // Make Admin  
        async function makeAdmin(userId) {  
            await db.collection('users').doc(userId).update({ role: 'admin' });  
            showAlert('User is now an admin', 'success');  
            loadUsers();  
        }  
          
        // Show Adjust Wallet Modal  
        function showAdjustWallet(userId, userName, currentWallet) {  
            showModal(`  
                <h3 style="margin-bottom:1rem;">Adjust Wallet - ${userName}</h3>  
                <p>Current Balance: $${currentWallet}</p>  
                <input type="number" id="adjustAmount" placeholder="Amount" step="0.01" min="0">  
                <select id="adjustType">  
                    <option value="add">Add Funds</option>  
                    <option value="subtract">Subtract Funds</option>  
                </select>  
                <textarea id="adjustReason" placeholder="Reason for adjustment (required)"></textarea>  
                <button class="btn btn-primary apply-adjustment-btn" data-user-id="${userId}" style="width:100%;">Apply</button>  
            `);  
        }  
          
        // Adjust Wallet  
        async function adjustWallet(userId) {  
            const amount = parseFloat(document.getElementById('adjustAmount')?.value);  
            const type = document.getElementById('adjustType')?.value;  
            const reason = document.getElementById('adjustReason')?.value;  
              
            if (!amount || amount <= 0) {  
                showAlert('Please enter a valid amount greater than 0', 'error');  
                return;  
            }  
              
            if (!reason || reason.trim() === '') {  
                showAlert('Please enter a reason for the adjustment', 'error');  
                return;  
            }  
              
            if (!userId) {  
                showAlert('User ID is missing', 'error');  
                return;  
            }  
              
            const adjustment = type === 'add' ? amount : -amount;  
              
            try {  
                await db.collection('users').doc(userId).update({  
                    wallet: firebase.firestore.FieldValue.increment(adjustment)  
                });  
                  
                await db.collection('walletAdjustments').add({  
                    userId,  
                    adjustedBy: currentUser.uid,  
                    amount: adjustment,  
                    reason: reason.trim(),  
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()  
                });  
                  
                closeModal();  
                showAlert(`Wallet adjusted by $${amount.toFixed(2)}`, 'success');  
                loadUsers();  
            } catch (error) {  
                console.error('Error adjusting wallet:', error);  
                showAlert('Error adjusting wallet: ' + error.message, 'error');  
            }  
        }  
          
        // Load Tasks - MODIFIED to show instructions  
        async function loadTasks() {  
            const snapshot = await db.collection('tasks').orderBy('createdAt', 'desc').get();  
              
            let html = `  
                <div style="display:flex; justify-content:space-between; margin-bottom:1.5rem;">  
                    <h3>Task Management</h3>  
                    <button class="btn btn-primary" id="createTaskBtn">+ New Task</button>  
                </div>  
                <table class="data-table">  
                <tr><th>Title</th><th>Client</th><th>Reward</th><th>Deadline</th><th>Category</th><th>Difficulty</th><th>Status</th><th>Actions</th></tr>  
            `;  
              
            snapshot.forEach(doc => {  
                const task = doc.data();  
                const deadlineStatus = task.deadline ? getDeadlineStatus(task.deadline) : null;  
                const deadlineDisplay = task.deadline ? formatDate(task.deadline) : 'No deadline';  
                  
                html += `  
                    <tr>  
                        <td>${task.title}</td>  
                        <td><span class="client-badge">${task.clientName || 'NextGen'}</span></td>  
                        <td>$${task.reward}</td>  
                        <td>  
                            <span class="deadline-badge">${deadlineDisplay}</span>  
                            ${deadlineStatus ? `<br><small class="badge ${deadlineStatus.class}">${deadlineStatus.text}</small>` : ''}  
                        </td>  
                        <td>${task.category}</td>  
                        <td>${task.difficulty}</td>  
                        <td><span class="badge ${task.active ? 'success' : 'danger'}">${task.active ? 'Active' : 'Inactive'}</span></td>  
                        <td class="action-buttons">  
                            <button class="btn btn-primary edit-task-btn" data-task-id="${doc.id}">Edit</button>  
                            <button class="btn btn-info view-requirements-btn" data-task-id="${doc.id}">View Details</button>

        // Review Submission  
        async function reviewSubmission(subId, approved) {  
            const submissionCard = document.querySelector(`[data-sub-id="${subId}"]`);  
            const score = parseInt(submissionCard.querySelector('.submission-score')?.value || 0);  
            const review = submissionCard.querySelector('.submission-review')?.value || '';  
              
            if (approved && (!score || score < 0 || score > 100)) {  
                showAlert('Please enter a valid score between 0 and 100', 'error');  
                return;  
            }  
              
            if (!review || review.trim() === '') {  
                showAlert('Please provide feedback for the user', 'error');  
                return;  
            }  
              
            const subDoc = await db.collection('submissions').doc(subId).get();  
            const sub = subDoc.data();  
              
            const taskDoc = await db.collection('tasks').doc(sub.taskId).get();  
            const task = taskDoc.data();  
              
            let earned = 0;  
            let status = approved ? 'approved' : 'rejected';  
              
            if (approved && score >= 50) {  
                earned = (task.reward * score) / 100;  
                  
                await db.collection('users').doc(sub.userId).update({  
                    wallet: firebase.firestore.FieldValue.increment(earned),  
                    totalEarned: firebase.firestore.FieldValue.increment(earned),  
                    tasksCompleted: firebase.firestore.FieldValue.increment(1)  
                });  
                showAlert(`Submission approved! User earned $${earned.toFixed(2)}`, 'success');  
            } else if (approved && score < 50) {  
                status = 'rejected';  
                showAlert('Submission rejected (score below 50%)', 'warning');  
            } else {  
                showAlert('Submission rejected', 'info');  
            }  
              
            await db.collection('submissions').doc(subId).update({  
                status,  
                score: approved ? score : 0,  
                review,  
                earned,  
                reviewedAt: firebase.firestore.FieldValue.serverTimestamp()  
            });  
              
            loadSubmissions();  
        }

            }  
              
            showModal(`  
                <h3 style="margin-bottom:1rem; color: #6366f1;">Confirm Broadcast</h3>  
                <div style="background: #6366f120; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem;">  
                    <p><strong>⚠️ You are about to send a message to ALL users</strong></p>  
                    <p>This action cannot be undone. Please review your message:</p>  
                </div>  
                  
                ${title ? `<p><strong>Title:</strong> ${title}</p>` : ''}  
                <p><strong>Message:</strong></p>  
                <div style="background: #f8fafc; padding: 1rem; border-radius: 0.5rem; margin: 1rem 0;">  
                    ${message}  
                </div>  
                  
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">  
                    <button class="btn btn-success" id="confirmBroadcastBtn" style="flex: 1;">  
                        <i class="fas fa-check"></i> Yes, Send to All Users  
                    </button>  
                    <button class="btn btn-danger" id="cancelBroadcastBtn" style="flex: 1;">  
                        <i class="fas fa-times"></i> Cancel  
                    </button>  
                </div>  
            `);  
        }  
          
        // Execute Broadcast  
        async function executeBroadcast() {  
            const title = document.getElementById('broadcastTitle')?.value || '';  
            const message = document.getElementById('broadcastMessage')?.value;  
              
            closeModal();  
            showAlert('Preparing broadcast...', 'info', 'Please Wait');  
              
            try {  
                const usersSnapshot = await db.collection('users').get();  
                const sentCount = usersSnapshot.size;  
                  
                await db.collection('messages').add({  
                    userId: 'ALL_USERS',  
                    isBroadcast: true,  
                    title: title,  
                    message: message,  
                    sentCount: sentCount,  
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),  
                    sentBy: currentUser.uid  
                });  
                  
                const batch = db.batch();  
                usersSnapshot.docs.forEach((userDoc) => {  
                    const notifRef = db.collection('notifications').doc();  
                    batch.set(notifRef, {  
                        userId: userDoc.id,  
                        type: 'broadcast',  
                        title: title || 'New Announcement',  
                        message: message,  
                        read: false,  
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()  
                    });  
                });  
                  
                await batch.commit();  
                  
                showAlert(`✅ Broadcast sent to ${sentCount} users!`, 'success');  
                  
                document.getElementById('broadcastMessage').value = '';  
                if (document.getElementById('broadcastTitle')) {  
                    document.getElementById('broadcastTitle').value = '';  
                }  
                  
                loadMessages();  
                  
            } catch (error) {  
                console.error('Broadcast error:', error);  
                showAlert('Error sending broadcast: ' + error.message, 'error');  
            }  
        }  
          
        // Preview Broadcast  
        function previewBroadcast() {  
            const title = document.getElementById('broadcastTitle')?.value || '';  
            const message = document.getElementById('broadcastMessage')?.value;  
              
            if (!message) {  
                showAlert('Please enter a message to preview', 'error');  
                return;  
            }  
              
            showModal(`  
                <h3 style="margin-bottom:1rem;">Broadcast Preview</h3>  
                <div style="background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; padding: 2rem; border-radius: 1rem;">  
                    <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">  
                        <i class="fas fa-bullhorn" style="font-size: 1.5rem;"></i>  
                        <span style="font-weight: 600;">Admin Announcement</span>  
                    </div>  
                    ${title ? `<h4 style="margin-bottom: 0.5rem;">${title}</h4>` : ''}  
                    <p style="margin: 0; opacity: 0.95;">${message}</p>  
                    <div style="margin-top: 1rem; font-size: 0.8rem; opacity: 0.7;">  
                        — NextGen Admin  
                    </div>  
                </div>  
                <p style="margin-top: 1rem; color: #6b7280;">This is how users will see your broadcast message.</p>  
                <button class="btn btn-primary" onclick="closeModal()" style="width: 100%;">Close Preview</button>  
            `);  
        }  
          
        // Event Delegation for all buttons  
        document.addEventListener('click', async (e) => {  
            const target = e.target;  
              
            // Logout button  
            if (target.id === 'logoutBtn' || target.closest('#logoutBtn')) {  
                logout();  
                return;  
            }  
              
            // Tab buttons  
            if (target.classList.contains('tab') || target.closest('.tab')) {  
                const tab = target.closest('.tab') || target;  
                const tabName = tab.getAttribute('data-tab');  
                if (tabName) {  
                    switchTab(tabName);  
                }  
                return;  
            }  
              
            // Close modal button  
            if (target.id === 'closeModalBtn' || target.closest('#closeModalBtn') || target.classList.contains('modal-backdrop')) {  
                closeModal();  
                return;  
            }  
              
            // Adjust Wallet button  
            if (target.classList.contains('adjust-wallet-btn')) {  
                const userId = target.getAttribute('data-user-id');  
                const userName = target.getAttribute('data-user-name');  
                const wallet = target.getAttribute('data-wallet');  
                showAdjustWallet(userId, userName, parseFloat(wallet || 0));  
                return;  
            }  
              
            // Apply Adjustment button (inside modal)  
            if (target.classList.contains('apply-adjustment-btn')) {  
                const userId = target.getAttribute('data-user-id');  
                await adjustWallet(userId);  
                return;  
            }  
              
            // Toggle User Status  
            if (target.classList.contains('toggle-status-btn')) {  
                const userId = target.getAttribute('data-user-id');  
                const newStatus = target.getAttribute('data-new-status') === 'true';  
                await toggleUserStatus(userId, newStatus);  
                return;  
            }  
              
            // Make Admin  
            if (target.classList.contains('make-admin-btn')) {  
                const userId = target.getAttribute('data-user-id');  
                await makeAdmin(userId);  
                return;  
            }  
              
            // Create Task button  
            if (target.id === 'createTaskBtn') {  
                showCreateTask();  
                return;  
            }  
              
            // Create Task Confirm button  
            if (target.id === 'createTaskConfirmBtn') {  
                await createTask();  
                return;  
            }  
              
            // Edit Task button  
            if (target.classList.contains('edit-task-btn')) {  
                const taskId = target.getAttribute('data-task-id');  
                await editTask(taskId);  
                return;  
            }  
              
            // Update Task button  
            if (target.id === 'updateTaskBtn') {  
                const taskId = target.getAttribute('data-task-id');  
                await updateTask(taskId);  
                return;  
            }  
              
            // Toggle Task button  
            if (target.classList.contains('toggle-task-btn')) {  
                const taskId = target.getAttribute('data-task-id');  
                const newStatus = target.getAttribute('data-new-status') === 'true';  
                await toggleTask(taskId, newStatus);  
                return;  
            }  
              
            // View Requirements button  
            if (target.classList.contains('view-requirements-btn')) {  
                const taskId = target.getAttribute('data-task-id');  
                await viewRequirements(taskId);  
                return;  
            }  
              
            // Approve Submission  
            if (target.classList.contains('approve-submission')) {  
                const subId = target.getAttribute('data-sub-id');  
                await reviewSubmission(subId, true);  
                return;  
            }  
              
            // Reject Submission  
            if (target.classList.contains('reject-submission')) {  
                const subId = target.getAttribute('data-sub-id');  
                await reviewSubmission(subId, false);  
                return;  
            }  
              
            // Process Withdrawal  
            if (target.classList.contains('process-withdrawal')) {  
                const withdrawalId = target.getAttribute('data-withdrawal-id');  
                await processWithdrawal(withdrawalId);  
                return;  
            }  
              
            // Approve Membership  
            if (target.classList.contains('approve-membership')) {  
                const userId = target.getAttribute('data-user-id');  
                const paymentId = target.getAttribute('data-payment-id');  
                await approveMembership(userId, paymentId);  
                return;  
            }  
              
            // Reject Membership  
            if (target.classList.contains('reject-membership')) {  
                const userId = target.getAttribute('data-user-id');  
                const paymentId = target.getAttribute('data-payment-id');  
                await rejectMembership(userId, paymentId);  
                return;  
            }  
              
            // Send Individual Message  
            if (target.id === 'sendMessageBtn') {  
                await sendMessage();  
                return;  
            }  
              
            // Individual Message button  
            if (target.id === 'individualMessageBtn') {  
                currentMessageType = 'individual';  
                document.getElementById('individualMessageForm').style.display = 'block';  
                document.getElementById('broadcastMessageForm').style.display = 'none';  
                target.classList.add('btn-primary');  
                document.getElementById('broadcastMessageBtn').classList.remove('btn-primary');  
                return;  
            }  
              
            // Broadcast Message button  
            if (target.id === 'broadcastMessageBtn') {  
                currentMessageType = 'broadcast';  
                document.getElementById('broadcastMessageForm').style.display = 'block';  
                document.getElementById('individualMessageForm').style.display = 'none';  
                target.classList.add('btn-primary');  
                document.getElementById('individualMessageBtn').classList.remove('btn-primary');  
                return;  
            }  
              
            // Send Broadcast button  
            if (target.id === 'sendBroadcastBtn' || target.closest('#sendBroadcastBtn')) {  
                await sendBroadcast();  
                return;  
            }  
              
            // Preview Broadcast button  
            if (target.id === 'previewBroadcastBtn') {  
                previewBroadcast();  
                return;  
            }  
              
            // Confirm Broadcast button (in modal)  
            if (target.id === 'confirmBroadcastBtn') {  
                await executeBroadcast();  
                return;  
            }  
              
            // Cancel Broadcast button (in modal)  
            if (target.id === 'cancelBroadcastBtn') {  
                closeModal();  
                return;  
            }  
        });  
          
        // Make functions globally available  
        window.showAlert = showAlert;  
        window.showModal = showModal;  
        window.closeModal = closeModal;  
        window.logout = logout;  
        window.switchTab = switchTab;  
        window.toggleUserStatus = toggleUserStatus;  
        window.makeAdmin = makeAdmin;  
        window.showAdjustWallet = showAdjustWallet;  
        window.adjustWallet = adjustWallet;  
        window.showCreateTask = showCreateTask;  
        window.createTask = createTask;  
        window.toggleTask = toggleTask;  
        window.editTask = editTask;  
        window.updateTask = updateTask;  
        window.viewRequirements = viewRequirements;  
        window.reviewSubmission = reviewSubmission;  
        window.processWithdrawal = processWithdrawal;  
        window.approveMembership = approveMembership;  
        window.rejectMembership = rejectMembership;  
        window.sendMessage = sendMessage;  
        window.sendBroadcast = sendBroadcast;  
        window.executeBroadcast = executeBroadcast;  
        window.previewBroadcast = previewBroadcast;  
    </script>  
</body>  
</html>
