<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NextGen · User Dashboard</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: linear-gradient(145deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .app-container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
        
        /* Header Styling */
        .header { 
            background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(10px);
            border-radius: 2rem; 
            padding: 1rem 2rem; 
            margin-bottom: 1.5rem; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .logo h2 { 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
        }
        .user-menu { display: flex; align-items: center; gap: 1rem; }
        .wallet-badge { 
            background: linear-gradient(135deg, #667eea20, #764ba220); 
            padding: 0.5rem 1.5rem; 
            border-radius: 40px; 
            color: #667eea; 
            font-weight: 700;
            border: 2px solid #667eea;
            font-size: 1.1rem;
        }
        .user-name {
            font-weight: 600;
            color: #333;
            background: white;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .logout-btn { 
            background: white; 
            border: none; 
            color: #ef4444; 
            font-size: 1.2rem; 
            cursor: pointer; 
            padding: 0.7rem 1.2rem;
            border-radius: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background: #ef4444;
            color: white;
        }
        
        /* Stats Cards with alternating colors */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 1.2rem; 
            margin-bottom: 2rem; 
        }
        .stat-card { 
            border-radius: 1.8rem; 
            padding: 1.8rem 1.5rem; 
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.2);
            transition: transform 0.3s;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255,255,255,0.1);
            transform: rotate(45deg);
            pointer-events: none;
        }
        .stat-card:nth-child(1) { background: linear-gradient(135deg, #667eea, #764ba2); }
        .stat-card:nth-child(2) { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .stat-card:nth-child(3) { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .stat-card:nth-child(4) { background: linear-gradient(135deg, #43e97b, #38f9d7); }
        
        .stat-card i { 
            font-size: 2.5rem; 
            margin-bottom: 1rem;
            opacity: 0.8;
        }
        .stat-value { 
            font-size: 2.2rem; 
            font-weight: 800; 
            margin-bottom: 0.2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .stat-label { 
            font-size: 0.9rem;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Tabs Styling */
        .tabs { display: flex; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .tab { 
            padding: 0.8rem 1.8rem; 
            border: none; 
            border-radius: 40px; 
            background: white; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            font-size: 0.95rem;
        }
        .tab.active { 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            color: white;
            box-shadow: 0 10px 20px -5px #667eea80;
        }
        
        /* Content Area */
        .content { 
            background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(10px);
            border-radius: 2rem; 
            padding: 2rem; 
            min-height: 500px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.5);
        }
        
        /* Task Cards with alternating colors */
        .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .task-card { 
            border-radius: 1.8rem; 
            padding: 1.8rem; 
            border: none;
            transition: all 0.3s;
            color: white;
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        .task-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.3);
        }
        .task-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255,255,255,0.1);
            transform: rotate(45deg);
            pointer-events: none;
        }
        
        /* Alternating task card colors */
        .task-card:nth-child(6n+1) { background: linear-gradient(135deg, #667eea, #764ba2); }
        .task-card:nth-child(6n+2) { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .task-card:nth-child(6n+3) { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .task-card:nth-child(6n+4) { background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .task-card:nth-child(6n+5) { background: linear-gradient(135deg, #fa709a, #fee140); }
        .task-card:nth-child(6n+6) { background: linear-gradient(135deg, #30cfd0, #330867); }
        
        .task-card h4 { 
            font-size: 1.4rem; 
            margin-bottom: 1rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .task-card .description { 
            opacity: 0.9; 
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }
        .task-card .badge { 
            background: rgba(255,255,255,0.25);
            color: white;
            border: 1px solid rgba(255,255,255,0.5);
            font-weight: 600;
            backdrop-filter: blur(5px);
        }
        
        /* Bold green for task title and amount */
        .task-card .task-title {
            font-weight: 800;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .task-card .reward-amount {
            font-weight: 800;
            color: #00ff9d;
            font-size: 1.6rem;
            text-shadow: 0 0 10px rgba(0,255,157,0.5);
        }
        
        .badge { 
            padding: 0.4rem 1.2rem; 
            border-radius: 40px; 
            font-size: 0.8rem; 
            font-weight: 600; 
            display: inline-block; 
        }
        
        .btn { 
            padding: 0.8rem 1.5rem; 
            border: none; 
            border-radius: 40px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s; 
            font-size: 0.9rem;
        }
        .btn-primary { 
            background: rgba(255,255,255,0.25);
            color: white;
            border: 1px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(5px);
        }
        .btn-primary:hover { 
            background: white;
            color: #667eea;
        }
        .btn-outline { 
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(5px);
        }
        .btn-outline:hover { 
            background: rgba(255,255,255,0.3);
        }
        
        /* Modal Styling */
        .modal { 
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .modal .btn-primary {
            background: white;
            color: #667eea;
        }
        .modal .btn-primary:hover {
            background: rgba(255,255,255,0.9);
        }
        
        /* Submission Cards */
        .submission-card { 
            background: linear-gradient(135deg, #667eea10, #764ba210);
            border-radius: 1.5rem; 
            padding: 1.5rem; 
            margin-bottom: 1rem; 
            border: 1px solid rgba(102, 126, 234, 0.2);
            backdrop-filter: blur(5px);
        }
        
        /* Benefits Cards */
        .benefit-card { 
            background: linear-gradient(135deg, #667eea10, #764ba210);
            border-radius: 1.5rem; 
            padding: 2rem; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            transition: transform 0.3s;
        }
        .benefit-card:hover {
            transform: translateY(-5px);
        }
        .benefit-card i { 
            font-size: 3rem; 
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem; 
        }
        
        /* Loading Spinner */
        .loading { text-align: center; padding: 3rem; color: #667eea; }
        .loading i { font-size: 3rem; margin-bottom: 1rem; }
        
        /* Info and Success Boxes */
        .info-box { 
            background: linear-gradient(135deg, #667eea20, #764ba220);
            border-left: 4px solid #667eea; 
            padding: 1rem; 
            border-radius: 1rem; 
            margin: 1rem 0;
            color: #333;
        }
        .success-box { 
            background: linear-gradient(135deg, #43e97b20, #38f9d720);
            border-left: 4px solid #43e97b; 
            padding: 1rem; 
            border-radius: 1rem; 
            margin: 1rem 0;
            color: #333;
        }
        
        @media (max-width: 768px) { 
            .header { flex-direction: column; gap: 1rem; text-align: center; }
            .user-menu { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo">
                <h2>🔷 NextGen Tasks</h2>
            </div>
            <div class="user-menu">
                <div class="wallet-badge" id="walletDisplay">$0.00</div>
                <span class="user-name" id="userName">Loading...</span>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
        
        <div class="stats-grid" id="statsGrid"></div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('tasks')">📋 Available Tasks</button>
            <button class="tab" onclick="switchTab('submissions')">📝 My Submissions</button>
            <button class="tab" onclick="switchTab('withdrawals')">💰 Withdrawals</button>
            <button class="tab" onclick="switchTab('messages')">💬 Messages</button>
            <button class="tab" onclick="switchTab('profile')">👤 Profile</button>
        </div>
        
        <div class="content" id="content">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading dashboard...</p>
            </div>
        </div>
    </div>
    
    <!-- Modal -->
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal" id="modal">
        <div id="modalContent"></div>
        <div class="flex-row" style="justify-content: flex-end; margin-top: 1rem;">
            <button class="btn btn-primary" onclick="closeModal()">Close</button>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>
    
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyChk2JA68-I5s1D0S10r9WK71LgTNi4hRQ",
            authDomain: "nextgen-5fb6f.firebaseapp.com",
            projectId: "nextgen-5fb6f",
            storageBucket: "nextgen-5fb6f.firebasestorage.app",
            messagingSenderId: "100132076455",
            appId: "1:100132076455:web:c5aea1f6e1a5ebbea99482"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // Enable offline persistence
        db.enablePersistence()
            .catch((err) => {
                if (err.code == 'failed-precondition') {
                    console.log('Persistence failed');
                } else if (err.code == 'unimplemented') {
                    console.log('Persistence not available');
                }
            });
        
        // Global variables
        let currentUser = null;
        let userData = null;
        
        // Toast function
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = isError ? '#dc2626' : '#0f172a';
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
        
        // Modal functions
        function showModal(html) {
            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('modal').classList.add('active');
            document.getElementById('modalBackdrop').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('modalBackdrop').classList.remove('active');
        }
        
        document.getElementById('modalBackdrop').addEventListener('click', closeModal);
        
        // Logout function
        function logout() {
            auth.signOut();
            window.location.href = 'index.html';
        }
        
        // Tab switching function
        function switchTab(tab) {
            // Update active tab
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            // Load appropriate content
            switch(tab) {
                case 'tasks':
                    loadTasks();
                    break;
                case 'submissions':
                    loadSubmissions();
                    break;
                case 'withdrawals':
                    loadWithdrawals();
                    break;
                case 'messages':
                    loadMessages();
                    break;
                case 'profile':
                    loadProfile();
                    break;
            }
        }
        
        // Check auth state
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            
            // Check email verification (skip for Google users)
            const isGoogle = user.providerData.some(p => p.providerId === 'google.com');
            if (!user.emailVerified && !isGoogle) {
                window.location.href = 'index.html';
                return;
            }
            
            try {
                // Get user data
                const doc = await db.collection('users').doc(user.uid).get();
                
                if (!doc.exists) {
                    // Create user document if it doesn't exist
                    await db.collection('users').doc(user.uid).set({
                        email: user.email,
                        displayName: user.displayName || 'User',
                        phone: '',
                        role: 'user',
                        wallet: 0,
                        active: true,
                        verified: user.emailVerified || isGoogle,
                        membershipPaid: false,
                        membershipStatus: 'pending',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    // Fetch the newly created document
                    const newDoc = await db.collection('users').doc(user.uid).get();
                    userData = { id: user.uid, ...newDoc.data() };
                } else {
                    userData = { id: user.uid, ...doc.data() };
                }
                
                // Check if user is active
                if (userData.active === false) {
                    await auth.signOut();
                    window.location.href = 'index.html';
                    return;
                }
                
                currentUser = user;
                
                // Update UI
                document.getElementById('userName').textContent = userData.displayName;
                document.getElementById('walletDisplay').textContent = `$${(userData.wallet || 0).toFixed(2)}`;
                
                // Load dashboard
                loadDashboard();
                
            } catch (error) {
                console.error('Auth error:', error);
                showToast('Error loading user data', true);
            }
        });
        
        // Load Dashboard Stats
        async function loadDashboard() {
            try {
                // Simple queries
                const pendingSnapshot = await db.collection('submissions')
                    .where('userId', '==', currentUser.uid)
                    .where('status', '==', 'pending')
                    .get();
                
                const approvedSnapshot = await db.collection('submissions')
                    .where('userId', '==', currentUser.uid)
                    .where('status', '==', 'approved')
                    .get();
                
                const totalEarned = approvedSnapshot.docs.reduce((sum, doc) => {
                    const data = doc.data();
                    return sum + (data.earned || 0);
                }, 0);
                
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card">
                        <i class="fas fa-wallet"></i>
                        <div class="stat-value">$${(userData.wallet || 0).toFixed(2)}</div>
                        <div class="stat-label">Wallet Balance</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-clock"></i>
                        <div class="stat-value">${pendingSnapshot.size}</div>
                        <div class="stat-label">Pending Review</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-check-circle"></i>
                        <div class="stat-value">${approvedSnapshot.size}</div>
                        <div class="stat-label">Approved</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-dollar-sign"></i>
                        <div class="stat-value">$${totalEarned.toFixed(2)}</div>
                        <div class="stat-label">Total Earned</div>
                    </div>
                `;
                
                // Load tasks by default
                loadTasks();
                
            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card">
                        <i class="fas fa-wallet"></i>
                        <div class="stat-value">$${(userData.wallet || 0).toFixed(2)}</div>
                        <div class="stat-label">Wallet Balance</div>
                    </div>
                `;
                loadTasks();
            }
        }
        
        // Load Tasks
        async function loadTasks() {
            try {
                document.getElementById('content').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading tasks...</p></div>';
                
                // Get all tasks
                const snapshot = await db.collection('tasks').get();
                
                let html = '<h3 style="margin-bottom:1.5rem; color:#333;">Available Tasks</h3>';
                
                if (snapshot.empty) {
                    html += `
                        <div class="empty-state">
                            <i class="fas fa-tasks"></i>
                            <h4>No Tasks Available</h4>
                            <p>Check back later for new tasks.</p>
                        </div>
                    `;
                } else {
                    // Convert to array for manual filtering and sorting
                    const tasks = [];
                    snapshot.forEach(doc => {
                        const taskData = doc.data();
                        tasks.push({ 
                            id: doc.id, 
                            ...taskData 
                        });
                    });
                    
                    // Filter active tasks
                    const activeTasks = tasks.filter(task => task.active === true);
                    
                    if (activeTasks.length === 0) {
                        html += `
                            <div class="empty-state">
                                <i class="fas fa-tasks"></i>
                                <h4>No Active Tasks</h4>
                                <p>All tasks are currently inactive.</p>
                            </div>
                        `;
                    } else {
                        // Sort by createdAt if available (newest first)
                        activeTasks.sort((a, b) => {
                            if (!a.createdAt) return 1;
                            if (!b.createdAt) return -1;
                            return b.createdAt.seconds - a.createdAt.seconds;
                        });
                        
                        html += '<div class="task-grid">';
                        
                        activeTasks.forEach(task => {
                            // Safely handle reward value
                            let rewardValue = 0;
                            if (task.reward) {
                                rewardValue = parseFloat(task.reward);
                                if (isNaN(rewardValue)) {
                                    rewardValue = 0;
                                }
                            }
                            
                            // Safely handle other fields
                            const title = task.title || 'Untitled Task';
                            const description = task.description || 'No description provided';
                            const shortDescription = description.length > 80 ? description.substring(0, 80) + '...' : description;
                            const category = task.category || 'other';
                            const difficulty = task.difficulty || 'medium';
                            
                            html += `
                                <div class="task-card">
                                    <h4 class="task-title">${title}</h4>
                                    <p class="description">${shortDescription}</p>
                                    <div style="display:flex; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap;">
                                        <span class="badge">${category}</span>
                                        <span class="badge">${difficulty}</span>
                                    </div>
                                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:auto;">
                                        <span class="reward-amount">$${rewardValue.toFixed(2)}</span>
                                        <div style="display:flex; gap:0.5rem;">
                                            <button class="btn btn-outline" onclick="viewTaskDetails('${task.id}')">Details</button>
                                            <button class="btn btn-primary" onclick="submitTask('${task.id}')">Submit</button>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                        
                        html += '</div>';
                    }
                }
                
                document.getElementById('content').innerHTML = html;
                
            } catch (error) {
                console.error('Error loading tasks:', error);
                document.getElementById('content').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i>
                        <h4>Error Loading Tasks</h4>
                        <p>${error.message}</p>
                        <button class="btn btn-primary" onclick="loadTasks()" style="margin-top:1rem;">Try Again</button>
                    </div>
                `;
            }
        }
        
        // View Task Details
        async function viewTaskDetails(taskId) {
            try {
                const taskDoc = await db.collection('tasks').doc(taskId).get();
                const task = taskDoc.data();
                
                // Safely handle reward
                let rewardValue = 0;
                if (task.reward) {
                    rewardValue = parseFloat(task.reward);
                    if (isNaN(rewardValue)) {
                        rewardValue = 0;
                    }
                }
                
                const createdDate = task.createdAt ? new Date(task.createdAt.seconds * 1000).toLocaleDateString() : 'N/A';
                
                showModal(`
                    <div class="task-details" style="color:white;">
                        <h2 style="margin-bottom:1rem; font-size:1.8rem;">${task.title || 'Untitled Task'}</h2>
                        
                        <div style="background:rgba(255,255,255,0.1); border-radius:1rem; padding:1.5rem; margin-bottom:1.5rem; backdrop-filter:blur(10px);">

                            <p style="line-height:1.6;">${task.description || 'No description provided'}</p>

                        <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:1rem; margin-bottom:1.5rem;">

                                <span style="font-weight:600;">Reward:</span>

                                <p style="font-size:1.3rem; font-weight:600;">KSh ${(rewardValue * 130).toFixed(2)}</p>

                        <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:1rem; margin-bottom:1.5rem;">
                            <div style="background:rgba(255,255,255,0.1); border-radius:1rem; padding:1rem; backdrop-filter:blur(10px);">
                                <span style="font-weight:600;">Category:</span>
                                <p><span class="badge" style="background:rgba(255,255,255,0.2);">${task.category || 'other'}</span></p>
                            </div>
                            <div style="background:rgba(255,255,255,0.1); border-radius:1rem; padding:1rem; backdrop-filter:blur(10px);">
                                <span style="font-weight:600;">Difficulty:</span>
                                <p><span class="badge" style="background:rgba(255,255,255,0.2);">${task.difficulty || 'medium'}</span></p>

            } catch (error) {

        // Submit Task
        function submitTask(taskId) {
            closeModal(); // Close any open modal
            showModal(`
                <h3 style="margin-bottom:1rem; color:white;">Submit Work</h3>
                <textarea id="workText" placeholder="Enter your work here..." style="width:100%; min-height:150px; margin-bottom:1rem; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.3); color:white; border-radius:1rem; padding:1rem;"></textarea>
                
                <div class="info-box" style="background:rgba(255,255,255,0.1); color:white; border-left-color:#00ff9d; margin-bottom:1rem;">
                    <i class="fas fa-clock"></i> <strong>Review time:</strong> Submissions are reviewed within 3 hours. You'll receive feedback and payment if approved.
                </div>
                
                <button class="btn btn-primary" style="width:100%; background:white; color:#667eea;" onclick="saveSubmission('${taskId}')">Submit Work</button>
            `);
        }
        
        // Save Submission
        async function saveSubmission(taskId) {
            const work = document.getElementById('workText').value;
            if (!work) {
                showToast('Please enter your work', true);
                return;
            }
            
            try {
                const taskDoc = await db.collection('tasks').doc(taskId).get();
                const task = taskDoc.data();
                
                await db.collection('submissions').add({
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    taskId: taskId,
                    taskTitle: task.title || 'Untitled Task',
                    workText: work,
                    status: 'pending',
                    submittedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                await db.collection('tasks').doc(taskId).update({
                    submissionsCount: firebase.firestore.FieldValue.increment(1)
                });
                
                closeModal();
                
                // Show success message with review time info
                showModal(`
                    <div class="success-box" style="text-align:center; background:rgba(255,255,255,0.1); color:white;">
                        <i class="fas fa-check-circle" style="font-size:4rem; color:#00ff9d; margin-bottom:1rem;"></i>
                        <h3 style="margin-bottom:1rem; color:white;">Work Submitted Successfully!</h3>
                        <p style="margin-bottom:1rem;">Your work has been submitted for review.</p>
                        <div style="background:rgba(255,255,255,0.1); border-radius:1rem; padding:1rem; margin:1rem 0; backdrop-filter:blur(10px);">
                            <i class="fas fa-clock" style="color:#00ff9d;"></i>
                            <p style="font-weight:600; margin-top:0.5rem;">Review Time: Up to 3 hours</p>
                            <p style="opacity:0.9; font-size:0.9rem;">You'll receive a notification once your work is reviewed. If approved, payment will be added to your wallet.</p>
                        </div>
                        <button class="btn btn-primary" style="margin-top:1rem; background:white; color:#667eea;" onclick="closeModal(); switchTab('submissions')">View My Submissions</button>
                    </div>
                `);
                
                // Switch to submissions tab
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab')[1].classList.add('active');
                loadSubmissions();
                
            } catch (error) {
                console.error('Error saving submission:', error);
                showToast('Error saving submission. Please try again.', true);
            }
        }
        
        // Load Submissions
        async function loadSubmissions() {
            try {
                document.getElementById('content').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading submissions...</p></div>';
                
                const snapshot = await db.collection('submissions')
                    .where('userId', '==', currentUser.uid)
                    .get();
                
                let html = '<h3 style="margin-bottom:1.5rem; color:#333;">My Submissions</h3>';
                
                if (snapshot.empty) {
                    html += '<p>No submissions yet.</p>';
                } else {
                    const submissions = [];
                    snapshot.forEach(doc => {
                        submissions.push({ id: doc.id, ...doc.data() });
                    });
                    
                    submissions.sort((a, b) => {
                        if (!a.submittedAt) return 1;
                        if (!b.submittedAt) return -1;
                        return b.submittedAt.seconds - a.submittedAt.seconds;
                    });
                    
                    submissions.forEach(sub => {
                        const statusClass = sub.status === 'approved' ? 'success' : sub.status === 'rejected' ? 'danger' : 'warning';
                        
                        const submittedDate = sub.submittedAt ? new Date(sub.submittedAt.seconds * 1000).toLocaleDateString() : 'N/A';
                        
                        html += `
                            <div class="submission-card">
                                <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;">
                                    <h4 style="color:#667eea;">${sub.taskTitle}</h4>
                                    <span class="badge" style="background:${sub.status === 'approved' ? '#10b981' : sub.status === 'rejected' ? '#ef4444' : '#f59e0b'}; color:white;">${sub.status}</span>
                                </div>
                                <p style="color:#64748b; margin-bottom:0.5rem;">${sub.workText.substring(0, 100)}${sub.workText.length > 100 ? '...' : ''}</p>
                                <div style="display:flex; gap:1rem; font-size:0.9rem; color:#64748b; flex-wrap:wrap;">
                                    <span><i class="far fa-calendar"></i> ${submittedDate}</span>
                                    ${sub.score ? `<span>Score: ${sub.score}%</span>` : ''}
                                    ${sub.earned ? `<span style="color:#10b981; font-weight:600;">Earned: $${sub.earned.toFixed(2)}</span>` : ''}
                                </div>
                                ${sub.review ? `<p style="margin-top:0.5rem; background:#f1f5f9; padding:0.5rem; border-radius:10px;"><strong>Feedback:</strong> ${sub.review}</p>` : ''}
                                ${sub.status === 'pending' ? `
                                    <div style="margin-top:0.5rem; font-size:0.9rem; color:#f59e0b;">
                                        <i class="fas fa-clock"></i> Under review (up to 3 hours)
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    });
                }
                
                document.getElementById('content').innerHTML = html;
                
            } catch (error) {
                console.error('Error loading submissions:', error);
                document.getElementById('content').innerHTML = '<p style="color:#ef4444;">Error loading submissions.</p>';
            }
        }
        
        // Load Withdrawals
        async function loadWithdrawals() {

                    document.getElementById('content').innerHTML = `
                        <div style="text-align:center; padding:2rem;">

                            <h3 style="margin-bottom:1.5rem;">Premium Membership Benefits</h3>
                            
                            <div class="benefits-grid">

                                </div>
                                <div class="benefit-card">
                                    <i class="fas fa-percent"></i>

                                    <p>Get access to premium tasks with higher payouts</p>
                                </div>
                                <div class="benefit-card">
                                    <i class="fas fa-bolt"></i>
                                    <h4>Priority Processing</h4>
                                    <p>Your submissions are reviewed faster</p>
                                </div>
                                <div class="benefit-card">
                                    <i class="fas fa-headset"></i>
                                    <h4>Priority Support</h4>
                                    <p>Get faster responses to your questions</p>
                                </div>
                            </div>
                            
                            <div style="background:linear-gradient(135deg, #f59e0b20, #fbbf2420); border-radius:2rem; padding:2rem; margin:2rem 0;">
                                <div class="price-tag">
                                    $3 <small>/month</small>
                                </div>
                                <p style="color:#64748b; margin-bottom:1.5rem;">Cancel anytime · No hidden fees</p>
                                <button class="btn btn-success" style="padding:1rem 3rem; font-size:1.2rem; background:linear-gradient(135deg, #43e97b, #38f9d7); color:white; border:none;" onclick="showMembershipPayment()">Upgrade Now</button>
                                <p style="margin-top:1rem; font-size:0.9rem;">Pay via <span class="lipwa-badge">Lipwa.com</span></p>
                            </div>
                            
                            <div style="background:#f8fafc; border-radius:1rem; padding:1.5rem; text-align:left;">

                                <p style="color:#64748b; font-style:italic;">"Best decision I made! I can now withdraw my earnings instantly." - John D.</p>
                                <p style="color:#64748b; font-style:italic; margin-top:1rem;">"Premium tasks pay so much better. Already made back my subscription." - Sarah M.</p>
                            </div>
                        </div>
                    `;
                    return;
                }
                
                document.getElementById('content').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading withdrawals...</p></div>';
                
                const snapshot = await db.collection('withdrawals')
                    .where('userId', '==', currentUser.uid)
                    .get();
                
                let html = `
                    <h3 style="margin-bottom:1.5rem; color:#333;">Withdraw Funds</h3>
                    <div style="background:linear-gradient(135deg, #667eea10, #764ba210); border-radius:1.5rem; padding:1.5rem; margin-bottom:2rem;">
                        <div style="font-size:1.5rem; font-weight:700; margin-bottom:1rem;">Available Balance: <span style="color:#10b981;">$${(userData.wallet || 0).toFixed(2)}</span></div>
                        <input type="number" id="withdrawAmount" placeholder="Amount (USD)" min="5" step="0.01">
                        <select id="withdrawMethod">
                            <option value="mpesa">M-Pesa</option>
                            <option value="airtel">Airtel Money</option>
                        </select>
                        <input type="tel" id="withdrawPhone" placeholder="Phone Number">
                        <button class="btn btn-primary" style="width:100%;" onclick="requestWithdrawal()">Request Withdrawal</button>
                        <p style="font-size:0.9rem; color:#64748b; margin-top:0.5rem;">Minimum withdrawal: $5</p>
                    </div>
                    <h4 style="margin-bottom:1rem;">Withdrawal History</h4>
                `;
                
                if (snapshot.empty) {
                    html += '<p>No withdrawals yet.</p>';
                } else {
                    const withdrawals = [];
                    snapshot.forEach(doc => {
                        withdrawals.push({ id: doc.id, ...doc.data() });
                    });
                    
                    withdrawals.sort((a, b) => {
                        if (!a.requestedAt) return 1;
                        if (!b.requestedAt) return -1;
                        return b.requestedAt.seconds - a.requestedAt.seconds;
                    });
                    
                    withdrawals.forEach(w => {
                        const requestedDate = w.requestedAt ? new Date(w.requestedAt.seconds * 1000).toLocaleDateString() : 'N/A';
                        
                        html += `
                            <div class="submission-card">
                                <div style="display:flex; justify-content:space-between;">
                                    <span><strong>$${w.amount}</strong> via ${w.method}</span>
                                    <span class="badge" style="background:${w.status === 'paid' ? '#10b981' : '#f59e0b'}; color:white;">${w.status}</span>
                                </div>
                                <p style="color:#64748b; font-size:0.9rem;">${w.phone} • ${requestedDate}</p>
                            </div>
                        `;
                    });
                }
                
                document.getElementById('content').innerHTML = html;
                
            } catch (error) {
                console.error('Error loading withdrawals:', error);
                document.getElementById('content').innerHTML = '<p style="color:#ef4444;">Error loading withdrawals.</p>';
            }
        }
        
        // Request Withdrawal
        async function requestWithdrawal() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const method = document.getElementById('withdrawMethod').value;
            const phone = document.getElementById('withdrawPhone').value;
            
            if (!amount || amount < 5) {
                showToast('Minimum withdrawal is $5', true);
                return;
            }
            
            if (amount > userData.wallet) {
                showToast('Insufficient balance', true);
                return;
            }
            
            if (!phone) {
                showToast('Enter phone number', true);
                return;
            }
            
            try {
                await db.collection('users').doc(currentUser.uid).update({
                    wallet: firebase.firestore.FieldValue.increment(-amount)
                });
                
                await db.collection('withdrawals').add({
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    amount,
                    amountKES: amount * 130,
                    method,
                    phone,
                    status: 'pending',
                    requestedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                userData.wallet -= amount;
                document.getElementById('walletDisplay').textContent = `$${userData.wallet.toFixed(2)}`;
                
                showToast('Withdrawal requested successfully!');
                loadWithdrawals();
                
            } catch (error) {
                console.error('Error requesting withdrawal:', error);
                showToast('Error requesting withdrawal', true);
            }
        }
        
        // Load Messages
        async function loadMessages() {
            try {
                document.getElementById('content').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading messages...</p></div>';
                
                const snapshot = await db.collection('messages')
                    .where('userId', '==', currentUser.uid)
                    .get();
                
                let html = '<h3 style="margin-bottom:1.5rem; color:#333;">Messages</h3>';
                
                if (snapshot.empty) {
                    html += '<p>No messages yet.</p>';
                } else {
                    const messages = [];
                    snapshot.forEach(doc => {
                        messages.push({ id: doc.id, ...doc.data() });
                    });
                    
                    messages.sort((a, b) => {
                        if (!a.createdAt) return 1;
                        if (!b.createdAt) return -1;
                        return b.createdAt.seconds - a.createdAt.seconds;
                    });
                    
                    messages.forEach(msg => {
                        const msgDate = msg.createdAt ? new Date(msg.createdAt.seconds * 1000).toLocaleString() : 'N/A';
                        
                        html += `
                            <div class="submission-card">
                                <p>${msg.message}</p>
                                <p style="color:#64748b; font-size:0.9rem;">${msgDate}</p>
                            </div>
                        `;
                    });
                }
                
                document.getElementById('content').innerHTML = html;
                
            } catch (error) {
                console.error('Error loading messages:', error);
                document.getElementById('content').innerHTML = '<p style="color:#ef4444;">Error loading messages.</p>';
            }
        }
        
        // Load Profile
        function loadProfile() {
            const joinDate = userData.createdAt ? new Date(userData.createdAt.seconds * 1000).toLocaleDateString() : 'N/A';
            
            document.getElementById('content').innerHTML = `
                <h3 style="margin-bottom:1.5rem; color:#333;">Profile Settings</h3>
                <div style="background:linear-gradient(135deg, #667eea10, #764ba210); border-radius:1.5rem; padding:1.5rem;">
                    <input type="text" id="profileName" value="${userData.displayName || ''}" placeholder="Display Name">
                    <input type="tel" id="profilePhone" value="${userData.phone || ''}" placeholder="Phone Number">
                    <button class="btn btn-primary" style="width:100%;" onclick="updateProfile()">Update Profile</button>
                </div>
                <div style="margin-top:1rem; padding:1rem; background:linear-gradient(135deg, #667eea10, #764ba210); border-radius:1rem;">
                    <p><strong>Email:</strong> ${userData.email}</p>
                    <p><strong>Member since:</strong> ${joinDate}</p>
                    <p><strong>Membership:</strong> 
                        <span class="badge" style="background:${userData.membershipPaid ? 'linear-gradient(135deg, #f59e0b, #fbbf24)' : '#f59e0b'}; color:white;">
                            ${userData.membershipPaid ? 'Premium' : 'Free'}
                        </span>
                    </p>
                    ${!userData.membershipPaid ? `
                        <button class="btn btn-success" style="width:100%; margin-top:1rem; background:linear-gradient(135deg, #43e97b, #38f9d7); color:white; border:none;" onclick="switchTab('withdrawals')">Upgrade to Premium</button>
                    ` : ''}
                </div>
            `;
        }
        
        // Update Profile
        async function updateProfile() {
            const name = document.getElementById('profileName').value;
            const phone = document.getElementById('profilePhone').value;
            
            if (!name) {
                showToast('Name is required', true);
                return;
            }
            
            try {
                await db.collection('users').doc(currentUser.uid).update({
                    displayName: name,
                    phone: phone || ''
                });
                
                userData.displayName = name;
                userData.phone = phone;
                document.getElementById('userName').textContent = name;
                
                showToast('Profile updated successfully!');
                
            } catch (error) {
                console.error('Error updating profile:', error);
                showToast('Error updating profile', true);
            }
        }

        function showMembershipPayment() {

                <div style="background:rgba(255,255,255,0.1); border-radius:1rem; padding:1rem; margin-bottom:1rem; backdrop-filter:blur(10px);">

                    <ol style="margin-left:1.5rem; color:white;">
                        <li>Visit <a href="https://lipwa.com" target="_blank" style="color:#00ff9d;">lipwa.com</a></li>
                        <li>Send $3 to username: <strong>@nextgen</strong></li>
                        <li>Copy the transaction ID</li>
                        <li>Enter it below</li>
                    </ol>
                </div>
                
                <input type="text" id="transactionCode" placeholder="Enter Lipwa Transaction ID" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.3); color:white;">

        // Submit Payment Proof
        async function submitPaymentProof() {
            const code = document.getElementById('transactionCode').value;
            if (!code) {

            }
            
            try {
                await db.collection('membershipPayments').add({

                    userEmail: currentUser.email,
                    transactionCode: code,
                    status: 'pending',
                    submittedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                await db.collection('users').doc(currentUser.uid).update({
                    membershipStatus: 'pending'
                });
                
                closeModal();
                showToast('Payment proof submitted for review!');
                
            } catch (error) {
                console.error('Error submitting payment:', error);
                showToast('Error submitting payment', true);

    </script>
