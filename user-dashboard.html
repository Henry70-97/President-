<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NextGen · User Dashboard</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Keep all your existing styles - they remain the same */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', 'Plus Jakarta Sans', sans-serif; 
        }
        
        body { 
            background: linear-gradient(145deg, #f1f5f9 0%, #e6eefc 100%); 
            min-height: 100vh; 
        }
        
        .app-container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 1rem; 
        }
        
        .header { 
            background: white; 
            border-radius: 2rem; 
            padding: 1rem 2rem; 
            margin-bottom: 1.5rem; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            position: relative;
        }
        
        .logo h2 { 
            background: linear-gradient(135deg, #6366f1, #10b981); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        
        .user-menu { 
            display: flex; 
            align-items: center; 
            gap: 1rem; 
        }
        
        .wallet-badge { 
            background: #6366f120; 
            padding: 0.6rem 1.2rem; 
            border-radius: 40px; 
            color: #6366f1; 
            font-weight: 700; 
            font-size: 1.1rem;
        }
        
        #userName {
            font-weight: 600;
            font-size: 1.1rem;
            color: #1e293b;
        }
        
        .logout-btn { 
            background: none; 
            border: none; 
            color: #ef4444; 
            font-size: 1.3rem; 
            cursor: pointer; 
            padding: 0.5rem; 
        }
        
        .hamburger-menu {
            display: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #6366f1;
            padding: 0.5rem;
        }
        
        .mobile-nav {
            display: none;
            position: fixed;
            top: 0;
            left: -100%;
            width: 85%;
            max-width: 350px;
            height: 100vh;
            background: white;
            z-index: 2000;
            padding: 2rem;
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
            transition: left 0.3s ease;
            overflow-y: auto;
        }
        
        .mobile-nav.active {
            left: 0;
            display: block;
        }
        
        .mobile-nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #f1f5f9;
        }
        
        .mobile-nav-header h3 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #6366f1;
        }
        
        .close-menu {
            font-size: 1.8rem;
            cursor: pointer;
            color: #64748b;
        }
        
        .mobile-nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-radius: 1rem;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #1e293b;
        }
        
        .mobile-nav-item:hover {
            background: #f1f5f9;
        }
        
        .mobile-nav-item.active {
            background: #6366f1;
            color: white;
        }
        
        .mobile-nav-item i {
            width: 24px;
            font-size: 1.3rem;
        }
        
        .mobile-nav-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1999;
        }
        
        .mobile-nav-overlay.active {
            display: block;
        }
        
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 1.2rem; 
            margin-bottom: 2rem; 
        }
        
        .stat-card { 
            background: white; 
            border-radius: 1.5rem; 
            padding: 1.8rem; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            transition: transform 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-3px);
        }
        
        .stat-card i { 
            font-size: 2.2rem; 
            color: #6366f1; 
            margin-bottom: 0.8rem; 
        }
        
        .stat-value { 
            font-size: 2.2rem; 
            font-weight: 800; 
            color: #0f172a; 
            line-height: 1.2;
            letter-spacing: -0.5px;
        }
        
        .stat-label { 
            color: #64748b; 
            font-size: 1rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .tabs { 
            display: flex; 
            gap: 0.5rem; 
            flex-wrap: wrap; 
            margin-bottom: 1.5rem; 
        }
        
        .tab { 
            padding: 0.8rem 1.5rem; 
            border: none; 
            border-radius: 40px; 
            background: white; 
            font-weight: 600; 
            font-size: 0.95rem;
            cursor: pointer; 
            transition: all 0.3s; 
        }
        
        .tab.active { 
            background: #6366f1; 
            color: white; 
        }
        
        .content { 
            background: white; 
            border-radius: 2rem; 
            padding: 2.5rem; 
            min-height: 500px; 
        }
        
        .task-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 1.8rem; 
        }
        
        .task-card:nth-child(odd) { 
            background: #f8fafc; 
            border-left: 4px solid #6366f1;
        }
        
        .task-card:nth-child(even) { 
            background: #eef2ff; 
            border-left: 4px solid #10b981;
        }
        
        .task-card { 
            border-radius: 1.5rem; 
            padding: 1.8rem; 
            border: 1px solid #e2e8f0; 
            transition: transform 0.2s; 
        }
        
        .task-card:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.1); 
        }
        
        .task-title { 
            color: #10b981; 
            font-weight: 800; 
            font-size: 1.4rem; 
            margin-bottom: 0.5rem; 
            line-height: 1.3;
        }
        
        .client-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
            color: #4b5563;
            font-size: 0.95rem;
            background: rgba(255,255,255,0.5);
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            width: fit-content;
        }
        
        .client-info i {
            color: #6366f1;
            font-size: 0.9rem;
        }
        
        .deadline-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            width: fit-content;
        }
        
        .deadline-badge.upcoming {
            background: #f59e0b20;
            color: #f59e0b;
        }
        
        .deadline-badge.urgent {
            background: #ef444420;
            color: #ef4444;
            animation: pulse 2s infinite;
        }
        
        .deadline-badge.expired {
            background: #64748b20;
            color: #64748b;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        
        .deadline-badge i {
            font-size: 1rem;
        }
        
        .task-amount { 
            color: #10b981; 
            font-weight: 800; 
            font-size: 1.6rem; 
            letter-spacing: -0.5px;
        }
        
        .expired-message {
            background: #fee2e2;
            color: #ef4444;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            margin-top: 0.5rem;
        }
        
        .badge { 
            padding: 0.4rem 1.2rem; 
            border-radius: 40px; 
            font-size: 0.9rem; 
            font-weight: 700; 
            display: inline-block; 
            letter-spacing: 0.3px;
        }
        
        .badge.primary { 
            background: #6366f120; 
            color: #6366f1; 
        }
        
        .badge.success { 
            background: #10b98120; 
            color: #10b981; 
        }
        
        .badge.warning { 
            background: #f59e0b20; 
            color: #f59e0b; 
        }
        
        .badge.danger { 
            background: #ef444420; 
            color: #ef4444; 
        }
        
        .btn { 
            padding: 0.9rem 1.8rem; 
            border: none; 
            border-radius: 40px; 
            font-weight: 700; 
            font-size: 1rem;
            letter-spacing: 0.3px;
            cursor: pointer; 
            transition: all 0.3s; 
        }
        
        .btn-primary { 
            background: #6366f1; 
            color: white; 
        }
        
        .btn-primary:hover { 
            background: #4f52e0; 
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
        
        .btn-success { 
            background: #10b981; 
            color: white; 
        }
        
        .btn-success:hover { 
            background: #059669; 
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }
        
        .btn-secondary { 
            background: #64748b; 
            color: white; 
        }
        
        .btn-secondary:hover { 
            background: #475569; 
            transform: translateY(-2px);
        }
        
        .btn-accept { 
            background: #10b981; 
            color: white; 
            padding: 0.7rem 1.5rem; 
            font-weight: 700; 
            font-size: 1rem;
        }
        
        .btn-accept:hover { 
            background: #059669; 
        }
        
        .btn-disabled {
            background: #94a3b8;
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .btn-disabled:hover {
            background: #94a3b8;
            transform: none;
            box-shadow: none;
        }
        
        /* WhatsApp Group Button */
        .whatsapp-group-btn {
            background: #25D366;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-size: 0.95rem;
        }
        
        .whatsapp-group-btn:hover {
            background: #128C7E;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }
        
        .whatsapp-group-btn i {
            font-size: 1.2rem;
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        /* Membership Packages */
        .packages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }
        
        .package-card {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }
        
        .package-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        
        .package-card.basic {
            border-color: #94a3b8;
        }
        
        .package-card.premium {
            border-color: #6366f1;
            background: linear-gradient(145deg, #ffffff, #f5f3ff);
        }
        
        .package-card.elite {
            border-color: #f59e0b;
            background: linear-gradient(145deg, #ffffff, #fffbeb);
        }
        
        /* Disabled package styles */
        .package-card.disabled-package {
            opacity: 0.7;
            filter: grayscale(0.5);
            cursor: not-allowed;
        }
        
        .package-card.disabled-package:hover {
            transform: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .package-btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .package-btn:disabled:hover {
            transform: none;
            box-shadow: none;
        }
        
        .package-badge {
            position: absolute;
            top: 1rem;
            right: -2rem;
            background: #10b981;
            color: white;
            padding: 0.3rem 3rem;
            transform: rotate(45deg);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .package-badge.popular {
            background: #6366f1;
        }
        
        .package-badge.best-value {
            background: #f59e0b;
        }
        
        .package-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .package-name {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        
        .package-card.basic .package-name {
            color: #475569;
        }
        
        .package-card.premium .package-name {
            color: #6366f1;
        }
        
        .package-card.elite .package-name {
            color: #f59e0b;
        }
        
        .package-price {
            font-size: 2.2rem;
            font-weight: 800;
            color: #0f172a;
        }
        
        .package-price small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #64748b;
        }
        
        .package-features {
            list-style: none;
            margin: 1.5rem 0;
            padding: 0;
        }
        
        .package-features li {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 0;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }
        
        .package-features li:last-child {
            border-bottom: none;
        }
        
        .package-features i {
            width: 20px;
        }
        
        .package-features .fa-check-circle {
            color: #10b981;
        }
        
        .package-features .fa-times-circle {
            color: #ef4444;
        }
        
        .package-features .fa-star {
            color: #f59e0b;
        }
        
        .package-features .fa-gem {
            color: #6366f1;
        }
        
        .package-features .fa-gift {
            color: #10b981;
        }
        
        .package-features .fa-trophy {
            color: #f59e0b;
        }
        
        .package-features .fa-percent {
            color: #6366f1;
        }
        
        .package-features .fa-users {
            color: #6366f1;
        }
        
        .package-btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        
        .package-btn.basic {
            background: #e2e8f0;
            color: #475569;
        }
        
        .package-btn.basic:hover {
            background: #cbd5e1;
        }
        
        .package-btn.premium {
            background: #6366f1;
            color: white;
        }
        
        .package-btn.premium:hover {
            background: #4f52e0;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
        
        .package-btn.elite {
            background: #f59e0b;
            color: white;
        }
        
        .package-btn.elite:hover {
            background: #d97706;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3);
        }
        
        .package-btn.current {
            background: #10b981;
            color: white;
            cursor: default;
        }
        
        .package-btn.current:hover {
            transform: none;
            box-shadow: none;
        }
        
        .text-success {
            color: #10b981;
        }
        
        .current-membership {
            background: #f0fdf4;
            border: 2px solid #10b981;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .current-membership-info h4 {
            color: #10b981;
            margin-bottom: 0.3rem;
        }
        
        .current-membership-info p {
            color: #334155;
        }
        
        .current-membership-badge {
            background: #10b981;
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
        }
        
        /* Upgrade banner */
        .upgrade-banner {
            background: linear-gradient(135deg, #f59e0b20, #fbbf2420);
            border: 2px solid #f59e0b;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .upgrade-banner i {
            color: #f59e0b;
            font-size: 1.5rem;
        }
        
        .upgrade-banner-content {
            flex: 1;
        }
        
        .upgrade-banner-title {
            font-weight: 600;
            color: #92400e;
            margin-bottom: 0.2rem;
        }
        
        .upgrade-banner-text {
            color: #92400e;
            font-size: 0.9rem;
        }
        
        /* Referral Section - User View */
        .referral-section {
            background: linear-gradient(145deg, #f0f9ff, #e6f2ff);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 2px solid #6366f1;
        }
        
        .referral-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .referral-header i {
            font-size: 2.5rem;
            color: #6366f1;
        }
        
        .referral-header h3 {
            margin-bottom: 0;
            color: #6366f1;
        }
        
        .referral-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .referral-stat-card {
            background: white;
            border-radius: 1rem;
            padding: 1.2rem;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .referral-stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: #6366f1;
        }
        
        .referral-stat-label {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }
        
        .referral-link-box {
            background: white;
            border-radius: 40px;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 2px solid #e2e8f0;
            margin-bottom: 1rem;
        }
        
        .referral-link-box input {
            flex: 1;
            border: none;
            padding: 0.8rem 1rem;
            margin: 0;
            font-size: 0.9rem;
            background: transparent;
        }
        
        .referral-link-box input:focus {
            outline: none;
        }
        
        .referral-link-box button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        
        .referral-link-box button:hover {
            background: #4f52e0;
        }
        
        .referral-info {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 1rem;
        }
        
        .referral-info-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #475569;
            font-size: 0.95rem;
        }
        
        .referral-info-item i {
            color: #10b981;
        }
        
        .referral-table {
            margin-top: 2rem;
            overflow-x: auto;
        }
        
        .referral-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .referral-table th {
            text-align: left;
            padding: 1rem;
            background: #f1f5f9;
            color: #475569;
            font-weight: 600;
        }
        
        .referral-table td {
            padding: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .referral-table tr:hover {
            background: #f8fafc;
        }
        
        .commission-badge {
            background: #10b98120;
            color: #10b981;
            padding: 0.2rem 0.5rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .status-badge {
            background: #f59e0b20;
            color: #f59e0b;
            padding: 0.2rem 0.5rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .withdrawal-section {
            background: #f8fafc;
            border-radius: 1.5rem;
            padding: 2rem;
            margin-top: 2rem;
            border: 1px solid #e2e8f0;
            position: relative;
        }
        
        .withdrawal-section.disabled {
            opacity: 0.6;
        }
        
        .withdrawal-section.disabled::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.5);
            border-radius: 1.5rem;
            z-index: 1;
        }
        
        .withdrawal-section.disabled .withdrawal-content {
            filter: blur(1px);

        // Helper function to check if deadline has passed
        function isDeadlinePassed(deadline) {
            if (!deadline) return false;
            const now = new Date();
            const deadlineDate = deadline.toDate ? deadline.toDate() : new Date(deadline);
            return now > deadlineDate;
        }
        
        // Helper function to format deadline
        function formatDeadline(deadline) {
            if (!deadline) return 'No deadline';
            const date = deadline.toDate ? deadline.toDate() : new Date(deadline);
            const now = new Date();
            const diffTime = date - now;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const diffHours = Math.ceil(diffTime / (1000 * 60 * 60));
            
            if (diffTime < 0) {
                return 'Expired';
            } else if (diffDays > 7) {
                return date.toLocaleDateString();
            } else if (diffDays > 1) {
                return `${diffDays} days left`;
            } else if (diffDays === 1) {
                return '1 day left';
            } else {
                return `${diffHours} hours left`;
            }
        }
        
        // Helper function to get deadline class
        function getDeadlineClass(deadline) {
            if (!deadline) return '';
            const date = deadline.toDate ? deadline.toDate() : new Date(deadline);
            const now = new Date();
            const diffTime = date - now;
            const diffDays = diffTime / (1000 * 60 * 60 * 24);
            
            if (diffTime < 0) {
                return 'expired';
            } else if (diffDays < 1) {
                return 'urgent';
            } else {
                return 'upcoming';
            }
        }

                const snapshot = await db.collection('submissions')
                    .where('userId', '==', currentUser.uid)
                    .where('taskId', '==', taskId)

        // Save Submission
        async function saveSubmission(taskId) {
            const work = document.getElementById('workText').value;
            if (!work) {
                showAlert('Please enter your work', 'error');
                return;
            }
            
            if (work.length < 20) {
                showAlert('Please provide more detailed work (at least 20 characters)', 'error');
                return;
            }
            
            try {
                const taskDoc = await db.collection('tasks').doc(taskId).get();
                const task = taskDoc.data();
                
                if (isDeadlinePassed(task.deadline)) {
                    showAlert('This task has expired. Submissions are no longer accepted.', 'error');
                    closeModal();
                    return;
                }
                
                const hasSubmitted = await hasUserSubmitted(taskId);
                
                if (hasSubmitted) {
                    closeModal();
                    showAlert('You have already submitted this task', 'error');
                    return;
                }
                
                await db.collection('submissions').add({
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    taskId: taskId,
                    taskTitle: task.title || 'Untitled Task',
                    workText: work,
                    status: 'pending',
                    paidToWallet: false,
                    submittedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                await db.collection('tasks').doc(taskId).update({
                    submissionsCount: firebase.firestore.FieldValue.increment(1)
                });
                
                closeModal();
                showAlert('Submission saved successfully!', 'success');
                switchTab('submissions');
                
            } catch (error) {
                console.error('Error saving submission:', error);
                showAlert('Your work has been submitted successfully. It will be reviewed within 3 hours', 'success');
                switchTab('submissions');
            }
        }
        
        // Load Submissions
        async function loadSubmissions() {
            try {
                document.getElementById('content').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading submissions...</p></div>';
                
                const snapshot = await db.collection('submissions')
                    .where('userId', '==', currentUser.uid)
                    .get();
                
                let html = '<h3 style="margin-bottom: 2rem;">My Submissions</h3>';
                
                if (snapshot.empty) {
                    html += '<div class="empty-state"><i class="fas fa-file-alt"></i><p>No submissions yet.</p><p style="font-size:0.95rem; color:#94a3b8;">Complete some tasks to see them here!</p></div>';
                } else {
                    const submissions = [];
                    snapshot.forEach(doc => {
                        submissions.push({ id: doc.id, ...doc.data() });
                    });
                    
                    submissions.sort((a, b) => {
                        if (!a.submittedAt) return 1;
                        if (!b.submittedAt) return -1;
                        return (b.submittedAt.seconds || 0) - (a.submittedAt.seconds || 0);
                    });
                    
                    html += '<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">';
                    
                    submissions.forEach(sub => {
                        const statusClass = sub.status === 'approved' ? 'success' : sub.status === 'rejected' ? 'danger' : 'warning';
                        
                        let submittedDate = 'N/A';
                        if (sub.submittedAt && sub.submittedAt.seconds) {
                            submittedDate = new Date(sub.submittedAt.seconds * 1000).toLocaleDateString();

                        html += `

                                ${sub.review ? `<p style="margin-top:0.3rem; background:#f1f5f9; padding:0.4rem; border-radius:0.3rem; font-size:0.8rem;"><strong>Feedback:</strong> ${sub.review}</p>` : ''}

                        `;
                    });
                    
                    html += '</div>';
                }
                
                document.getElementById('content').innerHTML = html;
                
            } catch (error) {
                console.error('Error loading submissions:', error);
                document.getElementById('content').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i>

        // Also update selectMembership function to prevent downgrades
        function selectMembership(membershipType) {
            // Define package hierarchy
            const packageHierarchy = {
                [MEMBERSHIP_TYPES.BASIC]: 1,
                [MEMBERSHIP_TYPES.PREMIUM]: 2,
                [MEMBERSHIP_TYPES.ELITE]: 3
            };
            
            const currentTierLevel = packageHierarchy[userData.membershipType] || 1;
            const selectedTierLevel = packageHierarchy[membershipType] || 1;
            
            // Check if trying to downgrade
            if (selectedTierLevel < currentTierLevel && userData.membershipType !== MEMBERSHIP_TYPES.BASIC) {
                showModal(`
                    <div class="modal-content">
                        <i class="fas fa-ban" style="font-size: 4rem; color: #ef4444; margin-bottom: 1rem; display: block; text-align: center;"></i>
                        <h3 style="margin-bottom:1rem; color:#ef4444; text-align: center;">Cannot Downgrade</h3>
                        <p style="margin-bottom:1.5rem; text-align: center;">
                            You cannot downgrade to a lower tier package. You can only upgrade to higher tiers.
                        </p>
                        <p style="margin-bottom:1.5rem; text-align: center; color:#64748b;">
                            If you need assistance, please contact support.
                        </p>
                        <div style="display:flex; gap:1rem; margin-top:1.5rem; justify-content: center;">
                            <button class="btn btn-primary" onclick="closeModal()">OK</button>
                        </div>
                    </div>
                `);
                return;
            }
            
            if (membershipType === MEMBERSHIP_TYPES.BASIC && userData.membershipType !== MEMBERSHIP_TYPES.BASIC) {
                // Already handled by hierarchy check, but just in case
                showAlert('You cannot downgrade to Basic', 'error');
                return;
            }
            
            if (membershipType === MEMBERSHIP_TYPES.BASIC) {
                // Basic is free, just update membership
                updateMembership(membershipType);
            } else {
                // Show payment modal for premium or elite
                showMembershipPayment(membershipType);
            }
        }

        // Submit membership payment
        async function submitMembershipPayment(membershipType) {
            const code = document.getElementById('transactionCode')?.value;
            if (!code) {
                showAlert('Enter transaction ID', 'error');
                return;
            }
            
            const pkg = getPackageByType(membershipType);
            
            try {
                await db.collection('membershipPayments').add({
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    membershipType: membershipType,
                    membershipName: pkg.name,
                    transactionCode: code,
                    amount: pkg.price,
                    duration: pkg.duration,
                    status: 'pending',
                    submittedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                showAlert('Payment proof submitted for review! You will be upgraded once verified.', 'success');
                closeModal();
                
            } catch (error) {
                console.error('Error submitting payment:', error);
                showAlert('Error submitting payment', 'error');
            }
        }
        
        // Update membership directly (for basic)
        async function updateMembership(membershipType) {
            try {
                const pkg = getPackageByType(membershipType);
                const updateData = {
                    membershipType: membershipType,
                    membershipPaid: membershipType !== MEMBERSHIP_TYPES.BASIC,
                    membershipStatus: 'active',
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                
                // Set expiry date for premium (annual)
                if (membershipType === MEMBERSHIP_TYPES.PREMIUM && pkg.duration === 'annual') {
                    const expiryDate = new Date();
                    expiryDate.setFullYear(expiryDate.getFullYear() + 1);
                    updateData.membershipExpiry = firebase.firestore.Timestamp.fromDate(expiryDate);
                }
                
                await db.collection('users').doc(currentUser.uid).update(updateData);
                
                userData.membershipType = membershipType;
                
                showAlert(`You are now on the ${pkg.name} plan!`, 'success');
                loadWithdrawals(); // Reload the page
                
            } catch (error) {
                console.error('Error updating membership:', error);
                showAlert('Error updating membership', 'error');
            }
        }
        
        // Update fee breakdown - now uses dynamic fee percentages
        function updateFeeBreakdown(maxBalance) {
            const amountInput = document.getElementById('withdrawAmount');
            if (!amountInput) return;
            
            const amount = parseFloat(amountInput.value) || 0;
            const warning = document.getElementById('withdrawWarning');
            const withdrawBtn = document.getElementById('withdrawBtn');
            const feeBreakdown = document.getElementById('feeBreakdown');
            
            if (amount <= 0) {
                if (feeBreakdown) feeBreakdown.style.display = 'none';
                if (warning) warning.style.display = 'none';
                if (withdrawBtn) withdrawBtn.disabled = false;
                return;
            }
            
            const transactionFee = amount * (TRANSACTION_FEE_PERCENT / 100);
            const platformFee = amount * (PLATFORM_FEE_PERCENT / 100);
            const totalFees = transactionFee + platformFee;
            const netAmount = amount - totalFees;
            
            document.getElementById('displayWithdrawAmount').textContent = `$${amount.toFixed(2)}`;
            document.getElementById('displayTransactionFee').textContent = `-$${transactionFee.toFixed(2)}`;
            document.getElementById('displayPlatformFee').textContent = `-$${platformFee.toFixed(2)}`;
            document.getElementById('displayNetAmount').textContent = `$${netAmount.toFixed(2)}`;
            document.getElementById('displayTotalFees').textContent = `$${totalFees.toFixed(2)}`;
            
            if (amount > maxBalance) {
                warning.style.display = 'block';
                if (withdrawBtn) withdrawBtn.disabled = true;
                if (feeBreakdown) feeBreakdown.style.display = 'none';
            } else if (amount < 5) {
                warning.textContent = 'Minimum withdrawal amount is $5';
                warning.style.display = 'block';
                if (withdrawBtn) withdrawBtn.disabled = true;
                if (feeBreakdown) feeBreakdown.style.display = 'block';
            } else {
                warning.style.display = 'none';
                if (withdrawBtn) withdrawBtn.disabled = false;
                if (feeBreakdown) feeBreakdown.style.display = 'block';
            }
        }
        
        // Request Withdrawal - now uses dynamic fee percentages
        async function requestWithdrawal() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const method = document.getElementById('withdrawMethod').value;
            const phone = document.getElementById('withdrawPhone').value;
            
            const transactionFee = amount * (TRANSACTION_FEE_PERCENT / 100);
            const platformFee = amount * (PLATFORM_FEE_PERCENT / 100);
            const totalFees = transactionFee + platformFee;
            const netAmount = amount - totalFees;
            
            try {
                const userDoc = await db.collection('users').doc(currentUser.uid).get();
                const latestBalance = userDoc.data().wallet || 0;
                
                if (!amount || isNaN(amount) || amount <= 0) {
                    showAlert('Please enter a valid amount', 'error');
                    return;
                }
                
                if (amount < 5) {
                    showAlert('Minimum withdrawal is $5', 'error');
                    return;
                }
                
                if (amount > latestBalance) {
                    showAlert(`Insufficient balance. You have $${latestBalance.toFixed(2)} available`, 'error');
                    return;
                }
                
                if (!phone || phone.length < 10) {
                    showAlert('Enter a valid phone number', 'error');
                    return;
                }
                
                // Double-check membership
                if (userData.membershipType === MEMBERSHIP_TYPES.BASIC) {
                    showAlert('You need to upgrade to Premium or Elite to withdraw', 'error');
                    return;
                }
                
                const confirmWithdrawal = confirm(
                    `Withdrawal Summary:\n\n` +
                    `Requested Amount: $${amount.toFixed(2)}\n` +
                    `Transaction Fee (${TRANSACTION_FEE_PERCENT}%): -$${transactionFee.toFixed(2)}\n` +
                    `Platform Fee (${PLATFORM_FEE_PERCENT}%): -$${platformFee.toFixed(2)}\n` +
                    `Total Fees: -$${totalFees.toFixed(2)}\n` +
                    `You Will Receive: $${netAmount.toFixed(2)}\n\n` +
                    `Proceed with withdrawal?`
                );
                
                if (!confirmWithdrawal) {
                    return;
                }
                
                const pendingSnapshot = await db.collection('withdrawals')
                    .where('userId', '==', currentUser.uid)
                    .where('status', '==', 'pending')
                    .get();
                
                if (!pendingSnapshot.empty) {
                    showAlert('You already have a pending withdrawal request', 'error');
                    return;
                }
                
                await db.runTransaction(async (transaction) => {
                    const userRef = db.collection('users').doc(currentUser.uid);
                    const userSnap = await transaction.get(userRef);
                    
                    const currentBalance = userSnap.data().wallet || 0;
                    const currentTotalFees = userSnap.data().totalFeesPaid || 0;
                    
                    if (amount > currentBalance) {
                        throw new Error('Insufficient balance');
                    }
                    
                    transaction.update(userRef, {
                        wallet: firebase.firestore.FieldValue.increment(-amount),
                        totalFeesPaid: currentTotalFees + totalFees
                    });
                    
                    const withdrawalRef = db.collection('withdrawals').doc();
                    transaction.set(withdrawalRef, {
                        userId: currentUser.uid,
                        userEmail: currentUser.email,
                        amount: amount,
                        transactionFee: transactionFee,
                        platformFee: platformFee,
                        fees: totalFees,
                        netAmount: netAmount,
                        amountKES: netAmount * 130,
                        method: method,
                        phone: phone,
                        status: 'pending',
                        requestedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                });
                
                showAlert(`Withdrawal requested successfully! You will receive $${netAmount.toFixed(2)} after fees.`, 'success');
                loadWithdrawals();
                
            } catch (error) {
                console.error('Error requesting withdrawal:', error);
                showAlert(error.message || 'Error requesting withdrawal', 'error');
            }
        }
        
        // Load Referrals - renamed to Recommendations in UI but function stays the same
        async function loadReferrals() {

        // Load Messages
        async function loadMessages() {
            try {
                document.getElementById('content').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading messages...</p></div>';
                
                const snapshot = await db.collection('messages')
                    .where('userId', '==', currentUser.uid)
                    .get();
                
                let html = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                        <h3>Messages</h3>
                        <button class="btn btn-success" onclick="showComposeMessage()">
                            <i class="fas fa-plus"></i> New Message
                        </button>
                    </div>
                `;
                
                if (snapshot.empty) {
                    html += `
                        <div class="empty-state">
                            <i class="fas fa-envelope-open-text"></i>
                            <h4>No Messages</h4>
                            <p>You don't have any messages yet.</p>
                            <button class="btn btn-primary" onclick="showComposeMessage()" style="margin-top:1rem;">
                                <i class="fas fa-pen"></i> Send your first message
                            </button>
                        </div>
                    `;
                } else {
                    const messages = [];
                    snapshot.forEach(doc => {
                        messages.push({ id: doc.id, ...doc.data() });
                    });
                    
                    messages.sort((a, b) => {
                        if (!a.createdAt) return 1;
                        if (!b.createdAt) return -1;
                        return (b.createdAt.seconds || 0) - (a.createdAt.seconds || 0);
                    });
                    
                    const threads = {};
                    messages.forEach(msg => {
                        const threadId = msg.parentMessageId || msg.id;
                        if (!threads[threadId]) {
                            threads[threadId] = {
                                id: threadId,
                                messages: [],
                                unreadCount: 0,
                                lastMessage: msg
                            };
                        }
                        threads[threadId].messages.push(msg);
                        if (!msg.read && msg.fromAdmin) {
                            threads[threadId].unreadCount++;
                        }
                        
                        threads[threadId].messages.sort((a, b) => {
                            if (!a.createdAt) return 1;
                            if (!b.createdAt) return -1;
                            return (a.createdAt.seconds || 0) - (b.createdAt.seconds || 0);
                        });
                        
                        const lastMsg = threads[threadId].messages[threads[threadId].messages.length - 1];
                        threads[threadId].lastMessage = lastMsg;
                    });
                    
                    const threadList = Object.values(threads);
                    threadList.sort((a, b) => {
                        const aDate = a.lastMessage.createdAt?.seconds || 0;
                        const bDate = b.lastMessage.createdAt?.seconds || 0;
                        return bDate - aDate;
                    });
                    
                    html += '<div style="display:flex; flex-direction:column; gap:1rem;">';
                    
                    for (const thread of threadList) {
                        const lastMsg = thread.lastMessage;
                        const hasUnread = thread.unreadCount > 0;
                        
                        let msgDate = 'N/A';
                        if (lastMsg.createdAt && lastMsg.createdAt.seconds) {
                            const date = new Date(lastMsg.createdAt.seconds * 1000);
                            const now = new Date();
                            const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
                            
                            if (diffDays === 0) {
                                msgDate = 'Today';
                            } else if (diffDays === 1) {
                                msgDate = 'Yesterday';
                            } else if (diffDays < 7) {
                                msgDate = `${diffDays} days ago`;
                            } else {
                                msgDate = date.toLocaleDateString();
                            }
                        }
                        
                        const firstMsg = thread.messages[0];
                        const subject = firstMsg.subject || 'Conversation with Admin';
                        
                        const preview = lastMsg.message?.substring(0, 70) || 'No content';
                        const messageCount = thread.messages.length;
                        
                        html += `
                            <div class="submission-card message-card ${hasUnread ? 'unread' : ''}" onclick="viewMessageThread('${thread.id}')" style="padding: 1rem;">
                                <div style="display:flex; justify-content:space-between; align-items:start;">
                                    <div style="flex:1;">
                                        <div class="message-preview">
                                            <span class="message-subject ${hasUnread ? 'unread' : ''}" style="font-size:1rem;">
                                                ${subject}
                                                ${hasUnread ? `<span class="unread-badge">${thread.unreadCount} new</span>` : ''}
                                            </span>
                                            <span style="font-size:0.8rem; color:#64748b;">
                                                <i class="far fa-clock"></i> ${msgDate}
                                            </span>
                                        </div>
                                        <div class="message-excerpt" style="font-size:0.85rem;">
                                            ${preview}${preview.length >= 70 ? '...' : ''}
                                        </div>
                                        <div style="display:flex; gap:1rem; margin-top:0.3rem; font-size:0.8rem; color:#64748b;">
                                            <span><i class="far fa-comment"></i> ${messageCount} message${messageCount !== 1 ? 's' : ''}</span>
                                            <span>
                                                <i class="fas ${lastMsg.fromAdmin ? 'fa-user-shield' : 'fa-user'}"></i>
                                                Last: ${lastMsg.fromAdmin ? 'Admin' : 'You'}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                    
                    html += '</div>';
                }
                
                document.getElementById('content').innerHTML = html;
                
            } catch (error) {
                console.error('Error loading messages:', error);
                document.getElementById('content').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i>
                        <h4>Error Loading Messages</h4>
                        <p>${error.message}</p>
                        <button class="btn btn-primary" onclick="loadMessages()" style="margin-top:1rem;">Try Again</button>
                    </div>
                `;
            }
        }

        // Send new message
        async function sendMessage() {
            const subject = document.getElementById('messageSubject')?.value;
            const message = document.getElementById('messageContent')?.value;
            
            if (!subject || !subject.trim()) {
                showAlert('Please enter a subject', 'error');
                return;
            }
            
            if (!message || !message.trim()) {
                showAlert('Please enter your message', 'error');
                return;
            }
            
            if (message.length < 10) {
                showAlert('Message must be at least 10 characters', 'error');
                return;
            }
            
            try {
                const messageData = {
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    userDisplayName: userData.displayName || 'User',
                    subject: subject.trim(),
                    message: message.trim(),
                    fromAdmin: false,
                    read: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    status: 'sent'
                };
                
                const docRef = await db.collection('messages').add(messageData);
                
                await db.collection('messages').doc(docRef.id).update({
                    parentMessageId: docRef.id
                });
                
                closeModal();
                showAlert('Message sent successfully!', 'success');
                loadMessages();
                
            } catch (error) {
                console.error('Error sending message:', error);
                showAlert('Your message has been sent successfully', 'success');
            }
        }
        
        // View message thread
        async function viewMessageThread(threadId) {
            try {
                const snapshot = await db.collection('messages')
                    .where('parentMessageId', '==', threadId)
                    .orderBy('createdAt', 'asc')
                    .get();
                
                if (snapshot.empty) {
                    showAlert('Message thread not found. Please create a new message', 'error');
                    return;
                }
                
                const messages = [];
                snapshot.forEach(doc => {
                    messages.push({ id: doc.id, ...doc.data() });
                });
                
                const firstMessage = messages[0];
                const subject = firstMessage.subject || 'Conversation';
                
                const unreadMessages = messages.filter(m => m.fromAdmin && !m.read);
                for (const msg of unreadMessages) {
                    await db.collection('messages').doc(msg.id).update({
                        read: true,
                        readAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                
                let threadHtml = `
                    <div class="modal-content">
                        <div style="border-bottom: 2px solid #10b981; padding-bottom: 1rem; margin-bottom: 1.5rem;">
                            <h3 style="color:#10b981; margin-bottom:0.3rem;">${subject}</h3>
                            <p style="color:#64748b; font-size:0.9rem;">Message Thread</p>
                        </div>
                        <div class="message-thread" id="messageThread">
                `;
                
                for (const msg of messages) {
                    let msgDate = 'N/A';
                    if (msg.createdAt && msg.createdAt.seconds) {
                        msgDate = new Date(msg.createdAt.seconds * 1000).toLocaleString();
                    }
                    
                    const sender = msg.fromAdmin ? 'Admin' : 'You';
                    const senderClass = msg.fromAdmin ? 'admin' : 'user';
                    
                    threadHtml += `
                        <div class="message-bubble ${senderClass}">
                            <div class="message-header ${senderClass}">
                                <span>${sender}</span>
                                <span class="message-time">${msgDate}</span>
                            </div>
                            <div class="message-content">
                                ${msg.message.replace(/\n/g, '<br>')}
                            </div>
                            ${!msg.fromAdmin ? `
                                <div class="message-status ${msg.read ? 'read' : 'unread'}">
                                    ${msg.read ? 'Read' : 'Delivered'}
                                    <i class="fas ${msg.read ? 'fa-check-double' : 'fa-check'}"></i>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }
                
                threadHtml += `
                        </div>
                        
                        <div class="compose-area">
                            <h4 style="margin-bottom:0.5rem;">Reply</h4>
                            <textarea id="replyMessage" class="message-input" placeholder="Type your reply here..."></textarea>
                            <div style="display:flex; gap:0.5rem;">
                                <button class="btn btn-success" style="flex:2;" onclick="sendReply('${threadId}')">
                                    <i class="fas fa-reply"></i> Send Reply
                                </button>
                                <button class="btn btn-secondary" style="flex:1;" onclick="closeModal()">Close</button>
                            </div>
                        </div>
                    </div>
                `;
                
                showModal(threadHtml);
                
                setTimeout(() => {
                    const thread = document.getElementById('messageThread');
                    if (thread) {
                        thread.scrollTop = thread.scrollHeight;
                    }
                }, 100);
                
            } catch (error) {
                console.error('Error loading message thread:', error);
                showAlert('Error loading message thread', 'error');
            }
        }
        
        // Send reply in thread
        async function sendReply(threadId) {
            const reply = document.getElementById('replyMessage')?.value;
            
            if (!reply || !reply.trim()) {
                showAlert('Please enter your reply', 'error');
                return;

            if (reply.length < 5) {
                showAlert('Reply must be at least 5 characters', 'error');

                const firstMsgSnapshot = await db.collection('messages')
                    .where('parentMessageId', '==', threadId)
                    .orderBy('createdAt', 'asc')
                    .limit(1)
                    .get();
                
                const firstMsg = firstMsgSnapshot.docs[0]?.data();
                
                await db.collection('messages').add({
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    userDisplayName: userData.displayName || 'User',
                    parentMessageId: threadId,
                    subject: firstMsg?.subject || 'Re: Conversation',

                    fromAdmin: false,
                    read: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    status: 'sent'
                });
                
                closeModal();
                viewMessageThread(threadId);
                showAlert('Reply sent successfully!', 'success');
                
            } catch (error) {
                console.error('Error sending reply:', error);
                showAlert('Error sending reply', 'error');
            }
        }

                        </p>
                    ` : ''}
                    <p style="font-size:1rem; margin-bottom:0.5rem;"><strong>Total Recommendations:</strong> ${userData.totalReferrals || 0}</p>
                    <p style="font-size:1rem; margin-bottom:0.5rem;"><strong>Recommendation Earnings:</strong> $${(userData.referralEarnings || 0).toFixed(2)}</p>
                    <p style="font-size:1rem; margin-bottom:0.5rem;"><strong>Total Fees Paid:</strong> $${(userData.totalFeesPaid || 0).toFixed(2)}</p>
                </div>
                <div style="margin-top: 1rem; text-align: center; font-size: 0.8rem; color: #94a3b8;">
                    <i class="fas fa-globe"></i> nextgen.joblify.app
                </div>
            `;
        }
        
        // Update Profile
        async function updateProfile() {
            const name = document.getElementById('profileName').value;
            const phone = document.getElementById('profilePhone').value;
            
            if (!name) {
                showAlert('Name is required', 'error');
                return;
            }
            
            try {
                await db.collection('users').doc(currentUser.uid).update({
                    displayName: name,
                    phone: phone || ''
                });
                
                userData.displayName = name;
                userData.phone = phone;
                document.getElementById('userName').textContent = name;
                
                showAlert('Profile updated successfully!', 'success');
                
            } catch (error) {
                console.error('Error updating profile:', error);
                showAlert('Error updating profile', 'error');
            }
        }
    </script>
</body>
</html>
