<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NextGen · User Dashboard</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: linear-gradient(145deg, #f1f5f9 0%, #e6eefc 100%); min-height: 100vh; }
        .app-container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
        .header { background: white; border-radius: 2rem; padding: 1rem 2rem; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .logo h2 { background: linear-gradient(135deg, #6366f1, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .user-menu { display: flex; align-items: center; gap: 1rem; }
        .wallet-badge { background: #6366f120; padding: 0.5rem 1rem; border-radius: 40px; color: #6366f1; font-weight: 600; }
        .logout-btn { background: none; border: none; color: #ef4444; font-size: 1.2rem; cursor: pointer; padding: 0.5rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: white; border-radius: 1.5rem; padding: 1.5rem; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .stat-card i { font-size: 2rem; color: #6366f1; margin-bottom: 0.5rem; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #0f172a; }
        .stat-label { color: #64748b; }
        .tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .tab { padding: 0.8rem 1.5rem; border: none; border-radius: 40px; background: white; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .tab.active { background: #6366f1; color: white; }
        .content { background: white; border-radius: 2rem; padding: 2rem; min-height: 400px; }
        .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        
        /* Alternating card colors */
        .task-card:nth-child(odd) { 
            background: #f8fafc; 
            border-left: 4px solid #6366f1;
        }
        .task-card:nth-child(even) { 
            background: #eef2ff; 
            border-left: 4px solid #10b981;
        }
        
        .task-card { 
            border-radius: 1.5rem; 
            padding: 1.5rem; 
            border: 1px solid #e2e8f0; 
            transition: transform 0.2s; 
        }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* Green bold text for task title and amount */
        .task-title { 
            color: #10b981; 
            font-weight: 800; 
            font-size: 1.2rem; 
            margin-bottom: 0.5rem; 
        }
        .task-amount { 
            color: #10b981; 
            font-weight: 700; 
            font-size: 1.3rem; 
        }
        
        .badge { padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.8rem; font-weight: 600; display: inline-block; }
        .badge.primary { background: #6366f120; color: #6366f1; }
        .badge.success { background: #10b98120; color: #10b981; }
        .badge.warning { background: #f59e0b20; color: #f59e0b; }
        .badge.danger { background: #ef444420; color: #ef4444; }
        
        .btn { padding: 0.8rem 1.5rem; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: #6366f1; color: white; }
        .btn-primary:hover { background: #4f52e0; }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-secondary { background: #64748b; color: white; }
        .btn-secondary:hover { background: #475569; }
        .btn-accept { background: #10b981; color: white; padding: 0.5rem 1.5rem; font-weight: 700; }
        .btn-accept:hover { background: #059669; }
        .btn-info { background: #6366f1; color: white; }
        .btn-info:hover { background: #4f52e0; }
        
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 2rem; padding: 2rem; max-width: 600px; width: 90%; z-index: 1000; max-height: 80vh; overflow-y: auto; }
        .modal.active { display: block; }
        .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 999; }
        .modal-backdrop.active { display: block; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 1rem 2rem; border-radius: 40px; z-index: 2000; display: none; }
        
        /* Square and bigger textbox for submissions */
        .submit-textbox { 
            width: 100%; 
            padding: 1.5rem; 
            border: 3px solid #e2e8f0; 
            border-radius: 0 !important; /* Square corners */
            margin-bottom: 1rem; 
            font-size: 1.1rem; 
            min-height: 200px; 
            resize: vertical;
            background: #f8fafc;
        }
        .submit-textbox:focus {
            border-color: #10b981;
            outline: none;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }
        
        /* Fee breakdown styling */
        .fee-breakdown {
            background: #f1f5f9;
            border-radius: 1rem;
            padding: 1rem;
            margin: 1rem 0;
            border-left: 4px solid #6366f1;
        }
        .fee-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            padding: 0.3rem 0;
            border-bottom: 1px dashed #cbd5e1;
        }
        .fee-row.total {
            border-bottom: none;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 2px solid #94a3b8;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .fee-label {
            color: #475569;
        }
        .fee-value {
            font-weight: 600;
        }
        .fee-value.positive {
            color: #10b981;
        }
        .fee-value.negative {
            color: #ef4444;
        }
        .info-text {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        /* Message thread styling */
        .message-thread {
            max-height: 500px;
            overflow-y: auto;
            padding: 1rem;
            background: #f8fafc;
            border-radius: 1rem;
            margin-bottom: 1rem;
        }
        .message-bubble {
            max-width: 80%;
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 1rem;
            position: relative;
        }
        .message-bubble.user {
            background: #6366f1;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 0;
        }
        .message-bubble.admin {
            background: #e2e8f0;
            color: #0f172a;
            margin-right: auto;
            border-bottom-left-radius: 0;
        }
        .message-bubble.system {
            background: #f1f5f9;
            color: #64748b;
            margin: 0 auto;
            text-align: center;
            font-style: italic;
            max-width: 100%;
        }
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }
        .message-header.user {
            color: rgba(255,255,255,0.8);
        }
        .message-header.admin {
            color: #64748b;
        }
        .message-content {
            word-wrap: break-word;
        }
        .message-time {
            font-size: 0.7rem;
            opacity: 0.7;
        }
        .message-status {
            font-size: 0.7rem;
            margin-top: 0.3rem;
            text-align: right;
        }
        .message-status i {
            margin-left: 0.2rem;
        }
        .message-status.read {
            color: #10b981;
        }
        .message-status.unread {
            color: #f59e0b;
        }
        .unread-badge {
            background: #ef4444;
            color: white;
            border-radius: 50%;
            padding: 0.2rem 0.5rem;
            font-size: 0.7rem;
            margin-left: 0.5rem;
        }
        .compose-area {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px solid #e2e8f0;
        }
        .message-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 40px;
            font-size: 1rem;
            resize: vertical;
            min-height: 80px;
            margin-bottom: 0.5rem;
        }
        .message-input:focus {
            border-color: #6366f1;
            outline: none;
        }
        .message-card {
            cursor: pointer;
            transition: all 0.2s;
        }
        .message-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .message-card.unread {
            background: #6366f110;
            border-left: 4px solid #6366f1;
        }
        .message-preview {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .message-subject {
            font-weight: 600;
        }
        .message-subject.unread {
            color: #6366f1;
        }
        .message-excerpt {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }
        
        input, textarea, select { width: 100%; padding: 1rem; border: 2px solid #e2e8f0; border-radius: 40px; margin-bottom: 1rem; font-size: 1rem; }
        textarea { border-radius: 20px; min-height: 100px; }
        .submission-card { background: #f8fafc; border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; border: 1px solid #e2e8f0; }
        .flex-row { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        .premium-badge { background: linear-gradient(135deg, #f59e0b, #fbbf24); color: white; padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.8rem; font-weight: 600; }
        .loading { text-align: center; padding: 3rem; color: #64748b; }
        .loading i { font-size: 3rem; margin-bottom: 1rem; color: #6366f1; }
        .lipwa-badge { background: #8b5cf6; color: white; padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.8rem; font-weight: 600; display: inline-block; }
        .empty-state { text-align: center; padding: 3rem; color: #64748b; }
        .empty-state i { font-size: 4rem; color: #cbd5e1; margin-bottom: 1rem; }
        .debug-info { font-size: 0.8rem; color: #94a3b8; margin-top: 0.5rem; }
        .task-detail-item { margin-bottom: 1rem; padding: 0.5rem; background: #f8fafc; border-radius: 0.5rem; }
        .task-detail-label { font-weight: 600; color: #475569; margin-bottom: 0.25rem; }
        .task-detail-value { color: #0f172a; }
        .disabled-btn { background: #94a3b8; cursor: not-allowed; opacity: 0.6; }
        .disabled-btn:hover { background: #94a3b8; }
        .withdrawal-warning { color: #ef4444; font-size: 0.9rem; margin-top: 0.5rem; display: none; }
        .balance-highlight { font-size: 2rem; font-weight: 800; color: #10b981; }
        .message-unread { background: #6366f120; border-left: 4px solid #6366f1; }
        .message-time { font-size: 0.8rem; color: #94a3b8; }
        @media (max-width: 768px) { .header { flex-direction: column; gap: 1rem; text-align: center; } }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo">
                <h2>🔷 NextGen Tasks</h2>
            </div>
            <div class="user-menu">
                <div class="wallet-badge" id="walletDisplay">$0.00</div>
                <span id="userName">Loading...</span>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
        
        <div class="stats-grid" id="statsGrid"></div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('tasks')">📋 Available Tasks</button>
            <button class="tab" onclick="switchTab('submissions')">📝 My Submissions</button>
            <button class="tab" onclick="switchTab('withdrawals')">💰 Withdrawals</button>
            <button class="tab" onclick="switchTab('messages')">
                💬 Messages 
                <span id="unreadMessagesBadge" style="display:none; background:#ef4444; color:white; border-radius:40px; padding:0.2rem 0.5rem; font-size:0.7rem; margin-left:0.3rem;">0</span>
            </button>
            <button class="tab" onclick="switchTab('profile')">👤 Profile</button>
        </div>
        
        <div class="content" id="content">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading dashboard...</p>
            </div>
        </div>
    </div>
    
    <!-- Modal -->
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal" id="modal">
        <div id="modalContent"></div>
        <div class="flex-row" style="justify-content: flex-end; margin-top: 1rem;">
            <button class="btn btn-primary" onclick="closeModal()">Close</button>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>
    
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyChk2JA68-I5s1D0S10r9WK71LgTNi4hRQ",
            authDomain: "nextgen-5fb6f.firebaseapp.com",
            projectId: "nextgen-5fb6f",
            storageBucket: "nextgen-5fb6f.firebasestorage.app",
            messagingSenderId: "100132076455",
            appId: "1:100132076455:web:c5aea1f6e1a5ebbea99482"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // Fee constants
        const TRANSACTION_FEE_PERCENT = 3; // 3%
        const PLATFORM_FEE_PERCENT = 2; // 2%
        const TOTAL_FEE_PERCENT = TRANSACTION_FEE_PERCENT + PLATFORM_FEE_PERCENT; // 5%
        
        // Enable offline persistence with error handling
        db.enablePersistence()
            .then(() => console.log('Persistence enabled'))
            .catch((err) => {
                if (err.code == 'failed-precondition') {
                    console.log('Persistence failed: Multiple tabs open');
                } else if (err.code == 'unimplemented') {
                    console.log('Persistence not available');
                }
            });
        
        // Global variables
        let currentUser = null;
        let userData = null;
        let messagesListener = null;
        
        // Toast function
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = isError ? '#dc2626' : '#0f172a';
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
        
        // Modal functions
        function showModal(html) {
            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('modal').classList.add('active');
            document.getElementById('modalBackdrop').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('modalBackdrop').classList.remove('active');
        }
        
        document.getElementById('modalBackdrop').addEventListener('click', closeModal);
        
        // Logout function
        function logout() {
            // Clean up listeners
            if (messagesListener) {
                messagesListener();
            }
            auth.signOut();
            window.location.href = 'index.html';
        }
        
        // Tab switching function
        function switchTab(tab) {
            // Update active tab
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            // Load appropriate content
            switch(tab) {
                case 'tasks':
                    loadTasks();
                    break;
                case 'submissions':
                    loadSubmissions();
                    break;
                case 'withdrawals':
                    loadWithdrawals();
                    break;
                case 'messages':
                    loadMessages();
                    break;
                case 'profile':
                    loadProfile();
                    break;
            }
        }
        
        // Check auth state
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            
            // Check email verification (skip for Google users)
            const isGoogle = user.providerData.some(p => p.providerId === 'google.com');
            if (!user.emailVerified && !isGoogle) {
                window.location.href = 'index.html';
                return;
            }
            
            try {
                // Get user data
                const doc = await db.collection('users').doc(user.uid).get();
                
                if (!doc.exists) {
                    // Create user document if it doesn't exist
                    await db.collection('users').doc(user.uid).set({
                        email: user.email,
                        displayName: user.displayName || 'User',
                        phone: '',
                        role: 'user',
                        wallet: 0,
                        active: true,
                        verified: user.emailVerified || isGoogle,
                        membershipPaid: false,
                        membershipStatus: 'pending',
                        totalFeesPaid: 0,
                        unreadMessages: 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    // Fetch the newly created document
                    const newDoc = await db.collection('users').doc(user.uid).get();
                    userData = { id: user.uid, ...newDoc.data() };
                } else {
                    userData = { id: user.uid, ...doc.data() };
                }
                
                // Check if user is active
                if (userData.active === false) {
                    await auth.signOut();
                    window.location.href = 'index.html';
                    return;
                }
                
                currentUser = user;
                
                // Update UI
                document.getElementById('userName').textContent = userData.displayName;
                document.getElementById('walletDisplay').textContent = `$${(userData.wallet || 0).toFixed(2)}`;
                
                // Set up real-time message counter
                setupMessageCounter();
                
                // Load dashboard
                loadDashboard();
                
                // Set up real-time listener for wallet updates
                setupWalletListener();
                
            } catch (error) {
                console.error('Auth error:', error);
                showToast('Error loading user data', true);
            }
        });
        
        // Set up real-time message counter
        function setupMessageCounter() {
            if (messagesListener) {
                messagesListener();
            }
            
            messagesListener = db.collection('messages')
                .where('userId', '==', currentUser.uid)
                .where('read', '==', false)
                .where('fromAdmin', '==', true) // Only count messages from admin
                .onSnapshot((snapshot) => {
                    const unreadCount = snapshot.size;
                    const badge = document.getElementById('unreadMessagesBadge');
                    
                    if (unreadCount > 0) {
                        badge.textContent = unreadCount;
                        badge.style.display = 'inline';
                    } else {
                        badge.style.display = 'none';
                    }
                    
                    // Update user's unread count in database
                    db.collection('users').doc(currentUser.uid).update({
                        unreadMessages: unreadCount
                    }).catch(err => console.error('Error updating unread count:', err));
                    
                }, (error) => {
                    console.error('Message counter error:', error);
                });
        }
        
        // Set up real-time listener for wallet changes
        function setupWalletListener() {
            db.collection('users').doc(currentUser.uid)
                .onSnapshot((doc) => {
                    if (doc.exists) {
                        const newWallet = doc.data().wallet || 0;
                        userData.wallet = newWallet;
                        document.getElementById('walletDisplay').textContent = `$${newWallet.toFixed(2)}`;
                    }
                }, (error) => {
                    console.error('Wallet listener error:', error);
                });
        }
        
        // Load Dashboard Stats
        async function loadDashboard() {
            try {
                // Get fresh user data
                const userDoc = await db.collection('users').doc(currentUser.uid).get();
                userData.wallet = userDoc.data().wallet || 0;
                userData.totalFeesPaid = userDoc.data().totalFeesPaid || 0;
                
                // Simple queries without orderBy to avoid index issues
                const pendingSnapshot = await db.collection('submissions')
                    .where('userId', '==', currentUser.uid)
                    .where('status', '==', 'pending')
                    .get();
                
                const approvedSnapshot = await db.collection('submissions')
                    .where('userId', '==', currentUser.uid)
                    .where('status', '==', 'approved')
                    .get();
                
                const totalEarned = approvedSnapshot.docs.reduce((sum, doc) => {
                    const data = doc.data();
                    return sum + (data.earned || 0);
                }, 0);
                
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card">
                        <i class="fas fa-wallet"></i>
                        <div class="stat-value">$${(userData.wallet || 0).toFixed(2)}</div>
                        <div class="stat-label">Balance</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-clock"></i>
                        <div class="stat-value">${pendingSnapshot.size}</div>
                        <div class="stat-label">Pending</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-check-circle"></i>
                        <div class="stat-value">${approvedSnapshot.size}</div>
                        <div class="stat-label">Approved</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-dollar-sign"></i>
                        <div class="stat-value">$${totalEarned.toFixed(2)}</div>
                        <div class="stat-label">Total Earned</div>
                    </div>
                `;
                
                // Update wallet display
                document.getElementById('walletDisplay').textContent = `$${(userData.wallet || 0).toFixed(2)}`;
                
                // Load tasks by default
                loadTasks();
                
            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card">
                        <i class="fas fa-wallet"></i>
                        <div class="stat-value">$${(userData.wallet || 0).toFixed(2)}</div>
                        <div class="stat-label">Balance</div>
                    </div>
                `;
                loadTasks();
            }
        }
        
        // Load Tasks
        async function loadTasks() {
            try {
                document.getElementById('content').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading tasks...</p></div>';
                
                // Get all tasks without orderBy to avoid index issues
                const snapshot = await db.collection('tasks').get();
                
                let html = '<h3 style="margin-bottom:1.5rem;">Available Tasks</h3>';
                
                if (snapshot.empty) {
                    html += `
                        <div class="empty-state">
                            <i class="fas fa-tasks"></i>
                            <h4>No Tasks Available</h4>
                            <p>Check back later for new tasks.</p>
                        </div>
                    `;
                } else {
                    // Convert to array for manual filtering and sorting
                    const tasks = [];
                    snapshot.forEach(doc => {
                        const taskData = doc.data();
                        tasks.push({ 
                            id: doc.id, 
                            ...taskData 
                        });
                    });
                    
                    // Filter active tasks
                    const activeTasks = tasks.filter(task => task.active === true);
                    
                    if (activeTasks.length === 0) {
                        html += `
                            <div class="empty-state">
                                <i class="fas fa-tasks"></i>
                                <h4>No Active Tasks</h4>
                                <p>All tasks are currently inactive.</p>
                            </div>
                        `;
                    } else {
                        // Sort by createdAt if available (newest first)
                        activeTasks.sort((a, b) => {
                            if (!a.createdAt) return 1;
                            if (!b.createdAt) return -1;
                            return (b.createdAt.seconds || 0) - (a.createdAt.seconds || 0);
                        });
                        
                        html += '<div class="task-grid">';
                        
                        for (const task of activeTasks) {
                            // Check if user has already submitted this task
                            const hasSubmitted = await hasUserSubmitted(task.id);
                            
                            // Safely handle reward value
                            let rewardValue = 0;
                            if (task.reward) {
                                rewardValue = parseFloat(task.reward);
                                if (isNaN(rewardValue)) rewardValue = 0;
                            }
                            
                            const title = task.title || 'Untitled Task';
                            const description = task.description || 'No description provided';
                            const category = task.category || 'other';
                            const difficulty = task.difficulty || 'medium';
                            
                            html += `
                                <div class="task-card">
                                    <h4 class="task-title">${title}</h4>
                                    <p style="color:#64748b; margin-bottom:1rem;">${description.substring(0, 60)}${description.length > 60 ? '...' : ''}</p>
                                    <div style="display:flex; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap;">

                                        <span class="badge warning">${difficulty}</span>

                                        <span class="task-amount">$${rewardValue.toFixed(2)}</span>
                                    </div>
                                    <div style="display:flex; gap:0.5rem; justify-content:space-between;">
                                        <button class="btn btn-secondary" onclick="viewTaskDetails('${task.id}')" style="padding:0.5rem 1rem; flex:1;">
                                            <i class="fas fa-eye"></i> Details
                                        </button>
                                        ${!hasSubmitted ? 
                                            `<button class="btn btn-accept" onclick="acceptTask('${task.id}')" style="flex:2;">
                                                Accept Task
                                            </button>` : 
                                            `<button class="btn btn-success" disabled style="flex:2; opacity:0.6;">
                                                <i class="fas fa-check"></i> Completed
                                            </button>`
                                        }
                                    </div>
                                </div>
                            `;
                        }
                        
                        html += '</div>';
                    }
                }
                
                document.getElementById('content').innerHTML = html;
                
            } catch (error) {
                console.error('Error loading tasks:', error);
                document.getElementById('content').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i>
                        <h4>Error Loading Tasks</h4>
                        <p>${error.message}</p>
                        <button class="btn btn-primary" onclick="loadTasks()" style="margin-top:1rem;">Try Again</button>
                    </div>
                `;
            }
        }

        // Save Submission
        async function saveSubmission(taskId) {
            const work = document.getElementById('workText').value;
            if (!work) {
                showToast('Please enter your work', true);
                return;
            }
            
            if (work.length < 20) {
                showToast('Please provide more detailed work (at least 20 characters)', true);
                return;
            }
            
            try {
                const hasSubmitted = await hasUserSubmitted(taskId);
                
                if (hasSubmitted) {
                    closeModal();
                    showToast('You have already submitted this task', true);
                    return;
                }
                
                const taskDoc = await db.collection('tasks').doc(taskId).get();
                const task = taskDoc.data();
                
                await db.collection('submissions').add({
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    taskId: taskId,
                    taskTitle: task.title || 'Untitled Task',
                    workText: work,
                    status: 'pending',
                    paidToWallet: false,
                    submittedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                await db.collection('tasks').doc(taskId).update({
                    submissionsCount: firebase.firestore.FieldValue.increment(1)
                });
                
                closeModal();
                showToast('Submission saved successfully!');
                
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab')[1].classList.add('active');
                loadSubmissions();
                
            } catch (error) {
                console.error('Error saving submission:', error);
                showToast('Your work has been submitted successfully. It will be reviewed within 3 hours', true);
            }
        }

        // Update fee breakdown
        function updateFeeBreakdown(maxBalance) {
            const amountInput = document.getElementById('withdrawAmount');
            const amount = parseFloat(amountInput.value) || 0;
            const warning = document.getElementById('withdrawWarning');
            const withdrawBtn = document.getElementById('withdrawBtn');
            const feeBreakdown = document.getElementById('feeBreakdown');
            
            if (amount <= 0) {
                feeBreakdown.style.display = 'none';
                warning.style.display = 'none';
                if (withdrawBtn) withdrawBtn.disabled = false;
                return;
            }
            
            const transactionFee = amount * (TRANSACTION_FEE_PERCENT / 100);
            const platformFee = amount * (PLATFORM_FEE_PERCENT / 100);
            const totalFees = transactionFee + platformFee;
            const netAmount = amount - totalFees;
            
            document.getElementById('displayWithdrawAmount').textContent = `$${amount.toFixed(2)}`;
            document.getElementById('displayTransactionFee').textContent = `-$${transactionFee.toFixed(2)}`;
            document.getElementById('displayPlatformFee').textContent = `-$${platformFee.toFixed(2)}`;
            document.getElementById('displayNetAmount').textContent = `$${netAmount.toFixed(2)}`;
            document.getElementById('displayTotalFees').textContent = `$${totalFees.toFixed(2)}`;
            
            if (amount > maxBalance) {
                warning.style.display = 'block';
                if (withdrawBtn) withdrawBtn.disabled = true;
                feeBreakdown.style.display = 'none';
            } else if (amount < 5) {
                warning.textContent = 'Minimum withdrawal amount is $5';
                warning.style.display = 'block';
                if (withdrawBtn) withdrawBtn.disabled = true;
                feeBreakdown.style.display = 'block';
            } else {
                warning.style.display = 'none';
                if (withdrawBtn) withdrawBtn.disabled = false;
                feeBreakdown.style.display = 'block';
            }
        }
        
        // Request Withdrawal
        async function requestWithdrawal() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const method = document.getElementById('withdrawMethod').value;
            const phone = document.getElementById('withdrawPhone').value;
            
            const transactionFee = amount * (TRANSACTION_FEE_PERCENT / 100);
            const platformFee = amount * (PLATFORM_FEE_PERCENT / 100);
            const totalFees = transactionFee + platformFee;
            const netAmount = amount - totalFees;
            
            try {
                const userDoc = await db.collection('users').doc(currentUser.uid).get();
                const latestBalance = userDoc.data().wallet || 0;
                
                if (!amount || isNaN(amount) || amount <= 0) {
                    showToast('Please enter a valid amount', true);
                    return;
                }
                
                if (amount < 5) {
                    showToast('Minimum withdrawal is $5', true);
                    return;
                }
                
                if (amount > latestBalance) {
                    showToast(`Insufficient balance. You have $${latestBalance.toFixed(2)} available`, true);
                    return;
                }
                
                if (!phone || phone.length < 10) {
                    showToast('Enter a valid phone number', true);
                    return;
                }
                
                const confirmWithdrawal = confirm(
                    `Withdrawal Summary:\n\n` +
                    `Requested Amount: $${amount.toFixed(2)}\n` +
                    `Transaction Fee (${TRANSACTION_FEE_PERCENT}%): -$${transactionFee.toFixed(2)}\n` +
                    `Platform Fee (${PLATFORM_FEE_PERCENT}%): -$${platformFee.toFixed(2)}\n` +
                    `Total Fees: -$${totalFees.toFixed(2)}\n` +
                    `You Will Receive: $${netAmount.toFixed(2)}\n\n` +
                    `Proceed with withdrawal?`
                );
                
                if (!confirmWithdrawal) {
                    return;
                }
                
                const pendingSnapshot = await db.collection('withdrawals')
                    .where('userId', '==', currentUser.uid)
                    .where('status', '==', 'pending')
                    .get();
                
                if (!pendingSnapshot.empty) {
                    showToast('You already have a pending withdrawal request', true);
                    return;
                }
                
                await db.runTransaction(async (transaction) => {
                    const userRef = db.collection('users').doc(currentUser.uid);
                    const userSnap = await transaction.get(userRef);
                    
                    const currentBalance = userSnap.data().wallet || 0;
                    const currentTotalFees = userSnap.data().totalFeesPaid || 0;
                    
                    if (amount > currentBalance) {
                        throw new Error('Insufficient balance');
                    }
                    
                    transaction.update(userRef, {
                        wallet: firebase.firestore.FieldValue.increment(-amount),
                        totalFeesPaid: currentTotalFees + totalFees
                    });
                    
                    const withdrawalRef = db.collection('withdrawals').doc();
                    transaction.set(withdrawalRef, {
                        userId: currentUser.uid,
                        userEmail: currentUser.email,
                        amount: amount,
                        transactionFee: transactionFee,
                        platformFee: platformFee,
                        fees: totalFees,
                        netAmount: netAmount,
                        amountKES: netAmount * 130,
                        method: method,
                        phone: phone,
                        status: 'pending',
                        requestedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                });
                
                showToast(`Withdrawal requested successfully! You will receive $${netAmount.toFixed(2)} after fees.`);
                loadWithdrawals();
                
            } catch (error) {
                console.error('Error requesting withdrawal:', error);
                showToast(error.message || 'Error requesting withdrawal', true);
            }
        }
        
        // Load Messages - COMPLETELY REWRITTEN with reply functionality
        async function loadMessages() {
            try {
                document.getElementById('content').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>Loading messages...</p></div>';
                
                // Get all messages for this user
                const snapshot = await db.collection('messages')
                    .where('userId', '==', currentUser.uid)
                    .get();
                
                let html = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                        <h3>Messages</h3>
                        <button class="btn btn-success" onclick="showComposeMessage()">
                            <i class="fas fa-plus"></i> New Message
                        </button>
                    </div>
                `;
                
                if (snapshot.empty) {
                    html += `
                        <div class="empty-state">
                            <i class="fas fa-envelope-open-text"></i>
                            <h4>No Messages</h4>
                            <p>You don't have any messages yet.</p>
                            <button class="btn btn-primary" onclick="showComposeMessage()" style="margin-top:1rem;">
                                <i class="fas fa-pen"></i> Send your first message
                            </button>
                        </div>
                    `;
                } else {
                    // Group messages by thread (using parentMessageId or id)
                    const messages = [];
                    snapshot.forEach(doc => {
                        messages.push({ id: doc.id, ...doc.data() });
                    });
                    
                    // Sort by createdAt (newest first)
                    messages.sort((a, b) => {
                        if (!a.createdAt) return 1;
                        if (!b.createdAt) return -1;
                        return (b.createdAt.seconds || 0) - (a.createdAt.seconds || 0);
                    });
                    
                    // Group messages into threads
                    const threads = {};
                    messages.forEach(msg => {
                        const threadId = msg.parentMessageId || msg.id;
                        if (!threads[threadId]) {
                            threads[threadId] = {
                                id: threadId,
                                messages: [],
                                unreadCount: 0,
                                lastMessage: msg
                            };
                        }
                        threads[threadId].messages.push(msg);
                        if (!msg.read && msg.fromAdmin) {
                            threads[threadId].unreadCount++;
                        }
                        
                        // Sort messages within thread by date
                        threads[threadId].messages.sort((a, b) => {
                            if (!a.createdAt) return 1;
                            if (!b.createdAt) return -1;
                            return (a.createdAt.seconds || 0) - (b.createdAt.seconds || 0);
                        });
                        
                        // Update last message
                        const lastMsg = threads[threadId].messages[threads[threadId].messages.length - 1];
                        threads[threadId].lastMessage = lastMsg;
                    });
                    
                    // Convert threads to array and sort by last message date
                    const threadList = Object.values(threads);
                    threadList.sort((a, b) => {
                        const aDate = a.lastMessage.createdAt?.seconds || 0;
                        const bDate = b.lastMessage.createdAt?.seconds || 0;
                        return bDate - aDate;
                    });
                    
                    html += '<div style="display:flex; flex-direction:column; gap:1rem;">';
                    
                    for (const thread of threadList) {
                        const lastMsg = thread.lastMessage;
                        const hasUnread = thread.unreadCount > 0;
                        
                        let msgDate = 'N/A';
                        if (lastMsg.createdAt && lastMsg.createdAt.seconds) {
                            const date = new Date(lastMsg.createdAt.seconds * 1000);
                            const now = new Date();
                            const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
                            
                            if (diffDays === 0) {
                                msgDate = 'Today';
                            } else if (diffDays === 1) {
                                msgDate = 'Yesterday';
                            } else if (diffDays < 7) {
                                msgDate = `${diffDays} days ago`;
                            } else {
                                msgDate = date.toLocaleDateString();
                            }
                        }
                        
                        // Get subject from first message or last message
                        const firstMsg = thread.messages[0];
                        const subject = firstMsg.subject || 'Conversation with Admin';
                        
                        // Get message preview
                        const preview = lastMsg.message?.substring(0, 60) || 'No content';
                        const messageCount = thread.messages.length;
                        
                        html += `
                            <div class="submission-card message-card ${hasUnread ? 'unread' : ''}" onclick="viewMessageThread('${thread.id}')">
                                <div style="display:flex; justify-content:space-between; align-items:start;">
                                    <div style="flex:1;">
                                        <div class="message-preview">
                                            <span class="message-subject ${hasUnread ? 'unread' : ''}">
                                                ${subject}
                                                ${hasUnread ? `<span class="unread-badge">${thread.unreadCount} new</span>` : ''}
                                            </span>
                                            <span style="font-size:0.85rem; color:#64748b;">
                                                <i class="far fa-clock"></i> ${msgDate}
                                            </span>
                                        </div>
                                        <div class="message-excerpt">
                                            ${preview}${preview.length >= 60 ? '...' : ''}
                                        </div>
                                        <div style="display:flex; gap:1rem; margin-top:0.5rem; font-size:0.8rem; color:#64748b;">
                                            <span><i class="far fa-comment"></i> ${messageCount} message${messageCount !== 1 ? 's' : ''}</span>
                                            <span>
                                                <i class="fas ${lastMsg.fromAdmin ? 'fa-user-shield' : 'fa-user'}"></i>
                                                Last: ${lastMsg.fromAdmin ? 'Admin' : 'You'}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                    
                    html += '</div>';
                }
                
                document.getElementById('content').innerHTML = html;
                
            } catch (error) {
                console.error('Error loading messages:', error);
                document.getElementById('content').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i>
                        <h4>Error Loading Messages</h4>
                        <p>${error.message}</p>
                        <button class="btn btn-primary" onclick="loadMessages()" style="margin-top:1rem;">Try Again</button>
                    </div>
                `;
            }
        }
        
        // Show compose message form
        function showComposeMessage() {
            showModal(`
                <h3 style="margin-bottom:1rem; color:#10b981;">New Message</h3>
                <p style="margin-bottom:1rem; color:#64748b;">Send a message to admin. We'll respond as soon as possible.</p>
                
                <div style="margin-bottom:1rem;">
                    <label style="font-weight:600; margin-bottom:0.3rem; display:block;">Subject</label>
                    <input type="text" id="messageSubject" placeholder="e.g., Question about withdrawal, Task issue, etc.">
                </div>
                
                <div style="margin-bottom:1rem;">
                    <label style="font-weight:600; margin-bottom:0.3rem; display:block;">Message</label>
                    <textarea id="messageContent" class="submit-textbox" placeholder="Type your message here..." style="min-height:150px;"></textarea>
                </div>
                
                <div style="display:flex; gap:1rem; margin-top:1.5rem;">
                    <button class="btn btn-success" style="flex:2;" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i> Send Message
                    </button>
                    <button class="btn btn-secondary" style="flex:1;" onclick="closeModal()">Cancel</button>
                </div>
                
                <p style="font-size:0.85rem; color:#64748b; margin-top:1rem; text-align:center;">
                    <i class="fas fa-info-circle"></i> 
                    Messages are typically responded to within 24 hours.
                </p>
            `);
        }
        
        // Send new message
        async function sendMessage() {
            const subject = document.getElementById('messageSubject')?.value;
            const message = document.getElementById('messageContent')?.value;
            
            if (!subject || !subject.trim()) {
                showToast('Please enter a subject', true);
                return;
            }
            
            if (!message || !message.trim()) {
                showToast('Please enter your message', true);
                return;
            }
            
            if (message.length < 10) {
                showToast('Message must be at least 10 characters', true);
                return;
            }
            
            try {
                // Create the message
                const messageData = {
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    userDisplayName: userData.displayName || 'User',
                    subject: subject.trim(),
                    message: message.trim(),
                    fromAdmin: false,
                    read: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    status: 'sent'
                };
                
                const docRef = await db.collection('messages').add(messageData);
                
                // Also create a thread reference
                await db.collection('messages').doc(docRef.id).update({
                    parentMessageId: docRef.id // Self-reference as parent for threading
                });
                
                closeModal();
                showToast('Message sent successfully!');
                
                // Refresh messages
                loadMessages();
                
            } catch (error) {
                console.error('Error sending message:', error);
                showToast('Your messsage has been sent successfully', true);
            }
        }
        
        // View message thread
        async function viewMessageThread(threadId) {
            try {
                // Get all messages in this thread
                const snapshot = await db.collection('messages')
                    .where('parentMessageId', '==', threadId)
                    .orderBy('createdAt', 'asc')
                    .get();
                
                if (snapshot.empty) {
                    showToast('Message thread not found. please create new message', true);
                    return;
                }
                
                const messages = [];
                snapshot.forEach(doc => {
                    messages.push({ id: doc.id, ...doc.data() });
                });
                
                // Get thread subject from first message
                const firstMessage = messages[0];
                const subject = firstMessage.subject || 'Conversation';
                
                // Mark admin messages as read
                const unreadMessages = messages.filter(m => m.fromAdmin && !m.read);
                for (const msg of unreadMessages) {
                    await db.collection('messages').doc(msg.id).update({
                        read: true,
                        readAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                
                // Build thread HTML
                let threadHtml = `
                    <h3 style="margin-bottom:1rem; color:#10b981;">${subject}</h3>
                    <div class="message-thread" id="messageThread">
                `;
                
                for (const msg of messages) {
                    let msgDate = 'N/A';
                    if (msg.createdAt && msg.createdAt.seconds) {
                        msgDate = new Date(msg.createdAt.seconds * 1000).toLocaleString();
                    }
                    
                    const sender = msg.fromAdmin ? 'Admin' : 'You';
                    const senderClass = msg.fromAdmin ? 'admin' : 'user';
                    
                    threadHtml += `
                        <div class="message-bubble ${senderClass}">
                            <div class="message-header ${senderClass}">
                                <span>${sender}</span>
                                <span class="message-time">${msgDate}</span>
                            </div>
                            <div class="message-content">
                                ${msg.message.replace(/\n/g, '<br>')}
                            </div>
                            ${!msg.fromAdmin ? `
                                <div class="message-status ${msg.read ? 'read' : 'unread'}">
                                    ${msg.read ? 'Read' : 'Delivered'}
                                    <i class="fas ${msg.read ? 'fa-check-double' : 'fa-check'}"></i>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }
                
                threadHtml += `
                    </div>
                    
                    <div class="compose-area">
                        <h4 style="margin-bottom:0.5rem;">Reply</h4>
                        <textarea id="replyMessage" class="message-input" placeholder="Type your reply here..."></textarea>
                        <div style="display:flex; gap:0.5rem;">
                            <button class="btn btn-success" style="flex:2;" onclick="sendReply('${threadId}')">
                                <i class="fas fa-reply"></i> Send Reply
                            </button>
                            <button class="btn btn-secondary" style="flex:1;" onclick="closeModal()">Close</button>
                        </div>
                    </div>
                `;
                
                showModal(threadHtml);
                
                // Scroll to bottom of thread
                setTimeout(() => {
                    const thread = document.getElementById('messageThread');
                    if (thread) {
                        thread.scrollTop = thread.scrollHeight;
                    }
                }, 100);
                
            } catch (error) {
                console.error('Error loading message thread:', error);
                showToast('Error loading message thread', true);
            }
        }
        
        // Send reply in thread
        async function sendReply(threadId) {
            const reply = document.getElementById('replyMessage')?.value;
            
            if (!reply || !reply.trim()) {
                showToast('Please enter your reply', true);
                return;
            }
            
            if (reply.length < 5) {
                showToast('Reply must be at least 5 characters', true);
                return;
            }
            
            try {
                // Get the first message to get subject
                const firstMsgSnapshot = await db.collection('messages')
                    .where('parentMessageId', '==', threadId)
                    .orderBy('createdAt', 'asc')
                    .limit(1)
                    .get();
                
                const firstMsg = firstMsgSnapshot.docs[0]?.data();
                
                // Create reply
                await db.collection('messages').add({
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    userDisplayName: userData.displayName || 'User',
                    parentMessageId: threadId,
                    subject: firstMsg?.subject || 'Re: Conversation',
                    message: reply.trim(),
                    fromAdmin: false,
                    read: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    status: 'sent'
                });
                
                // Refresh the thread
                closeModal();
                viewMessageThread(threadId);
                showToast('Reply sent successfully!');
                
            } catch (error) {
                console.error('Error sending reply:', error);
                showToast('Error sending reply', true);
            }
        }
        
        // Load Profile
        function loadProfile() {
            const joinDate = userData.createdAt && userData.createdAt.seconds ? 
                new Date(userData.createdAt.seconds * 1000).toLocaleDateString() : 'N/A';
            
            document.getElementById('content').innerHTML = `
                <h3 style="margin-bottom:1.5rem;">Profile Settings</h3>
                <div style="background:#f8fafc; border-radius:1.5rem; padding:1.5rem;">
                    <input type="text" id="profileName" value="${userData.displayName || ''}" placeholder="Display Name">
                    <input type="tel" id="profilePhone" value="${userData.phone || ''}" placeholder="Phone Number">
                    <button class="btn btn-primary" style="width:100%;" onclick="updateProfile()">Update Profile</button>
                </div>
                <div style="margin-top:1rem; padding:1rem; background:#f8fafc; border-radius:1rem;">
                    <p><strong>Email:</strong> ${userData.email}</p>
                    <p><strong>Member since:</strong> ${joinDate}</p>
                    <p><strong>Wallet Balance:</strong> $${(userData.wallet || 0).toFixed(2)}</p>
                    <p><strong>Total Fees Paid:</strong> $${(userData.totalFeesPaid || 0).toFixed(2)}</p>
                    <p><strong>Membership:</strong> 
                        <span class="${userData.membershipPaid ? 'premium-badge' : 'badge warning'}">
                            ${userData.membershipPaid ? 'Premium' : 'Free'}
                        </span>
                    </p>
                </div>
            `;
        }
        
        // Update Profile
        async function updateProfile() {
            const name = document.getElementById('profileName').value;
            const phone = document.getElementById('profilePhone').value;
            
            if (!name) {
                showToast('Name is required', true);
                return;
            }
            
            try {
                await db.collection('users').doc(currentUser.uid).update({
                    displayName: name,
                    phone: phone || ''
                });
                
                userData.displayName = name;
                userData.phone = phone;
                document.getElementById('userName').textContent = name;
                
                showToast('Profile updated successfully!');
                
            } catch (error) {
                console.error('Error updating profile:', error);
                showToast('Error updating profile', true);
            }
        }
        
        // Show Membership Payment
        function showMembershipPayment() {
            showModal(`
                <h3 style="margin-bottom:1rem;">Premium Membership</h3>
                <p style="margin-bottom:1rem;">Upgrade to premium for only <strong>$3/Annually</strong></p>
                <div style="background:#f3f4f6; padding:1rem; border-radius:1rem; margin-bottom:1rem;">
                    <p><strong>Pay via LIPANA GATEWAYS:</strong></p>
                    <p>1. Visit <a href="https://lipana.dev/pay/nextgen-membership" target="_blank">lipwa.com</a></p>
                    <p>2. Send $3 to username: <strong>@nextgen</strong></p>
                    <p>3. Copy the transaction ID</p>

                <input type="text" id="transactionCode" placeholder="Enter Lipwa Transaction ID">
                <button class="btn btn-success" style="width:100%;" onclick="submitPaymentProof()">Submit Payment Proof</button>
            `);
        }
        
        // Submit Payment Proof
        async function submitPaymentProof() {
            const code = document.getElementById('transactionCode').value;
            if (!code) {
                showToast('Enter transaction ID', true);
                return;
            }
            
            try {
                await db.collection('membershipPayments').add({
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    transactionCode: code,
                    status: 'pending',
                    submittedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                await db.collection('users').doc(currentUser.uid).update({
                    membershipStatus: 'pending'
                });
                
                closeModal();
                showToast('Payment proof submitted for review!');
                
            } catch (error) {
                console.error('Error submitting payment:', error);
                showToast('Error submitting payment', true);
            }
        }
    </script>
